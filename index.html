<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VTRX Games</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0000; --card: #130000; --border: #2a0000; --secondary: #1a0000;
  --primary: #dc2626; --primary-glow: rgba(220,38,38,0.35);
  --muted: #6b4040; --text: #f5e8e8; --text-dim: #a07070; --radius: 12px;
}
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.header { position: sticky; top: 0; z-index: 100; background: rgba(13,0,0,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 16px; max-width: 100%; }
.logo { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; flex-shrink: 0; }
.logo-icon { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #2a0000; display: flex; align-items: center; justify-content: center; }
.logo-text { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; }
.logo-text span { color: var(--primary); }
.header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }
.online-badge { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-dim); background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); border-radius: 999px; padding: 4px 12px; flex-shrink: 0; }
.online-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.online-count { color: #fff; font-weight: 700; }
.header-btn { padding: 8px 20px; background: var(--primary); color: #fff; border: 1px solid var(--primary); border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; flex-shrink: 0; }
.header-btn:hover { opacity: .85; }
.add-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--primary); color: #fff; border: none; font-size: 22px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px var(--primary-glow); transition: opacity .2s; flex-shrink: 0; line-height: 1; }
.add-btn:hover { opacity: .85; }
.main { max-width: 1280px; margin: 0 auto; padding: 40px 24px; }
.hero { text-align: center; margin-bottom: 40px; }
.hero-founded { font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 14px; letter-spacing: 0.3px; text-shadow: 0 0 20px rgba(220,38,38,0.4); }
.hero h1 { font-size: clamp(28px, 5vw, 52px); font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(220,38,38,0.55); margin-bottom: 10px; }
.hero p { color: var(--text-dim); font-size: 16px; }
.cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 32px; }
.cats::-webkit-scrollbar { height: 4px; }
.cat-btn { flex-shrink: 0; padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--secondary); color: var(--text-dim); transition: all .2s; }
.cat-btn:hover { color: #fff; border-color: rgba(220,38,38,0.5); }
.cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 12px var(--primary-glow); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
.game-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; }
.game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px var(--primary-glow); }
.card-thumb { aspect-ratio: 16/9; position: relative; overflow: hidden; background: linear-gradient(135deg, #3d0000, #0d0000); }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-thumb-icon { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.card-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); opacity: 0; transition: opacity .2s; }
.game-card:hover .card-overlay { opacity: 1; }
.play-btn { background: var(--primary); color: #fff; border: none; border-radius: 999px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.card-cat { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 999px; }
.card-info { padding: 12px; }
.card-info h3 { font-weight: 700; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.card-info p { font-size: 12px; color: var(--text-dim); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-delete { margin-top: 8px; font-size: 11px; color: #f87171; background: none; border: 1px solid rgba(239,68,68,0.3); border-radius: 4px; padding: 3px 8px; cursor: pointer; transition: all .2s; }
.card-delete:hover { background: rgba(239,68,68,0.1); border-color: #f87171; }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; text-align: center; }
.empty-icon { width: 72px; height: 72px; border-radius: 16px; background: var(--secondary); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.empty h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.empty p { color: var(--text-dim); font-size: 14px; max-width: 280px; }
.modal-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 600px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 92vh; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-head h2 { font-size: 18px; font-weight: 700; color: #fff; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; transition: color .2s; padding: 0; }
.modal-close:hover { color: #fff; }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; }
.field-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.field-row label { font-size: 13px; font-weight: 500; color: var(--text-dim); }
.input, .textarea, .select { width: 100%; background: var(--secondary); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color .2s; font-family: inherit; }
.textarea { resize: none; }
.input:focus, .textarea:focus, .select:focus { border-color: var(--primary); }
.select option { background: var(--secondary); }
.textarea.mono { font-family: 'Courier New', monospace; font-size: 12px; }
.upload-zone { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: 2px dashed var(--border); background: var(--secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); cursor: pointer; transition: all .2s; }
.upload-zone:hover { border-color: var(--primary); color: #fff; }
.upload-zone span { font-size: 13px; font-weight: 500; }
.upload-zone small { font-size: 11px; opacity: 0.6; }
.cover-preview { width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid var(--border); }
.cover-preview img { width: 100%; height: 100%; object-fit: cover; }
.cover-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background .2s; line-height: 1; }
.cover-remove:hover { background: rgba(0,0,0,0.9); }
.upload-file-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--primary); background: none; border: 1px solid rgba(220,38,38,0.4); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: all .2s; }
.upload-file-btn:hover { border-color: var(--primary); opacity: .8; }
.file-badge { display: flex; align-items: center; gap: 8px; background: rgba(220,38,38,0.1); border: 1px solid rgba(234,82,82,0.3); border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; }
.file-badge span { font-size: 12px; color: var(--primary); font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-badge button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; }
.file-badge button:hover { color: #fff; }
.error-msg { color: #f75e5e; font-size: 13px; margin-bottom: 12px; }
.modal-foot { display: flex; gap: 12px; padding: 0 24px 24px; flex-shrink: 0; }
.btn-cancel { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--text-dim); font-size: 14px; cursor: pointer; transition: all .2s; }
.btn-cancel:hover { background: var(--secondary); color: #fff; }
.btn-confirm { flex: 1; padding: 10px; border-radius: 8px; background: var(--primary); color: #fff; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
.btn-confirm:disabled { opacity: .5; cursor: not-allowed; }
.btn-confirm:not(:disabled):hover { opacity: .88; }
.player { display: flex; flex-direction: column; min-height: 100vh; }
.player-bar { display: flex; align-items: center; gap: 16px; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
.back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: color .2s; }
.back-btn:hover { color: #fff; }
.divider { width: 1px; height: 16px; background: var(--border); }
.player-title { font-weight: 700; color: #fff; font-size: 15px; }
.cat-badge { font-size: 11px; background: rgba(228,65,65,0.2); color: var(--primary); padding: 2px 10px; border-radius: 999px; margin-left: 8px; }
.player-content { display: flex; flex: 1; flex-direction: row; }
.player-iframe-wrap { flex: 1; position: relative; min-height: 60vh; display: flex; flex-direction: column; overflow: hidden; }
.player-iframe { flex: 1; min-height: 60vh; border: none; width: 100%; }
.fs-exit-btn { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; align-items: center; gap: 7px; padding: 8px 16px; background: var(--primary); color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 18px rgba(0,0,0,0.6); opacity: 0.85; transition: opacity .2s; }
.fs-exit-btn:hover { opacity: 1; }
.player-below { padding: 28px 32px; background: var(--bg); border-top: 1px solid var(--border); }
.player-below h2 { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 6px; }
.player-below .cat-tag { display: inline-block; background: rgba(220,38,38,.15); color: var(--primary); font-size: 11px; padding: 3px 10px; border-radius: 999px; margin-bottom: 14px; }
.player-below p { color: var(--text-dim); font-size: 15px; line-height: 1.7; max-width: 800px; }
.player-sidebar { width: 260px; flex-shrink: 0; padding: 20px; border-left: 1px solid var(--border); background: var(--card); overflow-y: auto; }
.player-sidebar h3 { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
.suggestion-card { display: flex; gap: 10px; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all .2s; margin-bottom: 8px; }
.suggestion-card:hover { background: var(--secondary); border-color: var(--border); }
.suggestion-thumb { width: 56px; height: 40px; border-radius: 6px; overflow: hidden; flex-shrink: 0; background: linear-gradient(135deg, #3d0000, #0d0000); display: flex; align-items: center; justify-content: center; }
.suggestion-thumb img { width: 100%; height: 100%; object-fit: cover; }
.suggestion-info { flex: 1; min-width: 0; }
.suggestion-info strong { display: block; font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.suggestion-info span { font-size: 11px; color: var(--text-dim); }
.donate-amount-input { width: 100%; background: var(--secondary); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font-size: 22px; font-weight: 700; outline: none; transition: border-color .2s; text-align: center; letter-spacing: 1px; }
.donate-amount-input:focus { border-color: var(--primary); }
.donate-amount-input::placeholder { color: var(--muted); font-size: 16px; font-weight: 400; }
.donate-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.donate-preset-btn { padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--secondary); color: var(--text-dim); cursor: pointer; transition: all .2s; }
.donate-preset-btn:hover, .donate-preset-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 12px var(--primary-glow); }
.donate-paypal-btn { width: 100%; padding: 13px; border-radius: 8px; background: #003087; color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 4px; }
.donate-paypal-btn:hover:not(:disabled) { opacity: .88; }
.donate-paypal-btn:disabled { opacity: .4; cursor: not-allowed; }
.paypal-logo { font-style: italic; font-size: 18px; letter-spacing: -0.5px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const LOGO_SRC = "./vtrx-logo.png";
const ADMIN_PASSWORD = "VultorexVTRX!";
const STORAGE_KEY = "vtrx_games";
const CATEGORIES = ["All","Action","Puzzle","Racing","Adventure","Arcade","Strategy","Sports","Other"];
const PAYPAL_EMAIL = "fahadatawi42@gmail.com";
const REACTIONS_KEY = "vtrx_reactions_delta";
const VOTED_KEY = "vtrx_voted";
const CREDITS_KEY = "vtrx_credits";
const BASE_THUMBS = 36;
const BASE_HEART = 41;
const MUSIC_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3";

function loadGames() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function saveGames(games) { localStorage.setItem(STORAGE_KEY, JSON.stringify(games)); }
function loadReactions() {
  try { return JSON.parse(localStorage.getItem(REACTIONS_KEY) || "{}"); } catch { return {}; }
}
function saveReactions(r) { localStorage.setItem(REACTIONS_KEY, JSON.stringify(r)); }
function loadVoted() {
  try { return JSON.parse(localStorage.getItem(VOTED_KEY) || "{}"); } catch { return {}; }
}
function saveVoted(v) { localStorage.setItem(VOTED_KEY, JSON.stringify(v)); }
function loadCredits() {
  try { return JSON.parse(localStorage.getItem(CREDITS_KEY) || "[]"); } catch { return []; }
}
function saveCredits(c) { localStorage.setItem(CREDITS_KEY, JSON.stringify(c)); }

function useOnlineUsers() {
  const [count, setCount] = useState(() => Math.floor(Math.random() * 20) + 18);
  useEffect(() => {
    let timer = setTimeout(function tick() {
      setCount(prev => Math.min(50, Math.max(12, prev + Math.floor(Math.random() * 7) - 3)));
      timer = setTimeout(tick, Math.random() * 60000 + 60000);
    }, Math.random() * 60000 + 60000);
    return () => clearTimeout(timer);
  }, []);
  return count;
}

// Singleton audio instance that persists across the whole page lifetime
let _bgAudio = null;
function getBgAudio() {
  if (!_bgAudio) {
    _bgAudio = new Audio(MUSIC_URL);
    _bgAudio.loop = true;
    _bgAudio.volume = 0.35;
  }
  return _bgAudio;
}

function useBgMusic() {
  const [playing, setPlaying] = useState(false);

  // Attempt autoplay once on mount
  useEffect(() => {
    const audio = getBgAudio();
    const tryPlay = () => {
      audio.play().then(() => setPlaying(true)).catch(() => {});
    };
    // Browsers block autoplay until a user gesture; try immediately,
    // then listen for the first interaction as a fallback
    tryPlay();
    const onInteraction = () => {
      if (!playing) tryPlay();
      document.removeEventListener("click", onInteraction);
      document.removeEventListener("keydown", onInteraction);
    };
    document.addEventListener("click", onInteraction);
    document.addEventListener("keydown", onInteraction);
    return () => {
      document.removeEventListener("click", onInteraction);
      document.removeEventListener("keydown", onInteraction);
    };
  }, []);

  // Sync state whenever the audio element fires play/pause
  useEffect(() => {
    const audio = getBgAudio();
    const onPlay = () => setPlaying(true);
    const onPause = () => setPlaying(false);
    audio.addEventListener("play", onPlay);
    audio.addEventListener("pause", onPause);
    return () => {
      audio.removeEventListener("play", onPlay);
      audio.removeEventListener("pause", onPause);
    };
  }, []);

  const toggle = () => {
    const audio = getBgAudio();
    if (audio.paused) {
      audio.play().then(() => setPlaying(true)).catch(() => {});
    } else {
      audio.pause();
      setPlaying(false);
    }
  };

  return { playing, toggle };
}

function AdminModal({ onClose, onSuccess }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const submit = (e) => {
    e.preventDefault();
    if (pw === ADMIN_PASSWORD) onSuccess();
    else setErr("Incorrect password");
  };
  return (
    <div className="modal-backdrop">
      <div className="modal" style={{maxWidth:360}}>
        <div className="modal-head"><h2>Admin Access</h2><button className="modal-close" onClick={onClose}>&times;</button></div>
        <div className="modal-body">
          <p style={{color:"var(--text-dim)",fontSize:13,marginBottom:20}}>Enter your admin password to continue</p>
          <form onSubmit={submit}>
            <div className="field"><input type="password" className="input" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" autoFocus /></div>
            {err && <p className="error-msg">{err}</p>}
            <div style={{display:"flex",gap:12}}>
              <button type="button" className="btn-cancel" onClick={onClose}>Cancel</button>
              <button type="submit" className="btn-confirm" disabled={!pw}>Confirm</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

function DonationModal({ onClose }) {
  const [amount, setAmount] = useState("");
  const [activePreset, setActivePreset] = useState(null);
  const presets = ["1","5","10","25","50"];
  const isValid = parseFloat(amount) > 0;
  const handleDonate = () => {
    const num = parseFloat(amount);
    if (!num || num <= 0) return;
    const url = `https://www.paypal.com/send?recipient=${encodeURIComponent(PAYPAL_EMAIL)}&amount=${num.toFixed(2)}&currencyCode=CAD&note=${encodeURIComponent("VTRX Games Donation")}`;
    window.open(url, "_blank");
  };
  return (
    <div className="modal-backdrop">
      <div className="modal" style={{maxWidth:420}}>
        <div style={{display:"flex",justifyContent:"center",paddingTop:18,paddingBottom:4}}>
          <img src={LOGO_SRC} alt="VTRX" style={{width:48,height:48,borderRadius:"50%",objectFit:"cover"}} />
        </div>
        <div className="modal-head">
          <h2>Support VTRX Games</h2>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <p style={{color:"var(--text-dim)",fontSize:14,marginBottom:24,lineHeight:1.6}}>
            Love VTRX Games? Your donation helps keep the platform running and new games coming. Every bit helps! If u have problems donating, u can log in to your paypal and send to vtrx1.official@gmail.com.
          </p>
          <div className="field">
            <label>Enter Amount (CAD)</label>
            <input className="donate-amount-input" type="text" inputMode="decimal"
              value={amount ? `$${amount}` : ""}
              onChange={e => { const raw = e.target.value.replace(/[^0-9.]/g, ""); setAmount(raw); setActivePreset(null); }}
              placeholder="$0.00" autoFocus />
            <div className="donate-presets">
              {presets.map(p => (
                <button key={p} className={`donate-preset-btn${activePreset===p?" active":""}`} onClick={()=>{setAmount(p);setActivePreset(p);}}>${p}</button>
              ))}
            </div>
          </div>
          <div style={{background:"rgba(220,38,38,0.07)",border:"1px solid rgba(220,38,38,0.2)",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:13,color:"var(--text-dim)"}}>
            You will be redirected to PayPal to complete your donation securely.
          </div>
        </div>
        <div className="modal-foot" style={{flexDirection:"column",gap:10}}>
          <button className="donate-paypal-btn" onClick={handleDonate} disabled={!isValid}>
            <span className="paypal-logo">Pay</span><span style={{color:"#009cde",fontStyle:"italic",fontSize:18,fontWeight:700}}>Pal</span>
            &nbsp;— Donate {isValid ? `$${parseFloat(amount).toFixed(2)}` : ""}
          </button>
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function AddModal({ onClose, onAdded }) {
  const [name, setName] = useState("");
  const [desc, setDesc] = useState("");
  const [code, setCode] = useState("");
  const [cat, setCat] = useState("Other");
  const [cover, setCover] = useState(null);
  const [codeFile, setCodeFile] = useState(null);
  const [err, setErr] = useState("");
  const imgRef = useRef(null);
  const codeRef = useRef(null);

  const onImg = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (f.size > 5*1024*1024) { setErr("Image must be under 5MB"); return; }
    const r = new FileReader();
    r.onload = ev => setCover(ev.target.result);
    r.readAsDataURL(f);
  };
  const onCodeFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (!/\.(html?|js)$/i.test(f.name)) { setErr("Please upload an .html or .js file"); return; }
    const r = new FileReader();
    r.onload = ev => { setCode(ev.target.result); setCodeFile(f.name); setErr(""); };
    r.readAsText(f);
  };
  const submit = () => {
    if (!name.trim() || !desc.trim() || !code.trim()) { setErr("Name, description and code are required"); return; }
    const game = { id: Date.now(), name: name.trim(), description: desc.trim(), code: code.trim(), category: cat, coverImage: cover || null, createdAt: new Date().toISOString() };
    const all = loadGames(); all.push(game); saveGames(all); onAdded(game);
  };

  return (
    <div className="modal-backdrop">
      <div className="modal">
        <div className="modal-head"><h2>Add New Game</h2><button className="modal-close" onClick={onClose}>&times;</button></div>
        <div className="modal-body">
          <div className="field"><label>Game Name</label><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Space Shooter" /></div>
          <div className="field"><label>Description</label><textarea className="textarea" rows={3} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Describe the game..." /></div>
          <div className="field">
            <label>Category</label>
            <select className="select" value={cat} onChange={e=>setCat(e.target.value)}>
              {CATEGORIES.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Cover Image <span style={{opacity:.5,fontSize:11}}>(optional)</span></label>
            {cover ? (
              <div className="cover-preview"><img src={cover} alt="cover" /><button className="cover-remove" onClick={()=>setCover(null)}>&times;</button></div>
            ) : (
              <div className="upload-zone" onClick={()=>imgRef.current && imgRef.current.click()}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Upload cover image</span><small>PNG, JPG, GIF up to 5MB</small>
              </div>
            )}
            <input ref={imgRef} type="file" accept="image/*" onChange={onImg} style={{display:"none"}} />
          </div>
          <div className="field">
            <div className="field-row">
              <label>Game Code (HTML/JS)</label>
              <button type="button" className="upload-file-btn" onClick={()=>codeRef.current && codeRef.current.click()}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload file
              </button>
            </div>
            {codeFile && (
              <div className="file-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span>{codeFile}</span>
                <button onClick={()=>{setCode("");setCodeFile(null);if(codeRef.current)codeRef.current.value=""}}>&times;</button>
              </div>
            )}
            <textarea className="textarea mono" rows={8} value={code} onChange={e=>{setCode(e.target.value);if(codeFile)setCodeFile(null);}} placeholder="Paste your HTML/JS code here, or upload a file above..." />
            <input ref={codeRef} type="file" accept=".html,.htm,.js" onChange={onCodeFile} style={{display:"none"}} />
          </div>
          {err && <p className="error-msg">{err}</p>}
        </div>
        <div className="modal-foot">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-confirm" onClick={submit}>Add Game</button>
        </div>
      </div>
    </div>
  );
}

function GameCard({ game, onPlay, isAdmin, onDelete }) {
  return (
    <div className="game-card" onClick={onPlay}>
      <div className="card-thumb">
        {game.coverImage
          ? <img src={game.coverImage} alt={game.name} />
          : <div className="card-thumb-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="white" style={{opacity:.15}}><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z"/></svg></div>
        }
        <div className="card-overlay"><button className="play-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play Now</button></div>
        <span className="card-cat">{game.category}</span>
      </div>
      <div className="card-info">
        <h3>{game.name}</h3>
        <p>{game.description}</p>
        {isAdmin && <button className="card-delete" onClick={e=>{e.stopPropagation();if(window.confirm(`Delete "${game.name}"?`))onDelete(game.id);}}>Delete</button>}
      </div>
    </div>
  );
}

function GamePlayer({ game, onBack, games, onPlay, isAdmin }) {
  const iframeRef = useRef(null);
  const [isFs, setIsFs] = useState(false);
  const [reactions, setReactions] = useState(() => { const a = loadReactions(); return a[game.id] || {thumbs:0,heart:0}; });
  const [voted, setVoted] = useState(() => { const a = loadVoted(); return a[game.id] || {thumbs:false,heart:false}; });

  // For non-admins: toggle once. For admins: each click adds +1 (no limit, no toggle-off).
  const react = (type) => {
    if (isAdmin) {
      // Admin: every click increments by 1
      setReactions(prev => {
        const u = {...prev, [type]: prev[type] + 1};
        const a = loadReactions(); a[game.id] = u; saveReactions(a);
        return u;
      });
    } else {
      // Regular user: toggle vote (can only vote once, clicking again removes it)
      const already = voted[type];
      setVoted(prev => {
        const u = {...prev, [type]: !already};
        const a = loadVoted(); a[game.id] = u; saveVoted(a);
        return u;
      });
      setReactions(prev => {
        const u = {...prev, [type]: prev[type] + (already ? -1 : 1)};
        const a = loadReactions(); a[game.id] = u; saveReactions(a);
        return u;
      });
    }
  };

  useEffect(() => {
    const iframe = iframeRef.current; if (!iframe) return;
    const doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
    if (!doc) return;
    doc.open(); doc.write(game.code); doc.close();
  }, [game.code]);

  useEffect(() => {
    const fn = () => setIsFs(!!document.fullscreenElement);
    document.addEventListener("fullscreenchange", fn);
    return () => document.removeEventListener("fullscreenchange", fn);
  }, []);

  const toggleFs = () => {
    const iframe = iframeRef.current; if (!iframe) return;
    if (!document.fullscreenElement) iframe.requestFullscreen && iframe.requestFullscreen();
    else document.exitFullscreen && document.exitFullscreen();
  };

  const suggestions = games.filter(g => g.id !== game.id);

  return (
    <div className="player">
      <div className="player-bar">
        <button className="back-btn" onClick={onBack}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Games
        </button>
        <div className="divider" />
        <span className="player-title">{game.name}</span>
        <span className="cat-badge">{game.category}</span>
        <button onClick={toggleFs} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:7,padding:"7px 16px",background:"var(--primary)",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          Fullscreen
        </button>
      </div>
      <div className="player-content" style={{flex:1}}>
        <div className="player-iframe-wrap">
          <iframe ref={iframeRef} className="player-iframe" sandbox="allow-scripts allow-same-origin" title={game.name} allowFullScreen />
          <div className="player-below">
            <div style={{display:"flex",alignItems:"baseline",gap:12,flexWrap:"wrap",marginBottom:0}}>
              <h2 style={{marginBottom:0}}>{game.name}</h2>
              <span style={{fontSize:11,fontWeight:700,color:"var(--text-dim)",textDecoration:"underline"}}>Click fullscreen, press twice then wait 2 seconds to play</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,marginBottom:4}}>
              <button onClick={()=>react("thumbs")} style={{display:"flex",alignItems:"center",gap:6,background:voted.thumbs?"rgba(220,38,38,0.3)":"rgba(220,38,38,0.08)",border:`1px solid ${voted.thumbs?"#dc2626":"rgba(220,38,38,0.25)"}`,borderRadius:999,padding:"5px 14px",cursor:"pointer",fontSize:15,color:"#fff",fontWeight:600,transition:"all .2s"}}>
                👍 <span style={{fontSize:13,color:voted.thumbs?"#fca5a5":"var(--text-dim)"}}>{BASE_THUMBS + reactions.thumbs}</span>
              </button>
              <button onClick={()=>react("heart")} style={{display:"flex",alignItems:"center",gap:6,background:voted.heart?"rgba(220,38,38,0.3)":"rgba(220,38,38,0.08)",border:`1px solid ${voted.heart?"#dc2626":"rgba(220,38,38,0.25)"}`,borderRadius:999,padding:"5px 14px",cursor:"pointer",fontSize:15,color:"#fff",fontWeight:600,transition:"all .2s"}}>
                ❤️ <span style={{fontSize:13,color:voted.heart?"#fca5a5":"var(--text-dim)"}}>{BASE_HEART + reactions.heart}</span>
              </button>
            </div>
            <div className="cat-tag" style={{marginTop:4}}>{game.category}</div>
            <p>{game.description}</p>
          </div>
        </div>
        <div className="player-sidebar">
          <h3>More Games</h3>
          {suggestions.length === 0 && <p style={{color:"var(--text-dim)",fontSize:13}}>No other games yet.</p>}
          {suggestions.map(g => (
            <div key={g.id} className="suggestion-card" onClick={()=>onPlay(g)}>
              <div className="suggestion-thumb">
                {g.coverImage ? <img src={g.coverImage} alt={g.name} />
                  : <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style={{opacity:.25}}><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z"/></svg>
                }
              </div>
              <div className="suggestion-info"><strong>{g.name}</strong><span>{g.category}</span></div>
            </div>
          ))}
        </div>
      </div>
      {isFs && (
        <button className="fs-exit-btn" onClick={toggleFs}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
          Exit Fullscreen
        </button>
      )}
    </div>
  );
}

function CreditsPage({ onBack }) {
  const [credits, setCredits] = useState(() => loadCredits());
  const [showPwModal, setShowPwModal] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  const [showAddForm, setShowAddForm] = useState(false);
  const [newName, setNewName] = useState("");
  const [pw, setPw] = useState("");
  const [pwErr, setPwErr] = useState("");

  const handlePlusClick = () => { if (isAdmin) setShowAddForm(true); else setShowPwModal(true); };
  const handlePwSubmit = (e) => {
    e.preventDefault();
    if (pw === ADMIN_PASSWORD) { setIsAdmin(true); setShowPwModal(false); setShowAddForm(true); setPw(""); setPwErr(""); }
    else setPwErr("Incorrect password");
  };
  const handleSave = () => {
    const t = newName.trim(); if (!t) return;
    const u = [...credits, t]; setCredits(u); saveCredits(u); setNewName(""); setShowAddForm(false);
  };
  const handleDelete = (i) => { const u = credits.filter((_,idx)=>idx!==i); setCredits(u); saveCredits(u); };

  return (
    <div style={{minHeight:"100vh",background:"#000",color:"#fff",display:"flex",flexDirection:"column",position:"relative"}}>
      <img src={LOGO_SRC} alt="VTRX" style={{position:"absolute",top:8,right:16,width:56,height:56,borderRadius:"50%",objectFit:"cover",zIndex:10,pointerEvents:"none"}} />
      <div style={{display:"flex",alignItems:"center",gap:16,padding:"0 24px",height:52,borderBottom:"1px solid #2a0000",flexShrink:0}}>
        <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",color:"#a07070",fontSize:13,cursor:"pointer"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Games
        </button>
        <span style={{fontWeight:700,fontSize:15,color:"#fff",borderLeft:"1px solid #2a0000",paddingLeft:16}}>Credits</span>
        <button onClick={handlePlusClick} style={{marginLeft:"auto",marginRight:68,width:32,height:32,borderRadius:6,background:"#dc2626",color:"#fff",border:"none",fontSize:22,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:"1"}}>+</button>
      </div>
      <div style={{maxWidth:600,margin:"60px auto",padding:"0 24px",width:"100%"}}>
        <h1 style={{fontSize:32,fontWeight:900,marginBottom:40,color:"#fff"}}>Credits</h1>
        {showAddForm && (
          <div style={{background:"#130000",border:"1px solid #2a0000",borderRadius:10,padding:20,marginBottom:32}}>
            <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") handleSave(); if(e.key==="Escape") setShowAddForm(false); }}
              placeholder="Enter name..."
              style={{width:"100%",background:"#1a0000",border:"1px solid #3a0000",color:"#fff",borderRadius:6,padding:"10px 14px",fontSize:14,outline:"none",marginBottom:12}} />
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowAddForm(false)} style={{flex:1,padding:"8px",borderRadius:6,border:"1px solid #2a0000",background:"none",color:"#a07070",fontSize:14,cursor:"pointer"}}>Cancel</button>
              <button onClick={handleSave} disabled={!newName.trim()} style={{flex:1,padding:"8px",borderRadius:6,background:"#dc2626",color:"#fff",border:"none",fontSize:14,fontWeight:600,cursor:"pointer",opacity:newName.trim()?1:0.5}}>Save</button>
            </div>
          </div>
        )}
        {credits.length === 0 && !showAddForm && <p style={{color:"#6b4040",fontSize:14}}>No credits added yet.</p>}
        <ul style={{listStyle:"none",padding:0,display:"flex",flexDirection:"column",gap:10}}>
          {credits.map((name,i) => (
            <li key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#130000",border:"1px solid #2a0000",borderRadius:8,padding:"12px 16px",fontSize:15,color:"#fff"}}>
              <span>{name}</span>
              {isAdmin && <button onClick={()=>handleDelete(i)} style={{background:"none",border:"none",color:"#6b4040",cursor:"pointer",fontSize:18,lineHeight:"1"}}>&times;</button>}
            </li>
          ))}
        </ul>
      </div>
      {showPwModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
          <div style={{background:"#130000",border:"1px solid #2a0000",borderRadius:16,width:"100%",maxWidth:340,padding:32}}>
            <h2 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:8}}>Admin Access</h2>
            <p style={{color:"#a07070",fontSize:13,marginBottom:20}}>Enter your admin password to add credits</p>
            <form onSubmit={handlePwSubmit}>
              <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr("");}} placeholder="Password" autoFocus
                style={{width:"100%",background:"#1a0000",border:"1px solid #3a0000",color:"#fff",borderRadius:6,padding:"10px 14px",fontSize:14,outline:"none",marginBottom:8}} />
              {pwErr && <p style={{color:"#f75e5e",fontSize:13,marginBottom:8}}>{pwErr}</p>}
              <div style={{display:"flex",gap:10,marginTop:8}}>
                <button type="button" onClick={()=>{setShowPwModal(false);setPw("");setPwErr("");}} style={{flex:1,padding:"10px",borderRadius:6,border:"1px solid #2a0000",background:"none",color:"#a07070",fontSize:14,cursor:"pointer"}}>Cancel</button>
                <button type="submit" disabled={!pw} style={{flex:1,padding:"10px",borderRadius:6,background:"#dc2626",color:"#fff",border:"none",fontSize:14,fontWeight:600,cursor:"pointer",opacity:pw?1:0.5}}>Confirm</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [games, setGames] = useState(() => loadGames());
  const [selected, setSelected] = useState(null);
  const [cat, setCat] = useState("All");
  const [showAdminBtn, setShowAdminBtn] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  const [showAdminModal, setShowAdminModal] = useState(false);
  const [showAddModal, setShowAddModal] = useState(false);
  const [showCredits, setShowCredits] = useState(false);
  const [showDonation, setShowDonation] = useState(false);
  const clicksRef = useRef(0);
  const timerRef = useRef(null);
  const onlineUsers = useOnlineUsers();
  const { playing, toggle } = useBgMusic();

  const handleLogo = () => {
    clicksRef.current++;
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => { clicksRef.current = 0; }, 2000);
    if (clicksRef.current >= 5) {
      clicksRef.current = 0;
      setShowAdminBtn(v => !v);
      // If admin button becomes visible and password hasn't been entered yet, show the modal
      if (!showAdminBtn && !isAdmin) {
        setShowAdminModal(true);
      }
    }
  };

  // When admin modal is confirmed successfully, mark as admin (don't auto-open add game)
  const handleAdminOk = () => { setIsAdmin(true); setShowAdminModal(false); };
  const handleAdded = (g) => { setGames(all => [...all, g]); setShowAddModal(false); };
  const handleDelete = (id) => { const all = games.filter(g=>g.id!==id); saveGames(all); setGames(all); };
  const filtered = games.filter(g => cat === "All" || g.category === cat);

  if (showCredits) return <CreditsPage onBack={()=>setShowCredits(false)} />;

  if (selected) return (
    <>
      <GamePlayer game={selected} onBack={()=>setSelected(null)} games={games} onPlay={g=>setSelected(g)} isAdmin={isAdmin} />
      {showAddModal && <AddModal onClose={()=>setShowAddModal(false)} onAdded={handleAdded} />}
    </>
  );

  return (
    <>
      <header className="header">
        <div className="logo" onClick={handleLogo}>
          <div className="logo-icon">
            <img src={LOGO_SRC} alt="VTRX" draggable="false" style={{width:"100%",height:"100%",objectFit:"cover"}} />
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:1}}>
            <div className="logo-text">VTRX <span>Games!</span></div>
            <span style={{fontSize:11,color:"var(--text-dim)",letterSpacing:"0.4px",opacity:0.55,lineHeight:1}}>ֆȶօռɛӄɨʟʟɛʀ!</span>
          </div>
        </div>
        <div className="header-right">
          <button onClick={toggle} title={playing?"Pause music":"Play background music"}
            style={{width:36,height:36,borderRadius:8,background:playing?"rgba(220,38,38,0.25)":"rgba(220,38,38,0.08)",border:`1px solid ${playing?"#dc2626":"rgba(220,38,38,0.3)"}`,color:playing?"#dc2626":"var(--text-dim)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",flexShrink:0}}>
            {playing ? "🔊" : "🔇"}
          </button>
          <div className="online-badge">
            <div className="online-dot" />
            <span className="online-count">{onlineUsers}</span>
            <span>online</span>
          </div>
          <button className="header-btn" onClick={()=>setShowDonation(true)}>Donations</button>
          <button className="header-btn" onClick={()=>setShowCredits(true)}>Credits</button>
          {showAdminBtn && <button className="add-btn" onClick={()=>{ if(isAdmin) setShowAddModal(true); else setShowAdminModal(true); }}>+</button>}
        </div>
      </header>

      <main className="main">
        <div className="hero">
          <p className="hero-founded"><strong>Founded and created by VTRX!</strong></p>
          <h1>VTRX Games!</h1>
          <p>Discover and play awesome browser games on VTRX Games! If there are any bugs, reports, or suggestions you can email me at <strong style={{textDecoration:"underline"}}>vtrx1.official@gmail.com</strong></p>
        </div>
        <div className="cats">
          {CATEGORIES.map(c => (
            <button key={c} className={`cat-btn${cat===c?" active":""}`} onClick={()=>setCat(c)}>{c}</button>
          ))}
        </div>
        {filtered.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z"/>
              </svg>
            </div>
            <h2>{cat!=="All" ? "No games found" : "No games yet"}</h2>
            <p>{cat!=="All" ? "Try a different category" : "Games will appear here once they're added"}</p>
          </div>
        ) : (
          <div className="grid">
            {filtered.map(g => (
              <GameCard key={g.id} game={g} onPlay={()=>setSelected(g)} isAdmin={isAdmin} onDelete={handleDelete} />
            ))}
          </div>
        )}
      </main>

      {showAdminModal && <AdminModal onClose={()=>setShowAdminModal(false)} onSuccess={handleAdminOk} />}
      {showAddModal && <AddModal onClose={()=>setShowAddModal(false)} onAdded={handleAdded} />}
      {showDonation && <DonationModal onClose={()=>setShowDonation(false)} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
