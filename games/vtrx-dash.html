<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTRX Dash!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
    color: #fff;
  }
  #gameContainer { position: relative; width: 900px; height: 500px; }
  canvas {
    display: block;
    border: 2px solid #cc0000;
    box-shadow: 0 0 30px #cc000088, 0 0 60px #cc000033;
    background: #0d0d0d;
  }
  #ui { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  #levelSelect {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.93);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; pointer-events: all;
  }
  #levelSelect h1 {
    font-size: 52px; color: #cc0000;
    text-shadow: 0 0 20px #ff0000, 0 0 40px #cc000088;
    letter-spacing: 6px; margin-bottom: 6px;
  }
  #levelSelect p.tagline { color: #666; font-size: 12px; letter-spacing: 3px; margin-bottom: 36px; }
  .levelGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .levelBtn {
    width: 110px; height: 86px;
    background: linear-gradient(135deg, #1a0000, #2a0000);
    border: 2px solid #550000; border-radius: 8px;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: all 0.15s; position: relative; overflow: hidden; pointer-events: all;
  }
  .levelBtn:hover { border-color: #cc0000; box-shadow: 0 0 14px #cc000066; transform: translateY(-2px); }
  .levelBtn .lnum { font-size: 22px; font-weight: 900; color: #cc0000; text-shadow: 0 0 8px #ff0000; }
  .levelBtn .lname { font-size: 9px; color: #777; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .levelBtn .lstar { font-size: 10px; color: #880000; margin-top: 3px; }
  .levelBtn .ldiff {
    font-size: 8px; margin-top: 3px; padding: 1px 6px;
    border-radius: 3px; text-transform: uppercase; letter-spacing: 1px;
  }
  .levelBtn .lcheck {
    position: absolute; top: 5px; right: 7px;
    font-size: 14px; color: #00cc44;
    text-shadow: 0 0 6px #00ff55;
  }
  .diff-easy   { background: #002200; color: #00cc44; }
  .diff-normal { background: #221100; color: #ffcc00; }
  .diff-hard   { background: #2a0000; color: #ff6600; }
  .diff-harder { background: #2a0000; color: #ff3300; }
  .diff-insane { background: #2a0000; color: #cc0000; }
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.86);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9; pointer-events: all;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 46px; margin-bottom: 8px; letter-spacing: 4px; }
  #overlay .sub { font-size: 13px; color: #777; margin-bottom: 26px; letter-spacing: 2px; }
  #overlay .pct { font-size: 20px; color: #cc0000; margin-bottom: 18px; }
  .btn {
    padding: 11px 30px; margin: 5px;
    background: linear-gradient(135deg, #330000, #550000);
    border: 2px solid #cc0000; color: #fff;
    font-size: 13px; font-family: 'Arial Black', Arial, sans-serif;
    letter-spacing: 2px; cursor: pointer; border-radius: 4px;
    transition: all 0.15s; text-transform: uppercase; pointer-events: all;
  }
  .btn:hover { background: linear-gradient(135deg, #550000, #880000); box-shadow: 0 0 14px #cc000066; }
  .btn-dim { background: linear-gradient(135deg, #111, #1a1a1a) !important; border-color: #333 !important; color: #666 !important; }
  #hud {
    position: absolute; top: 12px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; align-items: center; pointer-events: none;
  }
  #hudLevel { font-size: 12px; color: #cc0000; letter-spacing: 2px; }
  #hudPct { font-size: 12px; color: #666; letter-spacing: 2px; }
  #progressBar {
    position: absolute; bottom: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #cc0000, #ff4444);
    box-shadow: 0 0 6px #ff0000;
  }
  .controls-hint { position: absolute; bottom: 10px; right: 12px; font-size: 10px; color: #2a2a2a; letter-spacing: 1px; }
</style>
</head>

// ── OBSTACLE HELPERS ──
// makeBlock: block sits ON the ground, th = height in tiles
function makeBlock(tx, th, tw) {
  tw = tw || 1;
  return { type:'block', x:tx*TILE, y:GROUND_Y - th*TILE, w:tw*TILE, h:th*TILE };
}
// makeSpike: spike sits on ground at tile tx
function makeSpike(tx) {
  return { type:'spike', x:tx*TILE, y:GROUND_Y };
}
// makeSaw: spinning saw, center hovers just above ground
function makeSaw(tx) {
  return { type:'saw', x:tx*TILE + TILE/2, y:GROUND_Y - 30, r:26 };
}
// makeSawHigh: elevated saw, ty = tiles above ground (center)
function makeSawHigh(tx, ty) {
  return { type:'saw', x:tx*TILE + TILE/2, y:GROUND_Y - ty*TILE, r:22 };
}
// makePlatform: floating platform, ty = tiles above ground (top surface)
function makePlatform(tx, ty, tw) {
  return { type:'platform', x:tx*TILE, y:GROUND_Y - ty*TILE, w:tw*TILE, h:10 };

// ── COMPLETED LEVELS (localStorage) ──
function getCompleted() {
  try { return JSON.parse(localStorage.getItem('vtrx_completed') || '[]'); }
  catch(e) { return []; }
}
function markCompleted(idx) {
  const c = getCompleted();
  if (!c.includes(idx)) { c.push(idx); localStorage.setItem('vtrx_completed', JSON.stringify(c)); }
}

// ── LEVEL SELECT UI ──
function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const completed = getCompleted();
  LEVELS.forEach((lvl, i) => {
    const btn = document.createElement('div');
    btn.className = 'levelBtn';
    const stars = '★'.repeat(lvl.stars) + '☆'.repeat(5 - lvl.stars);
    const check = completed.includes(i) ? '<span class="lcheck">✓</span>' : '';
    btn.innerHTML = `
      ${check}
      <span class="lnum">${i+1}</span>
      <span class="lname">${lvl.name}</span>
      <span class="lstar">${stars}</span>
      <span class="ldiff ${lvl.diffClass}">${lvl.diff}</span>
    `;
    btn.addEventListener('click', () => startLevel(i));
    grid.appendChild(btn);
  });
}
buildLevelGrid();

// ── GAME STATE ──
let state = 'menu';
let currentLevelIdx = 0;
let attempts = 0;
let sawAngle = 0;
let camX = 0;

const player = {
  x: 100, y: 0,
  vy: 0, w: 36, h: 36,
  grounded: false, onPlatform: false,
};

const GRAVITY = 0.72;
const JUMP_VY = -16;
const MAX_FALL = 18;
const PLAYER_X = 100;

function startLevel(idx) {
  currentLevelIdx = idx;
  attempts = 0;
  document.getElementById('levelSelect').style.display = 'none';
  beginRun();
}

function beginRun() {
  const lvl = LEVELS[currentLevelIdx];
  state = 'playing';
  attempts++;
  player.x = PLAYER_X;
  player.y = GROUND_Y - player.h;
  player.vy = 0;
  player.grounded = true;
  player.onPlatform = false;
  camX = 0;
  sawAngle = 0;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hudLevel').textContent = `LEVEL ${currentLevelIdx+1} — ${lvl.name.toUpperCase()}`;
  document.getElementById('hudPct').textContent = '0%';
  document.getElementById('progressBar').style.width = '0%';
}

function showDeath() {
  state = 'dead';
  const pct = Math.min(99, Math.floor(camX / (LEVELS[currentLevelIdx].length * TILE) * 100));
  document.getElementById('overlayTitle').textContent = 'YOU DIED';
  document.getElementById('overlayTitle').style.color = '#cc0000';
  document.getElementById('overlaySub').textContent = `attempt ${attempts}`;
  document.getElementById('overlayPct').textContent = `reached ${pct}%`;
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnRestart').style.display = '';
  document.getElementById('overlay').classList.add('show');
}

function showWin() {
  state = 'win';
  markCompleted(currentLevelIdx);
  document.getElementById('overlayTitle').textContent = 'LEVEL COMPLETE!';
  document.getElementById('overlayTitle').style.color = '#ffcc00';
  document.getElementById('overlaySub').textContent = `completed in ${attempts} attempt${attempts===1?'':'s'}`;
  document.getElementById('overlayPct').textContent = '100% ✓';
  document.getElementById('overlayPct').style.color = '#00cc44';
  document.getElementById('btnRestart').style.display = 'none';
  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = currentLevelIdx < LEVELS.length - 1 ? '' : 'none';
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('btnRestart').onclick = () => beginRun();
document.getElementById('btnNext').onclick = () => { currentLevelIdx++; attempts = 0; beginRun(); };
document.getElementById('btnMenu').onclick = () => {
  state = 'menu';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('levelSelect').style.display = 'flex';
  buildLevelGrid();
};

// ── INPUT ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); doJump(); }
});
canvas.addEventListener('mousedown', doJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); doJump(); });

function doJump() {
  if (state !== 'playing') return;
  if (player.grounded || player.onPlatform) {
    player.vy = JUMP_VY;
    player.grounded = false;
    player.onPlatform = false;
  }
}

// ── COLLISION HELPERS ──
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function circleRect(cx,cy,cr, rx,ry,rw,rh) {
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx-nx, dy = cy-ny;
  return dx*dx + dy*dy < cr*cr;
}
function triHit(px,py,pw,ph, tx,ty) {
  // spike triangle: base at (tx, ty), tip at (tx+TILE/2, ty-TILE)
  // shrink player hitbox by 5px each side
  const hx = px+5, hy = py+5, hw = pw-10, hh = ph-10;
  const corners = [[hx,hy],[hx+hw,hy],[hx,hy+hh],[hx+hw,hy+hh]];
  const ax = tx+TILE/2, ay = ty-TILE;
  const bx2 = tx, by2 = ty;
  const cx2 = tx+TILE, cy2 = ty;
  for (const [px2,py2] of corners) {
    const d1 = (px2-bx2)*(ay-by2)-(ax-bx2)*(py2-by2);
    const d2 = (px2-cx2)*(by2-cy2)-(bx2-cx2)*(py2-cy2);
    const d3 = (px2-ax)*(cy2-ay)-(cx2-ax)*(py2-ay);
    const hasNeg = (d1<0)||(d2<0)||(d3<0);
    const hasPos = (d1>0)||(d2>0)||(d3>0);
    if (!(hasNeg && hasPos)) return true;
  }
  return false;
}

// ── UPDATE ──
function update() {
  const lvl = LEVELS[currentLevelIdx];
  const totalLen = lvl.length * TILE;
  const speed = 6 + currentLevelIdx * 0.5;

  camX += speed;
  if (camX >= totalLen) { showWin(); return; }

  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.y += player.vy;

  player.grounded = false;
  player.onPlatform = false;

  const px = player.x, pw = player.w, ph = player.h;
  let py = player.y;

  // ground
  if (py + ph >= GROUND_Y) {
    player.y = GROUND_Y - ph;
    player.vy = 0;
    player.grounded = true;
    py = player.y;
  }
  // ceiling = death
  if (py < 0) { showDeath(); return; }

  // obstacles
  for (const obs of lvl.obstacles) {
    const ox = obs.x - camX + PLAYER_X;
    if (ox > W + 100 || ox < -200) continue;

    if (obs.type === 'block') {
      const bx = ox, by = obs.y, bw = obs.w, bh = obs.h;
      if (rectOverlap(px,py,pw,ph, bx,by,bw,bh)) {
        const prevBot = py + ph - player.vy;
        if (player.vy >= 0 && prevBot <= by + 5) {
          player.y = by - ph;
          player.vy = 0;
          player.grounded = true;
        } else {
          showDeath(); return;
        }
      }
    } else if (obs.type === 'platform') {
      const bx = ox, by = obs.y, bw = obs.w, bh = obs.h;
      const prevBot = py + ph - player.vy;
      if (player.vy >= 0 && prevBot <= by + 6 && py + ph >= by && px+pw > bx && px < bx+bw) {
        player.y = by - ph;
        player.vy = 0;
        player.onPlatform = true;
      }
    } else if (obs.type === 'spike') {
      if (triHit(px, py, pw, ph, ox, obs.y)) { showDeath(); return; }
    } else if (obs.type === 'saw') {
      const sx = ox - TILE/2 + obs.x - Math.floor(obs.x/TILE)*TILE; // use stored center offset
      const scx = obs.x - Math.floor(obs.x/TILE)*TILE === 0 ? ox + 0 : ox; // center already in obs.x offset
      // obs.x = tx*TILE, center = ox is already at tx*TILE - camX + PLAYER_X, we added TILE/2 in helper
      // So actual center screen x = obs.x - camX + PLAYER_X, but obs.x has +TILE/2 baked in from makeSaw
      const scx2 = obs.x - camX + PLAYER_X;
      const scy = obs.y;
      if (circleRect(scx2, scy, obs.r - 4, px+4, py+4, pw-8, ph-8)) {
        showDeath(); return;
      }
    }
  }

  const pct = Math.min(100, Math.floor(camX / totalLen * 100));
  document.getElementById('hudPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

// ── DRAW ──
function drawBg(lvl) {
  ctx.fillStyle = lvl.bgColor;
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = lvl.gridColor;
  ctx.lineWidth = 1;
  const off = camX % TILE;
  for (let x = -off; x < W; x += TILE) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += TILE) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawGround(lvl) {
  const g = ctx.createLinearGradient(0,GROUND_Y,0,H);
  g.addColorStop(0,'#220000'); g.addColorStop(1,'#0a0000');
  ctx.fillStyle = g;
  ctx.fillRect(0,GROUND_Y,W,TILE);
  ctx.strokeStyle = lvl.accentColor;
  ctx.lineWidth = 2;
  ctx.shadowBlur = 8; ctx.shadowColor = lvl.accentColor;
  ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#330000'; ctx.lineWidth = 1;
  const off = camX % TILE;
  for (let x = -off; x < W; x += TILE) ctx.strokeRect(x, GROUND_Y, TILE, TILE);
}

function drawObstacles(lvl) {
  sawAngle += 0.05;
  for (const obs of lvl.obstacles) {
    const ox = obs.x - camX + PLAYER_X;
    if (ox > W+120 || ox < -120) continue;

    if (obs.type === 'block') {
      const g = ctx.createLinearGradient(ox, obs.y, ox+obs.w, obs.y+obs.h);
      g.addColorStop(0,'#3a0000'); g.addColorStop(1,'#550000');
      ctx.fillStyle = g;
      ctx.fillRect(ox, obs.y, obs.w, obs.h);
      ctx.strokeStyle = lvl.accentColor; ctx.lineWidth = 2;
      ctx.shadowBlur = 5; ctx.shadowColor = lvl.accentColor;
      ctx.strokeRect(ox, obs.y, obs.w, obs.h);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#440000'; ctx.lineWidth = 1;
      ctx.strokeRect(ox+3, obs.y+3, obs.w-6, obs.h-6);

    } else if (obs.type === 'platform') {
      ctx.fillStyle = '#440000';
      ctx.fillRect(ox, obs.y, obs.w, obs.h);
      ctx.fillStyle = lvl.accentColor;
      ctx.fillRect(ox, obs.y, obs.w, 3);
      ctx.shadowBlur = 8; ctx.shadowColor = lvl.accentColor;
      ctx.strokeStyle = lvl.accentColor; ctx.lineWidth = 1;
      ctx.strokeRect(ox, obs.y, obs.w, obs.h);
      ctx.shadowBlur = 0;

    } else if (obs.type === 'spike') {
      const sx = ox, sy = obs.y;
      ctx.beginPath();
      ctx.moveTo(sx + TILE/2, sy - TILE);
      ctx.lineTo(sx, sy);
      ctx.lineTo(sx + TILE, sy);
      ctx.closePath();
      const g2 = ctx.createLinearGradient(sx, sy-TILE, sx, sy);
      g2.addColorStop(0, lvl.accentColor); g2.addColorStop(1,'#220000');
      ctx.fillStyle = g2; ctx.fill();
      ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 1.5;
      ctx.shadowBlur = 6; ctx.shadowColor = lvl.accentColor;
      ctx.stroke(); ctx.shadowBlur = 0;

    } else if (obs.type === 'saw') {
      const scx = obs.x - camX + PLAYER_X;
      const scy = obs.y;
      ctx.save();
      ctx.translate(scx, scy);
      ctx.rotate(sawAngle);
      const teeth = 10;
      for (let t = 0; t < teeth; t++) {
        const a1 = (t/teeth)*Math.PI*2;
        const a2 = ((t+0.5)/teeth)*Math.PI*2;
        const a3 = ((t+1)/teeth)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a1)*obs.r, Math.sin(a1)*obs.r);
        ctx.lineTo(Math.cos(a2)*(obs.r+9), Math.sin(a2)*(obs.r+9));
        ctx.lineTo(Math.cos(a3)*obs.r, Math.sin(a3)*obs.r);
        ctx.fillStyle = lvl.accentColor; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(0,0,obs.r,0,Math.PI*2);
      ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2.5;
      ctx.shadowBlur = 10; ctx.shadowColor = lvl.accentColor;
      ctx.stroke(); ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(0,0,obs.r*0.45,0,Math.PI*2);
      ctx.fillStyle = '#1a0000'; ctx.fill();
      ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();
    }
  }
}

function drawPlayer(lvl) {
  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  ctx.save();
  ctx.shadowBlur = 18; ctx.shadowColor = lvl.accentColor;
  const pg = ctx.createLinearGradient(px,py,px+pw,py+ph);
  pg.addColorStop(0,'#ff5555'); pg.addColorStop(1,'#880000');
  ctx.fillStyle = pg;
  ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 2;
  ctx.strokeRect(px,py,pw,ph);
  ctx.shadowBlur = 0;
  // inner cross detail
  ctx.strokeStyle = 'rgba(255,180,180,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px+pw/2, py+4); ctx.lineTo(px+pw/2, py+ph-4);
  ctx.moveTo(px+4, py+ph/2); ctx.lineTo(px+pw-4, py+ph/2);
  ctx.stroke();
  // center dot
  ctx.beginPath(); ctx.arc(px+pw/2, py+ph/2, 4, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
}

// ── MAIN LOOP ──
let lastTime = 0;
function tick(ts) {
  if (state === 'playing') update();
  const lvl = LEVELS[currentLevelIdx];
  if (state !== 'menu') {
    drawBg(lvl);
    drawObstacles(lvl);
    drawGround(lvl);
    drawPlayer(lvl);
    // attempt counter
    ctx.fillStyle = '#333';
    ctx.font = '11px Arial';
    ctx.fillText(`ATTEMPT ${attempts}`, W-100, 28);
  } else {
    ctx.fillStyle = '#0d0000';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#150000'; ctx.lineWidth = 1;
    for (let x = 0; x < W; x += TILE) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += TILE) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
