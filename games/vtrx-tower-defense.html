<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VTRX Tower Defense!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-dfoirection:column;align-items:center;justify-content:center;min-height:100vh;user-select:none;overflow:hidden}
#wrap{display:flex;border:2px solid #222;box-shadow:0 0 40px rgba(220,38,38,0.3)}
canvas{display:block;cursor:crosshair}
#panel{width:190px;background:#0f0f0f;border-left:2px solid #222;padding:12px 10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#aaa}
.sv{font-weight:800;font-size:14px}
.sv.g{color:#4ade80}.sv.r{color:#f87171}.sv.y{color:#facc15}.sv.w{color:#fff}
.divider{height:1px;background:#222;margin:2px 0}
.ptitle{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px}
.tbtn{display:flex;flex-direction:column;padding:8px 10px;border-radius:7px;border:1px solid #2a2a2a;background:#1a1a1a;cursor:pointer;transition:all .15s;width:100%;text-align:left;gap:2px}
.tbtn:hover{background:#1e2e1e;border-color:#4ade80}
.tbtn.active{background:#162616;border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,0.3)}
.tbtn .tname{font-size:13px;font-weight:700;color:#fff}
.tbtn .tcost{font-size:12px;color:#facc15;font-weight:700}
.tbtn .tstats{font-size:10px;color:#666;line-height:1.4}
#start-btn{padding:10px;border-radius:8px;background:linear-gradient(135deg,#7f0000,#dc2626);border:1px solid #ef4444;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;box-shadow:0 0 12px rgba(220,38,38,0.4)}
#start-btn:hover{opacity:.85}
#start-btn:disabled{opacity:.4;cursor:default;box-shadow:none}
#msg{font-size:11px;color:#777;text-align:center;min-height:32px;line-height:1.5;padding:2px 4px}
#sell-btn{padding:8px;border-radius:7px;background:#1a0a2e;border:1px solid #7c3aed;color:#c4b5fd;font-size:12px;font-weight:600;cursor:pointer;display:none;transition:background .15s}
#sell-btn:hover{background:#2a1a4e}
#wave-progress{height:4px;background:#222;border-radius:2px;overflow:hidden}
#wave-bar{height:100%;background:#dc2626;border-radius:2px;width:0%;transition:width .3s}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="panel">
    <div style="font-size:14px;font-weight:900;color:#dc2626;text-align:center;letter-spacing:0.5px">⚔️ VTRX DEFENSE</div>
    <div class="divider"></div>
    <div class="stat-row"><span>💰 Money</span><span class="sv y" id="s-money">$200</span></div>
    <div class="stat-row"><span>❤️ Base HP</span><span class="sv r" id="s-lives">5</span></div>
    <div class="stat-row"><span>🌊 Wave</span><span class="sv w" id="s-wave">0 / 30</span></div>
    <div class="stat-row"><span>💀 Kills</span><span class="sv g" id="s-kills">0</span></div>
    <div id="wave-progress"><div id="wave-bar"></div></div>
    <div class="divider"></div>
    <div class="ptitle">Towers — click to select</div>

    <button class="tbtn" data-type="gun" onclick="selectTower('gun')">
      <div class="tname">🔫 Machine Gun</div>
      <div class="tcost">$75</div>
      <div class="tstats">DMG: 18 · Rate: Fast · Range: Short</div>
    </button>
    <button class="tbtn" data-type="missile" onclick="selectTower('missile')">
      <div class="tname">🚀 Missile Launcher</div>
      <div class="tcost">$125</div>
      <div class="tstats">DMG: 70 · Rate: Slow · Splash · Long</div>
    </button>
    <button class="tbtn" data-type="sniper" onclick="selectTower('sniper')">
      <div class="tname">🎯 Sniper Tower</div>
      <div class="tcost">$100</div>
      <div class="tstats">DMG: 90 · Rate: Med · Range: Max</div>
    </button>
    <button class="tbtn" data-type="slow" onclick="selectTower('slow')">
      <div class="tname">❄️ Cryo Tower</div>
      <div class="tcost">$90</div>
      <div class="tstats">DMG: 10 · Slows enemies · Med range</div>
    </button>

    <div class="divider"></div>
    <button id="start-btn" onclick="startWave()">▶ Start Wave 1</button>
    <button id="sell-btn" onclick="sellSelected()">💸 Sell Tower</button>
    <div id="msg">Select a tower then click green tiles to place. Enemies follow the road!</div>
    <div class="divider"></div>
    <div class="ptitle">Controls</div>
    <div style="font-size:10px;color:#555;line-height:1.8">
      Click tower → place it<br>
      Click placed tower → select/sell<br>
      ESC → cancel selection<br>
      Path shown with arrows →
    </div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const CELL = 44;
const COLS = 18;
const ROWS = 12;
const W = COLS * CELL; // 792
const H = ROWS * CELL; // 528

// Path as [col, row] grid coords
const WAYPOINTS = [
  [0,6],[4,6],[4,2],[9,2],[9,9],[14,9],[14,4],[17,4]
];

// Tower definitions
const T_DEFS = {
  gun:     {name:'Machine Gun', cost:75,  icon:'🔫', range:3.2, dmg:18,  rate:12, splashR:0,   color:'#22c55e', sell:35},
  missile: {name:'Missile',     cost:125, icon:'🚀', range:5.0, dmg:70,  rate:55, splashR:1.1, color:'#ef4444', sell:60},
  sniper:  {name:'Sniper',      cost:100, icon:'🎯', range:7.0, dmg:90,  rate:40, splashR:0,   color:'#a855f7', sell:50},
  slow:    {name:'Cryo',        cost:90,  icon:'❄️', range:3.8, dmg:10,  rate:25, splashR:0.8, color:'#38bdf8', sell:45, slows:true},
};

// Enemy definitions
const E_DEFS = {
  infantry: {icon:'🪖', hp:80,   speed:1.5,  reward:12, r:13, color:'#86efac'},
  apc:      {icon:'🚛', hp:280,  speed:0.95, reward:28, r:17, color:'#93c5fd'},
  tank:     {icon:'🛡️', hp:650,  speed:0.50, reward:55, r:20, color:'#fca5a5'},
  heli:     {icon:'🚁', hp:200,  speed:1.2,  reward:35, r:16, color:'#fde68a'},
};

// Waves: array of spawn groups
const WAVES = [
  // ── Waves 1–10 (Original) ────────────────────────────────────────────────
  [{t:'infantry',n:8,  gap:55}],
  [{t:'infantry',n:12, gap:45}],
  [{t:'infantry',n:10, gap:45},{t:'apc',n:2,gap:80}],
  [{t:'apc',n:5, gap:65}],
  [{t:'infantry',n:15, gap:38},{t:'apc',n:3,gap:75}],
  [{t:'apc',n:6, gap:55},{t:'tank',n:2,gap:100}],
  [{t:'infantry',n:20, gap:32},{t:'tank',n:3,gap:110}],
  [{t:'heli',n:6,gap:50},{t:'apc',n:8,gap:50},{t:'tank',n:2,gap:100}],
  [{t:'infantry',n:25, gap:28},{t:'apc',n:8,gap:45},{t:'tank',n:4,gap:90}],
  [{t:'infantry',n:30, gap:22},{t:'apc',n:12,gap:40},{t:'tank',n:6,gap:80},{t:'heli',n:8,gap:45}],
  // ── Waves 11–20 (Advanced) ──────────────────────────────────────────────
  [{t:'infantry',n:35, gap:20},{t:'heli',n:10,gap:42}],
  [{t:'apc',n:15, gap:38},{t:'tank',n:4,gap:85}],
  [{t:'infantry',n:30, gap:20},{t:'tank',n:7, gap:75},{t:'heli',n:6,gap:50}],
  [{t:'heli',n:16,gap:35},{t:'apc',n:10,gap:45},{t:'tank',n:5,gap:80}],
  [{t:'infantry',n:40, gap:18},{t:'apc',n:14,gap:38},{t:'tank',n:6,gap:78}],
  [{t:'infantry',n:45, gap:16},{t:'heli',n:14,gap:32}],
  [{t:'tank',n:10,gap:70},{t:'apc',n:16,gap:34},{t:'heli',n:8,gap:38}],
  [{t:'infantry',n:50, gap:15},{t:'apc',n:18,gap:32},{t:'tank',n:8,gap:72}],
  [{t:'heli',n:20,gap:28},{t:'tank',n:10,gap:65},{t:'apc',n:12,gap:36}],
  [{t:'infantry',n:55, gap:14},{t:'apc',n:20,gap:30},{t:'tank',n:10,gap:65},{t:'heli',n:14,gap:32}],
  // ── Waves 21–30 (Elite) ─────────────────────────────────────────────────
  [{t:'infantry',n:60, gap:13},{t:'heli',n:18,gap:28},{t:'tank',n:8,gap:62}],
  [{t:'apc',n:25, gap:26},{t:'tank',n:14,gap:58},{t:'infantry',n:40,gap:14}],
  [{t:'infantry',n:65, gap:12},{t:'apc',n:22,gap:26},{t:'heli',n:20,gap:26}],
  [{t:'tank',n:18,gap:54},{t:'heli',n:22,gap:24},{t:'apc',n:20,gap:28}],
  [{t:'infantry',n:70, gap:11},{t:'apc',n:25,gap:24},{t:'tank',n:16,gap:56},{t:'heli',n:18,gap:26}],
  [{t:'infantry',n:75, gap:10},{t:'heli',n:25,gap:22},{t:'tank',n:20,gap:52}],
  [{t:'apc',n:30, gap:22},{t:'tank',n:22,gap:50},{t:'infantry',n:60,gap:11}],
  [{t:'infantry',n:80, gap:9},{t:'apc',n:28,gap:20},{t:'heli',n:28,gap:20},{t:'tank',n:18,gap:50}],
  [{t:'tank',n:25,gap:46},{t:'heli',n:30,gap:18},{t:'apc',n:30,gap:20},{t:'infantry',n:70,gap:10}],
  [{t:'infantry',n:100,gap:8},{t:'apc',n:35,gap:18},{t:'tank',n:30,gap:42},{t:'heli',n:35,gap:18}],
];

// ─── State ────────────────────────────────────────────────────────────────────
let money = 200, lives = 5, wave = 0, kills = 0;
let towers = [], enemies = [], bullets = [], particles = [];
let selectedType = null, selectedTower = null;
let waveActive = false, gameOver = false, gameWon = false;
let spawnQueue = [], spawnTimer = 0;
let hoverCol = -1, hoverRow = -1;
let tick = 0;

// Build path pixel points and path cell set
const pathPx = WAYPOINTS.map(([c,r]) => ({x: c*CELL + CELL/2, y: r*CELL + CELL/2}));
const pathSet = new Set();

function buildPathSet() {
  pathSet.clear();
  for (let i = 0; i < WAYPOINTS.length - 1; i++) {
    let [c1,r1] = WAYPOINTS[i], [c2,r2] = WAYPOINTS[i+1];
    let dc = Math.sign(c2-c1), dr = Math.sign(r2-r1);
    let c = c1, r = r1;
    while (c !== c2 || r !== r2) {
      pathSet.add(c + ',' + r);
      c += dc; r += dr;
    }
    pathSet.add(c2 + ',' + r2);
  }
}

// ─── Canvas & Rendering ───────────────────────────────────────────────────────
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
cvs.width = W; cvs.height = H;

// Precompute path direction per cell for arrows
const pathDirs = {};
for (let i = 0; i < WAYPOINTS.length - 1; i++) {
  let [c1,r1] = WAYPOINTS[i], [c2,r2] = WAYPOINTS[i+1];
  let dc = Math.sign(c2-c1), dr = Math.sign(r2-r1);
  let c = c1, r = r1;
  while (c !== c2 || r !== r2) {
    pathDirs[c+','+r] = {dc, dr};
    c += dc; r += dr;
  }
  pathDirs[c2+','+r2] = {dc, dr};
}

function draw() {
  // Background (grass)
  ctx.fillStyle = '#1e3d10';
  ctx.fillRect(0, 0, W, H);

  // Subtle grass texture (grid lines)
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Path (dirt road)
  for (const key of pathSet) {
    const [c, r] = key.split(',').map(Number);
    ctx.fillStyle = '#7a6040';
    ctx.fillRect(c*CELL+1, r*CELL+1, CELL-2, CELL-2);
    // Road edge detail
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(c*CELL+1, r*CELL+1, CELL-2, CELL-2);
    // Arrow
    const dir = pathDirs[key];
    if (dir) {
      const arrow = dir.dc > 0 ? '→' : dir.dc < 0 ? '←' : dir.dr > 0 ? '↓' : '↑';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(arrow, c*CELL + CELL/2, r*CELL + CELL/2);
    }
  }

  // Start / End markers
  const [sc, sr] = WAYPOINTS[0];
  const [ec, er] = WAYPOINTS[WAYPOINTS.length - 1];
  ctx.fillStyle = 'rgba(74,222,128,0.5)';
  ctx.fillRect(sc*CELL, sr*CELL, CELL, CELL);
  ctx.fillStyle = 'rgba(239,68,68,0.5)';
  ctx.fillRect(ec*CELL, er*CELL, CELL, CELL);
  ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('START', sc*CELL+CELL/2, sr*CELL+CELL/2);
  ctx.fillText('BASE', ec*CELL+CELL/2, er*CELL+CELL/2);

  // Hover cell highlight
  if (selectedType && hoverCol >= 0 && !gameOver && !gameWon) {
    const def = T_DEFS[selectedType];
    const isPath = pathSet.has(hoverCol + ',' + hoverRow);
    const hasTower = towers.some(t => t.col === hoverCol && t.row === hoverRow);
    const canPlace = !isPath && !hasTower && hoverCol >= 0 && hoverRow >= 0 && hoverCol < COLS && hoverRow < ROWS;
    ctx.fillStyle = canPlace ? 'rgba(74,222,128,0.3)' : 'rgba(239,68,68,0.25)';
    ctx.fillRect(hoverCol*CELL, hoverRow*CELL, CELL, CELL);
    if (canPlace) {
      // Range ring preview
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.arc(hoverCol*CELL+CELL/2, hoverRow*CELL+CELL/2, def.range*CELL, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Selected tower range ring
  if (selectedTower) {
    const def = T_DEFS[selectedTower.type];
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,4]);
    ctx.beginPath();
    ctx.arc(selectedTower.col*CELL+CELL/2, selectedTower.row*CELL+CELL/2, def.range*CELL, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Towers
  for (const t of towers) {
    const def = T_DEFS[t.type];
    const px = t.col*CELL, py = t.row*CELL;
    const cx2 = px + CELL/2, cy2 = py + CELL/2;
    const isSelected = t === selectedTower;

    // Base plate
    ctx.fillStyle = isSelected ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.35)';
    ctx.fillRect(px+4, py+4, CELL-8, CELL-8);

    // Colored border
    ctx.strokeStyle = isSelected ? '#ffffff' : def.color;
    ctx.lineWidth = isSelected ? 2.5 : 1.5;
    ctx.strokeRect(px+4, py+4, CELL-8, CELL-8);

    // Inner colored glow
    ctx.fillStyle = def.color;
    ctx.globalAlpha = 0.12;
    ctx.fillRect(px+5, py+5, CELL-10, CELL-10);
    ctx.globalAlpha = 1;

    // Barrel pointing at target
    if (t.aimAngle !== undefined) {
      ctx.strokeStyle = def.color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2 + Math.cos(t.aimAngle)*18, cy2 + Math.sin(t.aimAngle)*18);
      ctx.stroke();
      ctx.lineCap = 'butt';
    }

    // Icon
    ctx.font = '20px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, cx2, cy2);

    // Slow effect aura
    if (def.slows) {
      ctx.strokeStyle = 'rgba(56,189,248,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx2, cy2, def.range*CELL, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // Particles (explosions, effects)
  for (const p of particles) {
    const pct = (tick - p.born) / p.life;
    ctx.globalAlpha = 1 - pct;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x + p.vx*(tick-p.born)*0.5, p.y + p.vy*(tick-p.born)*0.5, p.r*(1-pct*0.5), 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Bullets
  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 6; ctx.shadowColor = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.splash ? 4 : 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Enemies
  for (const e of enemies) {
    if (e.dead || e.reached) continue;
    const def = E_DEFS[e.type];

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y + def.r*0.7, def.r*0.8, def.r*0.3, 0, 0, Math.PI*2);
    ctx.fill();

    // Slow tint
    if (e.slowed > 0) {
      ctx.fillStyle = 'rgba(56,189,248,0.4)';
      ctx.beginPath();
      ctx.arc(e.x, e.y, def.r+4, 0, Math.PI*2);
      ctx.fill();
    }

    // HP bar
    const bw = def.r*2.4, bh = 5;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(e.x-bw/2, e.y-def.r-12, bw, bh);
    const hpPct = e.hp / e.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#4ade80' : hpPct > 0.25 ? '#facc15' : '#f87171';
    ctx.fillRect(e.x-bw/2, e.y-def.r-12, bw*hpPct, bh);

    // Icon
    ctx.font = (def.r*1.6) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, e.x, e.y);
  }

  // Game Over / Win overlay
  if (gameOver || gameWon) {
    ctx.fillStyle = gameOver ? 'rgba(20,0,0,0.82)' : 'rgba(0,20,0,0.82)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 40px Segoe UI';
    ctx.fillStyle = gameOver ? '#f87171' : '#4ade80';
    ctx.fillText(gameOver ? '💀 BASE DESTROYED' : '🏆 MISSION COMPLETE', W/2, H/2 - 34);
    ctx.font = '18px Segoe UI';
    ctx.fillStyle = '#ddd';
    ctx.fillText(gameOver ? 'Your base has fallen. Reload to try again!' : 'You survived all 30 waves!', W/2, H/2 + 4);
    ctx.font = '14px Segoe UI';
    ctx.fillStyle = '#888';
    ctx.fillText('Kills: ' + kills + '  |  Press F5 to restart', W/2, H/2 + 36);
  }
}

// ─── Game Logic ───────────────────────────────────────────────────────────────
function spawnEnemy(type) {
  const def = E_DEFS[type];
  const start = pathPx[0];
  enemies.push({
    type, x: start.x, y: start.y,
    hp: def.hp, maxHp: def.hp, reward: def.reward,
    wpIdx: 1, progress: 0,
    dead: false, reached: false,
    slowed: 0, born: tick
  });
}

function moveEnemy(e) {
  if (e.dead || e.reached) return;
  const def = E_DEFS[e.type];
  const spd = e.slowed > 0 ? def.speed * 0.45 : def.speed;
  if (e.slowed > 0) e.slowed--;

  const wp = pathPx[e.wpIdx];
  if (!wp) { e.reached = true; lives = Math.max(0, lives - 1); updateUI(); if (lives <= 0) { gameOver = true; } return; }

  const dx = wp.x - e.x, dy = wp.y - e.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  e.progress = e.wpIdx + (dist < 0.1 ? 1 : 1 - dist/(CELL*2));

  if (dist < spd * 1.5) {
    e.wpIdx++;
    if (e.wpIdx >= pathPx.length) { e.reached = true; lives = Math.max(0, lives - 1); updateUI(); if (lives <= 0) { gameOver = true; } return; }
  } else {
    e.x += (dx/dist)*spd;
    e.y += (dy/dist)*spd;
  }
}

function towerUpdate(t) {
  const def = T_DEFS[t.type];
  t.cd = (t.cd || 0) - 1;

  // Find best target (furthest along path in range)
  let best = null, bestProg = -1;
  for (const e of enemies) {
    if (e.dead || e.reached) continue;
    const tcx = t.col*CELL+CELL/2, tcy = t.row*CELL+CELL/2;
    const dx = e.x - tcx, dy = e.y - tcy;
    if (Math.sqrt(dx*dx+dy*dy) <= def.range*CELL && e.progress > bestProg) {
      best = e; bestProg = e.progress;
    }
  }

  if (best) {
    const tcx = t.col*CELL+CELL/2, tcy = t.row*CELL+CELL/2;
    t.aimAngle = Math.atan2(best.y - tcy, best.x - tcx);
    if (t.cd <= 0) {
      t.cd = def.rate;
      bullets.push({
        x: tcx, y: tcy,
        tx: best.x, ty: best.y,
        target: def.splashR ? null : best,
        dmg: def.dmg, splash: def.splashR || 0,
        slows: def.slows || false,
        color: def.slows ? '#38bdf8' : (def.splashR ? '#f97316' : '#facc15'),
      });
    }
  } else {
    t.aimAngle = undefined;
  }
}

function bulletUpdate(b) {
  const dx = b.tx - b.x, dy = b.ty - b.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const spd = 9;
  if (dist < spd + 2) {
    // Impact
    if (b.splash > 0) {
      // Splash
      for (const e of enemies) {
        if (e.dead || e.reached) continue;
        const ex = e.x - b.x, ey = e.y - b.y;
        if (Math.sqrt(ex*ex+ey*ey) <= b.splash * CELL) {
          e.hp -= b.dmg;
          if (b.slows) e.slowed = 80;
          if (e.hp <= 0 && !e.dead) { e.dead = true; money += e.reward; kills++; updateUI(); spawnKillParticles(e.x, e.y); }
        }
      }
      spawnExplosion(b.x, b.y, b.slows ? '#38bdf8' : '#f97316', b.splash * CELL * 0.7);
    } else if (b.target && !b.target.dead) {
      b.target.hp -= b.dmg;
      if (b.slows) b.target.slowed = 80;
      if (b.target.hp <= 0 && !b.target.dead) { b.target.dead = true; money += b.target.reward; kills++; updateUI(); spawnKillParticles(b.target.x, b.target.y); }
    }
    return true; // remove
  }
  // Track moving target
  if (b.target && !b.target.dead) { b.tx = b.target.x; b.ty = b.target.y; }
  b.x += (dx/dist)*spd;
  b.y += (dy/dist)*spd;
  return false;
}

function spawnExplosion(x, y, color, r) {
  for (let i = 0; i < 12; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 0.5 + Math.random()*1.5;
    particles.push({x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, r: 3+Math.random()*5, color, life: 25+Math.random()*15, born: tick});
  }
}

function spawnKillParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    const ang = Math.random()*Math.PI*2;
    particles.push({x, y, vx: Math.cos(ang)*1.5, vy: Math.sin(ang)*1.5 - 1, r: 3, color: '#facc15', life: 20, born: tick});
  }
}

function update() {
  if (gameOver || gameWon) return;

  // Spawn
  if (spawnQueue.length > 0) {
    spawnTimer--;
    if (spawnTimer <= 0) {
      const item = spawnQueue.shift();
      spawnEnemy(item.t);
      spawnTimer = spawnQueue.length > 0 ? spawnQueue[0].gap : 0;
    }
  }

  // Check wave complete
  if (waveActive && spawnQueue.length === 0 && enemies.every(e => e.dead || e.reached)) {
    waveActive = false;
    if (wave >= WAVES.length) {
      gameWon = true;
    } else {
      document.getElementById('start-btn').disabled = false;
      document.getElementById('start-btn').textContent = '▶ Start Wave ' + (wave + 1);
      setMsg('Wave ' + wave + ' complete! +bonus $50');
      money += 50;
      updateUI();
    }
  }

  // Move enemies
  enemies.forEach(moveEnemy);

  // Tower logic
  towers.forEach(towerUpdate);

  // Bullet logic
  bullets = bullets.filter(b => !bulletUpdate(b));

  // Clean particles
  particles = particles.filter(p => (tick - p.born) < p.life);

  // Wave progress bar
  const totalInWave = waveActive ? (enemies.filter(e=>!e.dead&&!e.reached).length + spawnQueue.length) : 0;
  // don't update bar here, handled in startWave

  tick++;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── UI & Input ───────────────────────────────────────────────────────────────
function startWave() {
  if (waveActive || gameOver || gameWon) return;
  if (wave >= WAVES.length) return;
  const waveData = WAVES[wave];
  wave++;

  // Build flat spawn queue
  spawnQueue = [];
  for (const g of waveData) {
    for (let i = 0; i < g.n; i++) {
      spawnQueue.push({t: g.t, gap: g.gap});
    }
  }
  spawnTimer = 0;
  waveActive = true;

  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').textContent = 'Wave ' + wave + ' in progress...';
  setMsg('⚠️ Wave ' + wave + ' incoming! Defend the base!');
  updateUI();
}

function selectTower(type) {
  selectedType = type;
  selectedTower = null;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-type="' + type + '"]').classList.add('active');
  document.getElementById('sell-btn').style.display = 'none';
  const def = T_DEFS[type];
  setMsg('Click a green tile to place. Cost: $' + def.cost + ' · ESC to cancel');
}

function sellSelected() {
  if (!selectedTower) return;
  const def = T_DEFS[selectedTower.type];
  money += def.sell;
  towers = towers.filter(t => t !== selectedTower);
  selectedTower = null;
  document.getElementById('sell-btn').style.display = 'none';
  updateUI();
  setMsg('Tower sold for $' + def.sell);
}

cvs.addEventListener('click', function(e) {
  if (gameOver || gameWon) return;
  const rect = cvs.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  if (selectedType) {
    const def = T_DEFS[selectedType];
    if (pathSet.has(col + ',' + row)) { setMsg("❌ Can't place on the road!"); return; }
    if (towers.some(t => t.col === col && t.row === row)) { setMsg("❌ A tower is already here!"); return; }
    if (money < def.cost) { setMsg("❌ Not enough money! Need $" + def.cost); return; }
    money -= def.cost;
    towers.push({type: selectedType, col, row, cd: 0, aimAngle: undefined});
    updateUI();
    setMsg('✅ ' + def.name + ' placed! Click more tiles or ESC to cancel.');
  } else {
    const found = towers.find(t => t.col === col && t.row === row);
    if (found) {
      selectedTower = found;
      const def = T_DEFS[found.type];
      document.getElementById('sell-btn').style.display = 'block';
      setMsg(def.icon + ' ' + def.name + ' — sell for $' + def.sell + ' · click "Sell Tower"');
    } else {
      selectedTower = null;
      document.getElementById('sell-btn').style.display = 'none';
      setMsg('Click a tower type above to start placing.');
    }
  }
});

cvs.addEventListener('mousemove', function(e) {
  const rect = cvs.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  hoverCol = Math.floor(mx / CELL);
  hoverRow = Math.floor(my / CELL);
});

cvs.addEventListener('mouseleave', function() { hoverCol = -1; hoverRow = -1; });

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    selectedType = null;
    selectedTower = null;
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    document.getElementById('sell-btn').style.display = 'none';
    setMsg('Selection cleared.');
  }
});

function updateUI() {
  document.getElementById('s-money').textContent = '$' + money;
  document.getElementById('s-lives').textContent = lives;
  document.getElementById('s-wave').textContent = wave + ' / 30';
  document.getElementById('s-kills').textContent = kills;
}

function setMsg(txt) { document.getElementById('msg').textContent = txt; }

// ─── Init ─────────────────────────────────────────────────────────────────────
buildPathSet();
requestAnimationFrame(loop);
</script>
</body>
</html>
