<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VTRX Turret Defense!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #game-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #title-bar {
      font-size: 22px;
      font-weight: 900;
      color: #dc2626;
      text-shadow: 0 0 20px rgba(220,38,38,0.6);
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    #canvas {
      border: 2px solid #2a0000;
      border-radius: 8px;
      display: block;
      cursor: crosshair;
      box-shadow: 0 0 40px rgba(220,38,38,0.2);
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 10px;
      padding: 0 4px;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hud-label {
      font-size: 10px;
      color: #6b4040;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .hud-val {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }

    .hud-val.red { color: #dc2626; }
    .hud-val.gold { color: #f59e0b; }
    .hud-val.green { color: #22c55e; }

    #heat-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }

    #heat-bar-bg {
      width: 120px;
      height: 10px;
      background: #1a0000;
      border-radius: 5px;
      border: 1px solid #3a0000;
      overflow: hidden;
    }

    #heat-bar {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #f59e0b, #dc2626);
      border-radius: 5px;
      width: 0%;
      transition: width 0.1s;
    }

    #hp-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }

    #hp-bar-bg {
      width: 120px;
      height: 10px;
      background: #1a0000;
      border-radius: 5px;
      border: 1px solid #3a0000;
      overflow: hidden;
    }

    #hp-bar {
      height: 100%;
      background: linear-gradient(90deg, #dc2626, #22c55e);
      border-radius: 5px;
      width: 100%;
      transition: width 0.1s;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      border-radius: 8px;
      z-index: 10;
    }

    #overlay.hidden { display: none; }

    #overlay h1 {
      font-size: 36px;
      font-weight: 900;
      color: #dc2626;
      text-shadow: 0 0 30px rgba(220,38,38,0.7);
      margin-bottom: 8px;
    }

    #overlay p {
      color: #a07070;
      font-size: 14px;
      margin-bottom: 8px;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    #overlay .score-display {
      font-size: 28px;
      font-weight: 900;
      color: #f59e0b;
      margin-bottom: 6px;
    }

    #overlay .wave-display {
      font-size: 16px;
      color: #a07070;
      margin-bottom: 20px;
    }

    #start-btn {
      padding: 12px 32px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(220,38,38,0.5);
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    #start-btn:hover { opacity: 0.85; transform: scale(1.03); }

    #wave-announce {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: 900;
      color: #dc2626;
      text-shadow: 0 0 30px rgba(220,38,38,0.8);
      pointer-events: none;
      opacity: 0;
      z-index: 5;
      text-align: center;
      white-space: nowrap;
    }

    #controls-hint {
      margin-top: 10px;
      font-size: 11px;
      color: #4a2020;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

<div id="game-wrapper">
  <div id="title-bar">&#9654; VTRX Turret Defense!</div>
  <div style="position:relative">
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="overlay">
      <h1>VTRX Turret Defense!</h1>
      <p>Aim with your mouse. Click &amp; hold to fire. Survive the waves — but watch your heat!</p>
      <button id="start-btn" onclick="startGame()">&#9654; Start Game</button>
    </div>
    <div id="wave-announce"></div>
  </div>
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Wave</div>
      <div class="hud-val gold" id="hud-wave">1</div>
    </div>
    <div id="hp-bar-wrap">
      <div class="hud-label">Base HP</div>
      <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    </div>
    <div id="heat-bar-wrap">
      <div class="hud-label">Heat</div>
      <div id="heat-bar-bg"><div id="heat-bar"></div></div>
    </div>
    <div class="hud-block" style="text-align:right">
      <div class="hud-label">Score</div>
      <div class="hud-val red" id="hud-score">0</div>
    </div>
  </div>
  <div id="controls-hint">MOUSE to aim &nbsp;&middot;&nbsp; HOLD LEFT CLICK to fire &nbsp;&middot;&nbsp; Don't overheat!</div>
</div>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;

// ── State ──────────────────────────────────────────────
let gameState   = 'idle'; // idle | playing | dead
let score       = 0;
let wave        = 1;
let baseHP      = 100;
let maxHP       = 100;
let heat        = 0;
let overheated  = false;
let turretAngle = 0;
let mouseX      = CX, mouseY = CY;
let firing      = false;
let fireTimer   = 0;
let waveTimer   = 0;
let waveActive  = false;
let enemiesLeft = 0;
let spawnTimer  = 0;
let spawnInterval = 120;
let toSpawn     = 0;

const FIRE_RATE     = 6;
const HEAT_PER_SHOT = 4;
const COOL_RATE     = 0.8;
const OVERHEAT_MAX  = 100;
const OVERHEAT_COOL = 1.5;

let bullets  = [];
let enemies  = [];
let particles= [];
let explosions = [];

// ── Input ──────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) firing = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) firing = false; });
canvas.addEventListener('mouseleave', () => { firing = false; });

// ── Helpers ────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) { return Math.hypot(bx - ax, by - ay); }
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

function spawnEnemy() {
  const side = randInt(0, 3);
  let x, y;
  if      (side === 0) { x = rand(20, W - 20); y = -20; }
  else if (side === 1) { x = W + 20;           y = rand(20, H - 20); }
  else if (side === 2) { x = rand(20, W - 20); y = H + 20; }
  else                 { x = -20;              y = rand(20, H - 20); }

  const isVehicle = Math.random() < 0.25 + wave * 0.03;
  const hp = isVehicle
    ? 60 + wave * 12
    : 20 + wave * 5;
  const spd = isVehicle
    ? rand(0.5, 0.9) + wave * 0.03
    : rand(0.8, 1.4) + wave * 0.06;

  enemies.push({
    x, y,
    hp, maxHp: hp,
    spd,
    isVehicle,
    angle: Math.atan2(CY - y, CX - x),
    r: isVehicle ? 18 : 11,
    damage: isVehicle ? 15 : 8,
    dead: false
  });
}

function fireGun() {
  if (overheated) return;
  const speed = 10;
  bullets.push({
    x: CX + Math.cos(turretAngle) * 28,
    y: CY + Math.sin(turretAngle) * 28,
    vx: Math.cos(turretAngle) * speed,
    vy: Math.sin(turretAngle) * speed,
    r: 4, life: 80
  });
  heat = Math.min(heat + HEAT_PER_SHOT, OVERHEAT_MAX);
  if (heat >= OVERHEAT_MAX) { overheated = true; heat = OVERHEAT_MAX; }
}

function addParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(1, 4);
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: randInt(15,30), color });
  }
}

function addExplosion(x, y, r) {
  explosions.push({ x, y, r, maxR: r * 2.5, life: 20, maxLife: 20 });
}

function waveConfig(w) {
  return {
    count: 6 + w * 3,
    interval: Math.max(30, 100 - w * 8)
  };
}

function startWave() {
  const cfg = waveConfig(wave);
  toSpawn = cfg.count;
  spawnInterval = cfg.interval;
  spawnTimer = 0;
  waveActive = true;
  showWaveAnnounce('Wave ' + wave);
}

function showWaveAnnounce(text) {
  const el = document.getElementById('wave-announce');
  el.textContent = text;
  el.style.opacity = '1';
  el.style.transition = 'opacity 0.3s';
  setTimeout(() => {
    el.style.opacity = '0';
  }, 1400);
}

function updateHUD() {
  document.getElementById('hud-wave').textContent  = wave;
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hp-bar').style.width    = Math.max(0, baseHP / maxHP * 100) + '%';
  document.getElementById('heat-bar').style.width  = (heat / OVERHEAT_MAX * 100) + '%';
}

function startGame() {
  score = 0; wave = 1; baseHP = 100; heat = 0;
  overheated = false; firing = false; fireTimer = 0;
  bullets = []; enemies = []; particles = []; explosions = [];
  waveActive = false; waveTimer = 60;
  enemiesLeft = 0; toSpawn = 0;
  document.getElementById('overlay').classList.add('hidden');
  gameState = 'playing';
}

function endGame() {
  gameState = 'dead';
  firing = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>&#128165; Game Over!</h1>
    <div class="score-display">Score: ${score}</div>
    <div class="wave-display">Survived ${wave - 1} wave${wave > 2 ? 's' : ''}</div>
    <button id="start-btn" onclick="startGame()">&#9654; Play Again</button>
  `;
  ov.classList.remove('hidden');
}

// ── Draw ───────────────────────────────────────────────
function drawGround() {
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Base circle
  ctx.beginPath();
  ctx.arc(CX, CY, 36, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0000';
  ctx.fill();
  ctx.strokeStyle = '#3a0000';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Danger radius ring
  ctx.beginPath();
  ctx.arc(CX, CY, 38, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(220,38,38,0.1)';
  ctx.lineWidth = 24;
  ctx.stroke();
}

function drawTurret() {
  const overheatFlicker = overheated && Math.floor(Date.now() / 120) % 2 === 0;
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(turretAngle);

  // Barrel
  ctx.fillStyle = overheatFlicker ? '#f97316' : '#dc2626';
  ctx.shadowColor = overheatFlicker ? '#f97316' : '#dc2626';
  ctx.shadowBlur = 12;
  ctx.fillRect(4, -5, 30, 10);

  // Body
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0000';
  ctx.shadowBlur = 0;
  ctx.fill();
  ctx.strokeStyle = overheatFlicker ? '#f97316' : '#dc2626';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI * 2);
  ctx.fillStyle = overheatFlicker ? '#f97316' : '#dc2626';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#dc2626';
  ctx.fill();

  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.isVehicle) {
    // Vehicle body
    ctx.fillStyle = '#4a3300';
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-e.r, -e.r * 0.7, e.r * 2, e.r * 1.4, 4);
    ctx.fill();
    ctx.stroke();
    // Turret
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    // Gun
    const ga = Math.atan2(CY - e.y, CX - e.x);
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(ga) * 14, Math.sin(ga) * 14);
    ctx.stroke();
  } else {
    // Infantry
    ctx.fillStyle = '#1e3a1e';
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, e.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Head
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(0, -e.r * 0.2, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar
  const bw = e.r * 2.4;
  ctx.fillStyle = '#1a0000';
  ctx.fillRect(-bw / 2, -e.r - 10, bw, 4);
  ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#22c55e' : e.hp / e.maxHp > 0.25 ? '#f59e0b' : '#dc2626';
  ctx.fillRect(-bw / 2, -e.r - 10, bw * (e.hp / e.maxHp), 4);

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = '#fbbf24';
  ctx.shadowColor = '#f59e0b';
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life / 30;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawExplosion(ex) {
  const t = 1 - ex.life / ex.maxLife;
  const r = lerp(0, ex.maxR, t);
  ctx.save();
  ctx.globalAlpha = (1 - t) * 0.7;
  ctx.beginPath();
  ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.globalAlpha = (1 - t) * 0.3;
  ctx.fillStyle = '#dc2626';
  ctx.fill();
  ctx.restore();
}

// ── Update ─────────────────────────────────────────────
function update() {
  turretAngle = Math.atan2(mouseY - CY, mouseX - CX);

  // Firing
  if (firing && !overheated) {
    fireTimer++;
    if (fireTimer >= FIRE_RATE) { fireGun(); fireTimer = 0; }
  }

  // Heat
  if (overheated) {
    heat -= OVERHEAT_COOL;
    if (heat <= 0) { heat = 0; overheated = false; }
  } else if (!firing) {
    heat = Math.max(0, heat - COOL_RATE);
  }

  // Wave logic
  if (!waveActive) {
    waveTimer--;
    if (waveTimer <= 0) { startWave(); }
  } else {
    // Spawn
    if (toSpawn > 0) {
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnEnemy();
        toSpawn--;
        spawnTimer = spawnInterval;
        enemiesLeft = enemies.filter(e => !e.dead).length + toSpawn;
      }
    }

    // Check wave end
    if (toSpawn === 0 && enemies.filter(e => !e.dead).length === 0) {
      waveActive = false;
      wave++;
      waveTimer = 120;
    }
  }

  // Move enemies
  for (const e of enemies) {
    if (e.dead) continue;
    const ang = Math.atan2(CY - e.y, CX - e.x);
    e.x += Math.cos(ang) * e.spd;
    e.y += Math.sin(ang) * e.spd;

    // Reached base
    if (dist(e.x, e.y, CX, CY) < 32 + e.r) {
      baseHP -= e.damage;
      addParticles(CX, CY, '#dc2626', 8);
      addExplosion(CX, CY, 20);
      e.dead = true;
      if (baseHP <= 0) { baseHP = 0; endGame(); return; }
    }
  }

  // Move bullets
  for (const b of bullets) {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
  }

  // Bullet-enemy collision
  for (const b of bullets) {
    if (b.life <= 0) continue;
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist(b.x, b.y, e.x, e.y) < e.r + b.r) {
        const dmg = e.isVehicle ? 8 : 12;
        e.hp -= dmg;
        b.life = 0;
        addParticles(b.x, b.y, '#f59e0b', 5);
        if (e.hp <= 0) {
          e.dead = true;
          addExplosion(e.x, e.y, e.isVehicle ? 28 : 18);
          addParticles(e.x, e.y, e.isVehicle ? '#f59e0b' : '#22c55e', 12);
          score += e.isVehicle ? 50 : 20;
        }
        break;
      }
    }
  }

  // Cleanup
  bullets  = bullets .filter(b => b.life > 0 && b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20);
  enemies  = enemies .filter(e => !e.dead);
  particles= particles.map(p => ({ ...p, x: p.x + p.vx, y: p.y + p.vy, life: p.life - 1 })).filter(p => p.life > 0);
  explosions = explosions.map(ex => ({ ...ex, life: ex.life - 1 })).filter(ex => ex.life > 0);

  updateHUD();
}

// ── Loop ───────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawGround();

  for (const ex of explosions) drawExplosion(ex);
  for (const p  of particles)  drawParticle(p);
  for (const e  of enemies)    drawEnemy(e);
  for (const b  of bullets)    drawBullet(b);

  drawTurret();

  if (gameState === 'playing') update();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
