<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VTRX Road Rush!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
#wrap{position:relative}
canvas{display:block}
#ov{position:absolute;inset:0;background:rgba(0,0,0,0.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
.ov-t{font-size:34px;font-weight:900;color:#dc2626;text-shadow:0 0 24px rgba(220,38,38,0.7)}
.ov-s{font-size:14px;color:#888}
.ov-score{font-size:22px;font-weight:800;color:#facc15}
.ov-btn{padding:14px 44px;background:linear-gradient(135deg,#7f0000,#dc2626);border:1px solid #ef4444;color:#fff;font-size:17px;font-weight:800;border-radius:12px;cursor:pointer;box-shadow:0 0 20px rgba(220,38,38,0.5);margin-top:4px}
.ov-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ov">
  <div class="ov-t">🚗 VTRX ROAD RUSH!</div>
  <div class="ov-s">Dodge traffic and survive as long as possible!</div>
  <div class="ov-s" style="color:#555">← → Arrow Keys &nbsp;|&nbsp; Swipe on mobile</div>
  <button class="ov-btn" onclick="startGame()">▶ PLAY</button>
</div>
</div>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const W = 420, H = 640;
cvs.width = W; cvs.height = H;

const LANES = [105, 210, 315];
const CW = 44, CH = 78;

let state = 'menu', score = 0, lives = 3;
let playerLane = 1, playerX = LANES[1], playerY = H - 110;
let speed = 3, tick = 0, inv = 0;
let cars = [], particles = [], powerups = [];
let spawnT = 60, roadY = 0, shieldActive = 0;

const COLS = ['#ef4444','#f97316','#22c55e','#3b82f6','#a855f7','#eab308','#ec4899','#14b8a6'];

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function drawCarShape(x,y,col,flip,glow){
  const cx=x-CW/2,cy=y-CH/2;
  if(glow){ctx.shadowBlur=12;ctx.shadowColor=col;}
  ctx.fillStyle=col;rr(cx,cy,CW,CH,8);ctx.fill();
  ctx.shadowBlur=0;
  // roof/window
  ctx.fillStyle='rgba(160,230,255,0.65)';
  const wy=flip?cy+CH*0.35:cy+CH*0.15;
  rr(cx+8,wy,CW-16,CH*0.28,4);ctx.fill();
  // roof colour
  ctx.fillStyle='rgba(0,0,0,0.2)';
  rr(cx+8,wy,CW-16,CH*0.28,4);ctx.fill();
  // wheels
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(cx-9,cy+11,10,17);ctx.fillRect(cx+CW-1,cy+11,10,17);
  ctx.fillRect(cx-9,cy+CH-28,10,17);ctx.fillRect(cx+CW-1,cy+CH-28,10,17);
  // lights
  ctx.fillStyle=flip?'#fef08a':'#fca5a5';
  ctx.fillRect(cx+6,flip?cy:cy+CH-7,10,6);
  ctx.fillRect(cx+CW-16,flip?cy:cy+CH-7,10,6);
}

function drawRoad(){
  ctx.fillStyle='#111827';ctx.fillRect(0,0,W,H);
  // grass
  ctx.fillStyle='#14532d';ctx.fillRect(0,0,52,H);ctx.fillRect(W-52,0,52,H);
  // road
  ctx.fillStyle='#1f2937';ctx.fillRect(52,0,W-104,H);
  // lane dashes
  ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=3;
  ctx.setLineDash([34,26]);ctx.lineDashOffset=-(roadY%60);
  ctx.beginPath();ctx.moveTo(158,0);ctx.lineTo(158,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(262,0);ctx.lineTo(262,H);ctx.stroke();
  ctx.setLineDash([]);
  // edges
  ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(57,0);ctx.lineTo(57,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-57,0);ctx.lineTo(W-57,H);ctx.stroke();
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,38);
  ctx.font='bold 16px Segoe UI';ctx.fillStyle='#fff';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('SCORE: '+score,12,19);
  const spd=Math.min(10,(speed-3)/9*10|0);
  ctx.fillText('SPD '+'█'.repeat(spd)+'░'.repeat(10-spd),W/2-65,19);
  ctx.textAlign='right';
  ctx.fillText((shieldActive>0?'🛡️':'')+' '+'❤️'.repeat(Math.max(0,lives)),W-10,19);
}

function spawnCar(){
  const lane=Math.floor(Math.random()*3);
  if(cars.some(c=>c.lane===lane&&c.y<120))return;
  const s=speed*(0.7+Math.random()*0.55);
  cars.push({x:LANES[lane],y:-CH,lane,col:COLS[Math.random()*COLS.length|0],spd:s});
}

function spawnPowerup(){
  const lane=Math.floor(Math.random()*3);
  powerups.push({x:LANES[lane],y:-30,type:'shield'});
}

function particle(x,y,col,n){
  for(let i=0;i<(n||8);i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:28,ml:28});
  }
}

function startGame(){
  score=0;lives=3;tick=0;speed=3;inv=0;shieldActive=0;
  playerLane=1;playerX=LANES[1];
  cars=[];particles=[];powerups=[];spawnT=60;roadY=0;
  state='playing';
  document.getElementById('ov').style.display='none';
}

function showOver(){
  const ov=document.getElementById('ov');
  ov.style.display='flex';
  ov.innerHTML=`
    <div class="ov-t">💥 GAME OVER</div>
    <div class="ov-score">Score: ${score}</div>
    <div class="ov-s">Dodge the traffic to survive longer!</div>
    <button class="ov-btn" onclick="startGame()">▶ TRY AGAIN</button>
  `;
}

function update(){
  if(state!=='playing')return;
  tick++;
  score=Math.floor(tick*0.12*(speed/3));
  speed=Math.min(11,3+tick*0.0012);
  roadY+=speed;
  if(shieldActive>0)shieldActive--;
  if(inv>0)inv--;

  // Smooth lane move
  playerX+=(LANES[playerLane]-playerX)*0.18;

  // Spawn traffic
  spawnT--;
  if(spawnT<=0){spawnCar();spawnT=Math.max(28,75-tick*0.04);}

  // Spawn shield powerup occasionally
  if(tick%600===0)spawnPowerup();

  // Move cars
  cars.forEach(c=>c.y+=c.spd);
  cars=cars.filter(c=>c.y<H+CH);

  // Move powerups
  powerups.forEach(p=>p.y+=2.5);
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(Math.abs(playerX-p.x)<28&&Math.abs(playerY-p.y)<28){
      shieldActive=300;particle(p.x,p.y,'#38bdf8',10);powerups.splice(i,1);
    } else if(p.y>H)powerups.splice(i,1);
  }

  // Collision
  if(inv===0){
    for(const c of cars){
      if(Math.abs(playerX-c.x)<CW-8&&Math.abs(playerY-c.y)<CH-10){
        if(shieldActive>0){shieldActive=0;inv=60;particle(playerX,playerY,'#38bdf8',12);}
        else{lives--;inv=150;particle(playerX,playerY,'#f87171',14);
          if(lives<=0){state='dead';showOver();}}
        break;
      }
    }
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);
}

function frame(){
  drawRoad();
  cars.forEach(c=>drawCarShape(c.x,c.y,c.col,true,false));
  powerups.forEach(p=>{
    ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🛡️',p.x,p.y);
  });
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
  if(inv===0||Math.floor(inv/8)%2===0){
    drawCarShape(playerX,playerY,'#dc2626',false,true);
    if(shieldActive>0){
      ctx.strokeStyle='rgba(56,189,248,0.7)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(playerX,playerY,32,0,Math.PI*2);ctx.stroke();
    }
  }
  drawHUD();
  update();
  requestAnimationFrame(frame);
}

document.addEventListener('keydown',e=>{
  if(state!=='playing')return;
  if(e.key==='ArrowLeft'&&playerLane>0){playerLane--;e.preventDefault();}
  if(e.key==='ArrowRight'&&playerLane<2){playerLane++;e.preventDefault();}
});
let tx0=0;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(state!=='playing')return;
  const dx=e.changedTouches[0].clientX-tx0;
  if(dx<-30&&playerLane>0)playerLane--;
  if(dx>30&&playerLane<2)playerLane++;
});

frame();
</script>
</body>
</html>
