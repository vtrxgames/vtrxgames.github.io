<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VTRX Paper Clash!</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  height: 100vh; overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  user-select: none;
}
#hud {
  display: flex; align-items: center; gap: 24px;
  padding: 8px 20px; width: 100%; justify-content: center;
  background: #0d0000; border-bottom: 1px solid #2a0000;
  flex-shrink: 0;
}
.hud-label { color: #a07070; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.hud-val   { color: #dc2626; font-size: 22px; font-weight: 900; min-width: 44px; text-align: left; }
#canvas-wrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
canvas { display: block; image-rendering: pixelated; }
#overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(13,0,0,0.92); gap: 14px;
}
#overlay h1 { color: #dc2626; font-size: 30px; font-weight: 900; text-shadow: 0 0 28px rgba(220,38,38,0.7); }
.ov-sub   { color: #a07070; font-size: 13px; text-align: center; line-height: 1.7; }
.ov-score { color: #fff; font-size: 20px; font-weight: 900; }
.ov-hint  { color: #5a2a2a; font-size: 11px; text-align: center; }
#play-btn {
  padding: 12px 44px; background: #dc2626; color: #fff; border: none;
  border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 22px rgba(220,38,38,0.5); transition: background .2s;
}
#play-btn:hover { background: #b91c1c; }
</style>
</head>
<body>

<div id="hud">
  <span class="hud-label">Territory</span>
  <span class="hud-val" id="hud-pct">0%</span>
  <span class="hud-label">Kills</span>
  <span class="hud-val" id="hud-kills">0</span>
  <span class="hud-label">Bots Alive</span>
  <span class="hud-val" id="hud-bots">4</span>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>VTRX Paper Clash!</h1>
    <p class="ov-sub">Capture territory by making loops back to your zone.<br>Don't let enemies touch your trail!</p>
    <p class="ov-hint">Arrow Keys / WASD &nbsp;|&nbsp; Swipe on mobile</p>
    <button id="play-btn" onclick="startGame()">&#9654; Play Now</button>
  </div>
</div>

<script>
const CELL = 14, COLS = 44, ROWS = 36;
const W = COLS * CELL, H = ROWS * CELL;
const TICK = 95;

const COLORS = [
  { terr:'#6b1818', trail:'#dc2626', head:'#ef4444' },
  { terr:'#1a3a5c', trail:'#3b82f6', head:'#93c5fd' },
  { terr:'#14532d', trail:'#22c55e', head:'#86efac' },
  { terr:'#78350f', trail:'#f59e0b', head:'#fcd34d' },
  { terr:'#3b0764', trail:'#a855f7', head:'#d8b4fe' },
];

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

let grid, ents, kills, running, animId;

function mkGrid() {
  return Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => ({ owner: -1, trail: false }))
  );
}

function claim(id, cx, cy, r) {
  for (let row = cy-r; row <= cy+r; row++)
    for (let col = cx-r; col <= cx+r; col++)
      if (row>=0&&row<ROWS&&col>=0&&col<COLS)
        grid[row][col] = { owner: id, trail: false };
}

function mkEnt(id, x, y, dx, dy) {
  return { id, x, y, dx, dy, pdx: dx, pdy: dy, trail: [], alive: true, rtimer: 0, ttimer: 0, out: 0 };
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  kills = 0; grid = mkGrid(); ents = [];

  const p = mkEnt(0, 5, 5, 1, 0); claim(0, 5, 5, 3); ents.push(p);

  const starts = [
    {x:COLS-6,y:5,dx:-1,dy:0}, {x:COLS-6,y:ROWS-6,dx:-1,dy:0},
    {x:5,y:ROWS-6,dx:1,dy:0}, {x:Math.floor(COLS/2),y:Math.floor(ROWS/2),dx:1,dy:0}
  ];
  starts.forEach((s,i) => { const b=mkEnt(i+1,s.x,s.y,s.dx,s.dy); claim(i+1,s.x,s.y,3); ents.push(b); });

  running = true;
  if (animId) cancelAnimationFrame(animId);
  let last = 0, acc = 0;
  function loop(ts) {
    if (!running) return;
    animId = requestAnimationFrame(loop);
    const dt = Math.min(ts-last, 200); last=ts; acc+=dt;
    if (acc >= TICK) { acc -= TICK; step(); }
    render();
  }
  last = performance.now();
  animId = requestAnimationFrame(loop);
}

function step() {
  const p = ents[0];
  if (!(p.pdx===-p.dx && p.pdy===-p.dy)) { p.dx=p.pdx; p.dy=p.pdy; }

  for (let i=1;i<ents.length;i++) {
    const b=ents[i]; if (!b.alive) continue;
    botThink(b); b.dx=b.pdx; b.dy=b.pdy;
  }

  ents.forEach(e => { if (e.alive) move(e); });

  ents.forEach(e => {
    if (!e.alive) return;
    const cell = grid[e.y][e.x];
    if (cell.trail && cell.owner !== e.id) {
      if (e.id===0 && cell.owner!==0) {}
      if (e.id!==0 && cell.owner===0) kills++;
      kill(e);
    }
  });

  if (!ents[0].alive) { endGame(); return; }

  ents.forEach(b => {
    if (b.id===0||b.alive) return;
    b.rtimer++;
    if (b.rtimer >= 28) respawn(b);
  });

  updateHUD();
}

function move(e) {
  const nx=e.x+e.dx, ny=e.y+e.dy;
  if (nx<0||nx>=COLS||ny<0||ny>=ROWS) { if (e.id!==0) bounce(e); return; }

  const cur = grid[e.y][e.x];
  const inOwn = cur.owner===e.id && !cur.trail;

  if (!inOwn) {
    if (cur.owner!==e.id || !cur.trail) {
      grid[e.y][e.x] = { owner: e.id, trail: true };
      e.trail.push({ x: e.x, y: e.y });
    }
  }

  e.x=nx; e.y=ny;

  const nc = grid[nx][ny];
  if (nc.owner===e.id && !nc.trail && e.trail.length>0) capture(e);
}

function capture(e) {
  e.trail.forEach(p => { grid[p.y][p.x] = { owner: e.id, trail: false }; });
  enclose(e.id);
  e.trail=[]; e.out=0;
}

function enclose(id) {
  const vis = Array.from({length:ROWS}, () => new Uint8Array(COLS));
  const q=[];
  for (let c=0;c<COLS;c++) {
    if (grid[0][c].owner!==id && !vis[0][c])         { vis[0][c]=1; q.push(0*COLS+c); }
    if (grid[ROWS-1][c].owner!==id && !vis[ROWS-1][c]){ vis[ROWS-1][c]=1; q.push((ROWS-1)*COLS+c); }
  }
  for (let r=1;r<ROWS-1;r++) {
    if (grid[r][0].owner!==id && !vis[r][0])          { vis[r][0]=1; q.push(r*COLS); }
    if (grid[r][COLS-1].owner!==id && !vis[r][COLS-1]){ vis[r][COLS-1]=1; q.push(r*COLS+COLS-1); }
  }
  while (q.length) {
    const idx=q.pop(), r=(idx/COLS)|0, c=idx%COLS;
    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr=r+dr, nc2=c+dc;
      if (nr<0||nr>=ROWS||nc2<0||nc2>=COLS||vis[nr][nc2]||grid[nr][nc2].owner===id) continue;
      vis[nr][nc2]=1; q.push(nr*COLS+nc2);
    }
  }
  for (let r=0;r<ROWS;r++)
    for (let c=0;c<COLS;c++)
      if (!vis[r][c] && grid[r][c].owner!==id)
        grid[r][c]={ owner:id, trail:false };
}

function kill(e) {
  if (!e.alive) return;
  e.alive=false; e.rtimer=0;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (grid[r][c].owner===e.id) grid[r][c]={owner:-1,trail:false};
  e.trail=[];
}

function respawn(b) {
  const x=3+Math.floor(Math.random()*(COLS-6));
  const y=3+Math.floor(Math.random()*(ROWS-6));
  b.x=x; b.y=y;
  const d=[[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random()*4)];
  b.dx=d[0]; b.dy=d[1]; b.pdx=d[0]; b.pdy=d[1];
  b.trail=[]; b.alive=true; b.rtimer=0; b.out=0;
  claim(b.id,x,y,2);
}

function botThink(b) {
  b.ttimer--; if (b.ttimer>0) return;
  b.ttimer=2+Math.floor(Math.random()*6);
  const nx=b.x+b.dx, ny=b.y+b.dy;
  if (nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1) { safe(b); return; }
  if (b.trail.some(t=>t.x===nx&&t.y===ny) && Math.random()<0.85) { safe(b); return; }
  const inOwn=grid[b.y][b.x].owner===b.id && !grid[b.y][b.x].trail;
  b.out = inOwn ? 0 : b.out+1;
  if (b.out > 10+Math.floor(Math.random()*14)) { goHome(b); return; }
  if (inOwn && Math.random()<0.3) {
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
    for (const [dx,dy] of dirs) {
      const ox=b.x+dx, oy=b.y+dy;
      if (ox>=1&&ox<COLS-1&&oy>=1&&oy<ROWS-1&&grid[oy][ox].owner!==b.id) { b.pdx=dx; b.pdy=dy; return; }
    }
  }
  b.pdx=b.dx; b.pdy=b.dy;
}

function goHome(b) {
  let bd=Infinity, br=-1, bc=-1;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (grid[r][c].owner===b.id&&!grid[r][c].trail) {
      const d=Math.abs(r-b.y)+Math.abs(c-b.x);
      if (d<bd){bd=d;br=r;bc=c;}
    }
  }
  if (br<0) { safe(b); return; }
  const opts=[];
  const pdx=bc>b.x?1:bc<b.x?-1:0, pdy=br>b.y?1:br<b.y?-1:0;
  if (pdx!==0) opts.push([pdx,0]);
  if (pdy!==0) opts.push([0,pdy]);
  opts.push(...[[1,0],[-1,0],[0,1],[0,-1]]);
  for (const [dx,dy] of opts) {
    if (dx===-b.dx&&dy===-b.dy) continue;
    const nx=b.x+dx,ny=b.y+dy;
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    if (b.trail.some(t=>t.x===nx&&t.y===ny)) continue;
    b.pdx=dx; b.pdy=dy; return;
  }
  safe(b);
}

function safe(b) {
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
  for (const [dx,dy] of dirs) {
    if (dx===-b.dx&&dy===-b.dy) continue;
    const nx=b.x+dx,ny=b.y+dy;
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    if (b.trail.some(t=>t.x===nx&&t.y===ny)) continue;
    b.pdx=dx; b.pdy=dy; return;
  }
  b.pdx=-b.dx; b.pdy=-b.dy;
}

function bounce(b) { safe(b); b.dx=b.pdx; b.dy=b.pdy; }

function countTerritory(id) {
  let n=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c].owner===id&&!grid[r][c].trail) n++;
  return n;
}

function updateHUD() {
  const pct=Math.round(countTerritory(0)/(COLS*ROWS)*100);
  document.getElementById('hud-pct').textContent=pct+'%';
  document.getElementById('hud-kills').textContent=kills;
  document.getElementById('hud-bots').textContent=ents.filter(e=>e.id!==0&&e.alive).length;
}

function endGame() {
  running=false;
  const pct=Math.round(countTerritory(0)/(COLS*ROWS)*100);
  let title, tc;
  if (pct>=50){ title='Domination!'; tc='#22c55e'; }
  else if (pct>=25){ title='Nice Run!'; tc='#f59e0b'; }
  else { title='You Died!'; tc='#dc2626'; }
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:${tc}">${title}</h1>
    <div class="ov-score">Territory: ${pct}% &nbsp;|&nbsp; Kills: ${kills}</div>
    <p class="ov-sub">Loop back to your red zone to capture territory<br>Don't let enemies hit your trail!</p>
    <p class="ov-hint">Arrow Keys / WASD &nbsp;|&nbsp; Swipe on mobile</p>
    <button id="play-btn" onclick="startGame()">&#9654; Play Again</button>
  `;
  ov.style.display='flex';
}

function render() {
  ctx.fillStyle='#0d0000'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a0000'; ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}

  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    const cell=grid[r][c]; if(cell.owner===-1) continue;
    const col=COLORS[cell.owner]; if(!col) continue;
    ctx.fillStyle=cell.trail?col.trail:col.terr;
    ctx.fillRect(c*CELL+0.5,r*CELL+0.5,CELL-1,CELL-1);
  }

  ents.forEach(e => {
    if (!e.alive) return;
    const col=COLORS[e.id];
    ctx.shadowColor=col.trail; ctx.shadowBlur=e.id===0?14:6;
    ctx.fillStyle=col.head;
    ctx.beginPath();
    ctx.arc(e.x*CELL+CELL/2, e.y*CELL+CELL/2, CELL/2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    if (e.id===0) {
      ctx.fillStyle='#fff';
      ctx.font=`bold ${CELL-3}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('X', e.x*CELL+CELL/2, e.y*CELL+CELL/2+1);
    }
  });
}

document.addEventListener('keydown', e => {
  if (!running) return;
  const p=ents[0];
  if ((e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  && p.dx!==1)  { p.pdx=-1;p.pdy=0; }
  if ((e.key==='ArrowRight'||e.key==='d'||e.key==='D') && p.dx!==-1) { p.pdx=1; p.pdy=0; }
  if ((e.key==='ArrowUp'||e.key==='w'||e.key==='W')    && p.dy!==1)  { p.pdx=0; p.pdy=-1; }
  if ((e.key==='ArrowDown'||e.key==='s'||e.key==='S')  && p.dy!==-1) { p.pdx=0; p.pdy=1; }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});

let tx=0, ty=0;
document.addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend', e=>{
  if(!running)return;
  const p=ents[0];
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){
    if(dx>0&&p.dx!==-1){p.pdx=1;p.pdy=0;} else if(dx<0&&p.dx!==1){p.pdx=-1;p.pdy=0;}
  } else if(Math.abs(dy)>20){
    if(dy>0&&p.dy!==-1){p.pdx=0;p.pdy=1;} else if(dy<0&&p.dy!==1){p.pdx=0;p.pdy=-1;}
  }
},{passive:true});
</script>
</body>
</html>
