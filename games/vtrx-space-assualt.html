<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VTRX Space Assault!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
#wrap{position:relative}
canvas{display:block}
#ov{position:absolute;inset:0;background:rgba(0,0,5,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
.ov-t{font-size:30px;font-weight:900;color:#3b82f6;text-shadow:0 0 22px rgba(59,130,246,0.8)}
.ov-s{font-size:13px;color:#666}
.ov-score{font-size:22px;font-weight:800;color:#facc15}
.ov-btn{padding:13px 44px;background:linear-gradient(135deg,#1e3a8a,#3b82f6);border:1px solid #60a5fa;color:#fff;font-size:17px;font-weight:800;border-radius:12px;cursor:pointer;box-shadow:0 0 20px rgba(59,130,246,0.6);margin-top:4px}
.ov-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ov">
  <div class="ov-t">🚀 VTRX SPACE ASSAULT!</div>
  <div class="ov-s">Destroy the alien fleet before they reach Earth!</div>
  <div class="ov-s" style="color:#444">← → / A D to move &nbsp;·&nbsp; Auto-fires &nbsp;·&nbsp; Grab power-ups</div>
  <button class="ov-btn" onclick="startGame()">▶ LAUNCH</button>
</div>
</div>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const W = 480, H = 660;
cvs.width = W; cvs.height = H;

// Star field
const STARS = Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,spd:0.3+Math.random()*1.8,r:Math.random()*1.6}));

const SHIP_W = 34, SHIP_H = 42;
const E_TYPES = [
  {icon:'👾',w:28,h:24,hp:1,pts:10,col:'#a855f7',shoot:true},
  {icon:'🛸',w:32,h:28,hp:2,pts:25,col:'#22c55e',shoot:true},
  {icon:'💀',w:34,h:30,hp:5,pts:60,col:'#ef4444',shoot:true},
];

let state='menu', score=0, lives=3, wave=0, tick=0;
let ship={x:W/2,y:H-80,shield:0,rapid:0,inv:0};
let bullets=[], eBullets=[], enemies=[], particles=[], powerups=[];
let shootT=0, eShootT=0, waveText='', waveTextT=0, nextWaveTimer=0;
let keys={};

function startGame(){
  score=0;lives=3;wave=0;tick=0;
  bullets=[];eBullets=[];enemies=[];particles=[];powerups=[];
  ship={x:W/2,y:H-80,shield:0,rapid:0,inv:0};
  shootT=0;eShootT=0;waveText='';waveTextT=0;nextWaveTimer=0;
  document.getElementById('ov').style.display='none';
  state='playing';
  spawnWave();
}

function spawnWave(){
  wave++;
  enemies=[];
  nextWaveTimer=0;
  waveText='WAVE '+wave;waveTextT=120;
  const eType=Math.min(2,Math.floor((wave-1)/3));
  const rows=Math.min(4,1+Math.floor(wave/2));
  const cols=Math.min(9,4+wave);
  const startX=(W-cols*50)/2+25;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const t=Math.min(eType,r%3);
      const def=E_TYPES[t];
      enemies.push({x:startX+c*50,y:50+r*52,vx:(0.6+wave*0.08)*(r%2===0?1:-1),type:t,hp:def.hp,maxHp:def.hp,dieT:0,dead:false});
    }
  }
}

function particle(x,y,col,n){
  for(let i=0;i<(n||8);i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:24,ml:24});
  }
}

function spawnPowerup(x,y){
  if(Math.random()<0.25){
    const t=Math.random()<0.5?'shield':'rapid';
    powerups.push({x,y,type:t,vy:1.4});
  }
}

function drawStars(){
  STARS.forEach(s=>{
    s.y+=s.spd;if(s.y>H)s.y=0;
    ctx.fillStyle=`rgba(255,255,255,${0.25+s.spd*0.2})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
}

function drawShip(x,y,hasShield){
  // Engine glow
  ctx.shadowBlur=14;ctx.shadowColor='#3b82f6';
  // Main body
  ctx.fillStyle='#1e3a8a';
  ctx.beginPath();
  ctx.moveTo(x,y-SHIP_H/2);
  ctx.lineTo(x-SHIP_W/2,y+SHIP_H/2);
  ctx.lineTo(x-SHIP_W/4,y+SHIP_H/5);
  ctx.lineTo(x,y+SHIP_H/2-8);
  ctx.lineTo(x+SHIP_W/4,y+SHIP_H/5);
  ctx.lineTo(x+SHIP_W/2,y+SHIP_H/2);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  // Cockpit
  ctx.fillStyle='#60a5fa';
  ctx.beginPath();
  ctx.moveTo(x,y-SHIP_H/2+5);
  ctx.lineTo(x-9,y+8);ctx.lineTo(x+9,y+8);
  ctx.closePath();ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(147,197,253,0.5)';
  ctx.beginPath();ctx.moveTo(x,y-SHIP_H/2+7);
  ctx.lineTo(x-4,y);ctx.lineTo(x+4,y);ctx.closePath();ctx.fill();
  // Engine flames
  const fl=6+Math.sin(tick*0.3)*3;
  ctx.shadowBlur=10;ctx.shadowColor='#f97316';
  ctx.fillStyle='#f97316';
  ctx.beginPath();ctx.moveTo(x-10,y+SHIP_H/2-5);ctx.lineTo(x-4,y+SHIP_H/2+fl);ctx.lineTo(x+2,y+SHIP_H/2-5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#facc15';
  ctx.beginPath();ctx.moveTo(x-8,y+SHIP_H/2-5);ctx.lineTo(x-3,y+SHIP_H/2+fl*0.6);ctx.lineTo(x+1,y+SHIP_H/2-5);ctx.closePath();ctx.fill();
  const fl2=6+Math.cos(tick*0.3)*3;
  ctx.fillStyle='#f97316';
  ctx.beginPath();ctx.moveTo(x-2,y+SHIP_H/2-5);ctx.lineTo(x+4,y+SHIP_H/2+fl2);ctx.lineTo(x+10,y+SHIP_H/2-5);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  // Shield
  if(hasShield){
    ctx.strokeStyle='rgba(56,189,248,0.75)';ctx.lineWidth=2.5;
    ctx.shadowBlur=12;ctx.shadowColor='#38bdf8';
    ctx.beginPath();ctx.arc(x,y,38,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  }
}

function drawEnemy(e){
  if(e.dead){
    if(e.dieT<20){
      ctx.globalAlpha=1-e.dieT/20;
      ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💥',e.x,e.y);ctx.globalAlpha=1;
    }
    return;
  }
  const def=E_TYPES[e.type];
  ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(def.icon,e.x,e.y);
  if(e.hp<e.maxHp){
    const bw=28;
    ctx.fillStyle='#1a1a1a';ctx.fillRect(e.x-bw/2,e.y-22,bw,4);
    ctx.fillStyle=def.col;ctx.fillRect(e.x-bw/2,e.y-22,bw*(e.hp/e.maxHp),4);
  }
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,10,0.75)';ctx.fillRect(0,0,W,36);
  ctx.font='bold 15px Segoe UI';ctx.fillStyle='#fff';
  ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('SCORE: '+score,12,18);
  ctx.textAlign='center';ctx.fillText('⚡ WAVE '+wave,W/2,18);
  ctx.textAlign='right';ctx.fillText('❤️'.repeat(Math.max(0,lives)),W-12,18);
  if(ship.shield>0){ctx.fillStyle='#38bdf8';ctx.font='11px Segoe UI';ctx.textAlign='left';ctx.fillText('🛡️ SHIELD',12,H-10);}
  if(ship.rapid>0){ctx.fillStyle='#facc15';ctx.font='11px Segoe UI';ctx.textAlign='center';ctx.fillText('⚡ RAPID FIRE',W/2,H-10);}
  // Wave announcement
  if(waveTextT>0){
    ctx.globalAlpha=Math.min(1,waveTextT/30);
    ctx.font='bold 36px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#facc15';ctx.fillText(waveText,W/2,H/2);
    ctx.globalAlpha=1;
  }
  // Next wave countdown
  if(nextWaveTimer>0){
    const secs=Math.ceil(nextWaveTimer/60);
    ctx.globalAlpha=0.9;
    ctx.font='bold 22px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#4ade80';ctx.fillText('✅ WAVE CLEAR! Next wave in '+secs+'...',W/2,H/2);
    ctx.globalAlpha=1;
  }
}

function showOver(title){
  const ov=document.getElementById('ov');
  ov.style.display='flex';
  ov.innerHTML=`
    <div class="ov-t">${title}</div>
    <div class="ov-score">Score: ${score} · Wave: ${wave}</div>
    <div class="ov-s">Blast through the alien waves to survive!</div>
    <button class="ov-btn" onclick="startGame()">▶ TRY AGAIN</button>
  `;
}

function update(){
  if(state!=='playing')return;
  tick++;
  if(waveTextT>0)waveTextT--;
  if(ship.shield>0)ship.shield--;
  if(ship.rapid>0)ship.rapid--;
  if(ship.inv>0)ship.inv--;

  // Ship move
  const spd=5;
  if(keys['ArrowLeft']||keys['a'])ship.x=Math.max(SHIP_W/2,ship.x-spd);
  if(keys['ArrowRight']||keys['d'])ship.x=Math.min(W-SHIP_W/2,ship.x+spd);

  // Player fire
  const rate=ship.rapid>0?7:20;
  shootT--;
  if(shootT<=0){
    bullets.push({x:ship.x,y:ship.y-SHIP_H/2,vy:-12,vx:0});
    if(ship.rapid>0){
      bullets.push({x:ship.x-12,y:ship.y-20,vy:-11,vx:-0.8});
      bullets.push({x:ship.x+12,y:ship.y-20,vy:-11,vx:0.8});
    }
    shootT=rate;
  }

  // Move bullets
  bullets.forEach(b=>{b.y+=b.vy;b.x+=b.vx;});
  bullets=bullets.filter(b=>b.y>-10&&b.x>-10&&b.x<W+10);

  // Move enemies
  let bounce=false;
  const alive=enemies.filter(e=>!e.dead);
  alive.forEach(e=>{e.x+=e.vx;if(e.x<24||e.x>W-24)bounce=true;});
  if(bounce){alive.forEach(e=>{e.vx*=-1;e.y+=16;});}

  // Enemy reached bottom
  if(alive.some(e=>e.y>H-50)){
    lives--;
    if(lives<=0){state='dead';showOver('💀 EARTH DESTROYED!');}
    else{enemies=[];spawnWave();}
    return;
  }

  // Enemy shoot
  eShootT--;
  if(eShootT<=0&&alive.length>0){
    const shooter=alive[Math.random()*alive.length|0];
    eBullets.push({x:shooter.x,y:shooter.y+14,vy:2.8+wave*0.18});
    eShootT=Math.max(18,55-wave*4);
  }
  eBullets.forEach(b=>b.y+=b.vy);
  eBullets=eBullets.filter(b=>b.y<H);

  // Enemy bullets hit player
  if(ship.inv===0){
    for(let i=eBullets.length-1;i>=0;i--){
      const b=eBullets[i];
      if(Math.abs(b.x-ship.x)<20&&Math.abs(b.y-ship.y)<24){
        eBullets.splice(i,1);
        if(ship.shield>0){ship.shield=0;particle(b.x,b.y,'#38bdf8',6);}
        else{lives--;ship.inv=140;particle(ship.x,ship.y,'#f87171',14);
          if(lives<=0){state='dead';showOver('💀 SHIP DESTROYED!');return;}}
        break;
      }
    }
  }

  // Player bullets hit enemies
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];if(e.dead)continue;
      if(Math.abs(b.x-e.x)<18&&Math.abs(b.y-e.y)<17){
        e.hp--;particle(b.x,b.y,E_TYPES[e.type].col,4);
        bullets.splice(bi,1);
        if(e.hp<=0){
          e.dead=true;e.dieT=0;
          const def=E_TYPES[e.type];
          score+=def.pts*(1+Math.floor(wave/3));
          particle(e.x,e.y,def.col,14);
          spawnPowerup(e.x,e.y);
        }
        continue outer;
      }
    }
  }

  // Tick dead enemies
  enemies.filter(e=>e.dead).forEach(e=>e.dieT++);
  enemies=enemies.filter(e=>!e.dead||e.dieT<20);

  // All dead → start 2-second countdown then next wave
  // Use alive (computed at frame start) to detect the frame after last enemy dies
  if(alive.length===0 && wave>0 && nextWaveTimer===0 && state==='playing'){
    nextWaveTimer=120; // 2 seconds at ~60fps
  }
  if(nextWaveTimer>0){
    nextWaveTimer--;
    if(nextWaveTimer===0) spawnWave();
  }

  // Powerups
  powerups.forEach(p=>p.y+=p.vy);
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(Math.abs(p.x-ship.x)<26&&Math.abs(p.y-ship.y)<26){
      if(p.type==='shield')ship.shield=350;else ship.rapid=350;
      particle(p.x,p.y,'#facc15',8);powerups.splice(i,1);
    }else if(p.y>H)powerups.splice(i,1);
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;});
  particles=particles.filter(p=>p.life>0);
}

function frame(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  drawStars();
  // Nebula glow
  const ng=ctx.createRadialGradient(W*0.7,H*0.3,0,W*0.7,H*0.3,200);
  ng.addColorStop(0,'rgba(59,10,80,0.12)');ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  // Powerups
  powerups.forEach(p=>{
    const bob=Math.sin(tick*0.1)*4;
    ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.type==='shield'?'🛡️':'⚡',p.x,p.y+bob);
  });

  // Enemy bullets
  eBullets.forEach(b=>{
    ctx.shadowBlur=8;ctx.shadowColor='#f87171';
    ctx.fillStyle='#ef4444';ctx.fillRect(b.x-3,b.y,6,14);ctx.shadowBlur=0;
  });

  // Player bullets
  bullets.forEach(b=>{
    ctx.shadowBlur=8;ctx.shadowColor='#facc15';
    ctx.fillStyle='#facc15';ctx.fillRect(b.x-2.5,b.y,5,14);ctx.shadowBlur=0;
  });

  // Enemies
  enemies.forEach(drawEnemy);

  // Ship
  if(state==='playing'&&(ship.inv===0||Math.floor(ship.inv/8)%2===0)){
    drawShip(ship.x,ship.y,ship.shield>0);
  }

  drawHUD();
  update();
  requestAnimationFrame(frame);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch drag for mobile
let touchX=null;
cvs.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;e.preventDefault();},{passive:false});
cvs.addEventListener('touchmove',e=>{
  if(touchX===null)return;
  const dx=e.touches[0].clientX-touchX;touchX=e.touches[0].clientX;
  ship.x=Math.max(SHIP_W/2,Math.min(W-SHIP_W/2,ship.x+dx*1.5));e.preventDefault();
},{passive:false});
cvs.addEventListener('touchend',()=>{touchX=null;});

frame();
</script>
</body>
</html>
