<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VTRX Stickman War!</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#1a1008; color:#f0e8d0; min-height:100vh; overflow-x:hidden; }
#root { min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.game-root { width:100%; max-width:820px; padding:12px; display:flex; flex-direction:column; gap:12px; }

/* HUD */
.hud { display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,#2c1810,#3d2415,#2c1810); border:2px solid #8b6914; border-radius:10px; padding:10px 16px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
.hud-army { flex:1; display:flex; flex-direction:column; gap:1px; }
.hud-army.player-side { align-items:flex-start; }
.hud-army.enemy-side  { align-items:flex-end; text-align:right; }
.army-label { font-size:10px; font-weight:700; letter-spacing:.1em; opacity:.55; text-transform:uppercase; }
.army-count { font-size:32px; font-weight:900; line-height:1; }
.player-count { color:#c8c8c8; }
.enemy-count  { color:#d06060; }
.army-sub     { font-size:10px; opacity:.45; }
.enemy-name   { color:#e08080; opacity:.75; font-style:italic; }
.hud-center   { display:flex; flex-direction:column; align-items:center; gap:6px; }
.level-badge  { display:flex; align-items:center; gap:5px; background:linear-gradient(135deg,#7a5500,#c49020); border:1.5px solid #f0c030; border-radius:6px; padding:2px 12px; }
.level-word   { font-size:9px; font-weight:900; letter-spacing:.12em; color:rgba(255,240,180,.7); }
.level-num    { font-size:22px; font-weight:900; color:#fff5c0; text-shadow:0 0 8px rgba(255,220,0,.6); }
.coins-row    { display:flex; align-items:center; gap:4px; }
.coin-icon    { font-size:20px; }
.coin-value   { font-size:22px; font-weight:900; color:#ffd700; }
.hud-actions  { display:flex; gap:8px; align-items:center; }

/* Buttons */
.btn { padding:8px 20px; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:.05em; transition:all .15s; text-transform:uppercase; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-battle { background:linear-gradient(135deg,#c0392b,#e74c3c,#c0392b); color:#fff; border:2px solid #922b21; box-shadow:0 3px 12px rgba(192,57,43,.5); font-size:16px; padding:10px 28px; }
.btn-battle:hover:not(:disabled) { background:linear-gradient(135deg,#e74c3c,#f55,#e74c3c); transform:translateY(-1px); }
.btn-shop { background:linear-gradient(135deg,#8b6914,#d4a017,#8b6914); color:#1a1008; border:2px solid #f0c030; }
.btn-shop.active { background:linear-gradient(135deg,#d4a017,#f0c030,#d4a017); }
.battle-status { color:#f0c030; font-size:14px; font-weight:700; animation:pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* Canvas */
.canvas-wrapper { width:100%; display:flex; justify-content:center; }
canvas { display:block; }

/* Shop */
.shop-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:100; }
.shop-panel { background:linear-gradient(160deg,#2c1810,#3d2415); border:2px solid #8b6914; border-radius:12px; padding:20px; width:min(480px,95vw); box-shadow:0 8px 40px rgba(0,0,0,.8); }
.shop-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid rgba(139,105,20,.4); }
.shop-header h2 { font-size:20px; font-weight:900; color:#f0d060; }
.shop-coins { font-size:18px; font-weight:700; color:#ffd700; }
.shop-close { background:none; border:none; color:#f0e8d0; font-size:18px; cursor:pointer; opacity:.6; transition:opacity .15s; }
.shop-close:hover { opacity:1; }
.shop-items { display:flex; flex-direction:column; gap:10px; }
.shop-item { display:flex; align-items:center; gap:12px; background:rgba(0,0,0,.25); border:1px solid rgba(139,105,20,.3); border-radius:8px; padding:10px 12px; }
.shop-item-icon { font-size:28px; width:36px; text-align:center; }
.shop-item-info { flex:1; }
.shop-item-name { font-size:14px; font-weight:700; color:#f0e8d0; display:flex; align-items:center; gap:8px; }
.shop-item-desc { font-size:12px; color:rgba(240,232,208,.6); margin-top:2px; }
.shop-divider { text-align:center; font-size:11px; font-weight:700; letter-spacing:.1em; color:rgba(240,208,96,.5); margin:4px 0; }
.shop-btn { padding:8px 16px; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .15s; border:2px solid; }
.shop-btn:disabled { opacity:.4; cursor:not-allowed; }
.buy-btn { background:linear-gradient(135deg,#1a6b2e,#27ae60); border-color:#1a8c3a; color:#fff; }
.upgrade-btn { background:linear-gradient(135deg,#8b6914,#d4a017); border-color:#f0c030; color:#1a1008; }
.shop-level-badge { background:rgba(240,192,48,.2); border:1px solid #f0c030; border-radius:4px; padding:1px 6px; font-size:11px; color:#f0c030; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:200; }
.modal-panel { border-radius:16px; padding:40px 48px; text-align:center; border:3px solid; box-shadow:0 12px 60px rgba(0,0,0,.8); }
.modal-victory { background:linear-gradient(160deg,#0a2e14,#1a4a25); border-color:#27ae60; }
.modal-defeat  { background:linear-gradient(160deg,#2e0a0a,#4a1a1a); border-color:#c0392b; }
.modal-level-tag { font-size:11px; font-weight:700; letter-spacing:.15em; opacity:.5; margin-bottom:8px; }
.modal-title { font-size:48px; font-weight:900; margin-bottom:12px; text-shadow:0 0 20px currentColor; }
.modal-victory .modal-title { color:#2ecc71; }
.modal-defeat  .modal-title { color:#e74c3c; }
.modal-subtitle { font-size:16px; opacity:.8; margin-bottom:20px; }
.modal-coins { font-size:22px; font-weight:700; color:#ffd700; margin-bottom:16px; }
.modal-next { font-size:14px; opacity:.75; margin-bottom:24px; display:flex; align-items:center; justify-content:center; gap:8px; }
.modal-next-label { font-weight:700; }
.btn-modal { background:linear-gradient(135deg,#8b6914,#d4a017); color:#1a1008; border:2px solid #f0c030; padding:12px 36px; font-size:16px; }
.btn-modal:hover { background:linear-gradient(135deg,#d4a017,#f0c030); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── GAME ENGINE ─────────────────────────────────────────────────────────────

const ENEMY_TIERS = [
  { name:"Peasant Rabble",  soldiers:50,  hp:70,  atk:10, armor:2 },
  { name:"Militia Guard",   soldiers:60,  hp:88,  atk:13, armor:3 },
  { name:"Iron Brigade",    soldiers:72,  hp:108, atk:17, armor:4 },
  { name:"Steel Legion",    soldiers:85,  hp:130, atk:21, armor:5 },
  { name:"Death Knights",   soldiers:100, hp:155, atk:26, armor:7 },
  { name:"Shadow Warband",  soldiers:115, hp:185, atk:31, armor:8 },
  { name:"Blood Covenant",  soldiers:130, hp:220, atk:37, armor:10 },
  { name:"Crimson Elite",   soldiers:148, hp:260, atk:43, armor:12 },
  { name:"Hellfire Corps",  soldiers:168, hp:305, atk:50, armor:14 },
  { name:"Eternal Legion",  soldiers:190, hp:360, atk:58, armor:17 },
];

function getTier(level) {
  return ENEMY_TIERS[Math.min(level - 1, ENEMY_TIERS.length - 1)];
}

const COLS = 13, SPACING_X = 13, SPACING_Y = 13, START_Y = 28;

function playerPos(i) {
  return { x: 22 + (i % COLS) * SPACING_X, y: START_Y + Math.floor(i / COLS) * SPACING_Y };
}
function enemyPos(i) {
  return { x: 778 - (i % COLS) * SPACING_X, y: START_Y + Math.floor(i / COLS) * SPACING_Y };
}

let projId = 1000, soldierIdCounter = 0;

function makeSoldier(team, i, hp, atk, armor) {
  const pos = team === "player" ? playerPos(i) : enemyPos(i);
  return {
    id: ++soldierIdCounter, x: pos.x, y: pos.y,
    hp, maxHp: hp, atk, armor,
    speed: 52, range: 18, cooldown: 0,
    state: "idle", direction: team === "player" ? 1 : -1,
    animFrame: 0, team,
  };
}

function buildEnemyArmy(level) {
  const tier = getTier(level);
  return Array.from({ length: tier.soldiers }, (_, i) =>
    makeSoldier("enemy", i, tier.hp, tier.atk, tier.armor)
  );
}

function createInitialState() {
  return {
    playerArmy: Array.from({ length: 50 }, (_, i) => makeSoldier("player", i, 60, 8, 2)),
    enemyArmy: buildEnemyArmy(1),
    projectiles: [], coins: 50,
    upgrades: { strength: 0, health: 0, armor: 0 },
    battleOver: false, level: 1,
  };
}

function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

function findNearest(soldier, enemies) {
  const alive = enemies.filter(e => e.hp > 0 && e.state !== "dead" && e.state !== "dying");
  if (!alive.length) return null;
  return alive.reduce((best, e) => dist(soldier, e) < dist(soldier, best) ? e : best);
}

function gameLoop(state, dt) {
  if (state.battleOver) return state;
  const dtSec = dt / 1000;
  const newProj = [...state.projectiles];
  const newPlayer = state.playerArmy.map(s => ({ ...s }));
  const newEnemy  = state.enemyArmy.map(s => ({ ...s }));

  function processArmy(army, enemies) {
    for (const s of army) {
      if (s.state === "dead" || s.state === "dying") {
        s.animFrame = Math.min(s.animFrame + dtSec * 3, 3);
        if (s.state === "dying" && s.animFrame >= 3) s.state = "dead";
        continue;
      }
      s.animFrame = (s.animFrame + dtSec * 5) % 4;
      if (s.cooldown > 0) s.cooldown -= dtSec;
      const target = findNearest(s, enemies);
      if (!target) { s.state = "idle"; continue; }
      const d = dist(s, target);
      if (d <= s.range) {
        s.state = "attacking";
        if (s.cooldown <= 0) {
          s.cooldown = 0.9;
          newProj.push({ id: projId++, x: s.x, y: s.y, tx: target.x, ty: target.y, speed: 280, atk: s.atk, team: s.team, targetId: target.id });
        }
      } else {
        s.state = "marching";
        const dx = target.x - s.x, dy = target.y - s.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        s.x += (dx/len)*s.speed*dtSec; s.y += (dy/len)*s.speed*dtSec;
        s.direction = dx > 0 ? 1 : -1;
      }
    }
  }

  processArmy(newPlayer, newEnemy);
  processArmy(newEnemy, newPlayer);

  const survivingProj = [];
  for (const p of newProj) {
    const dx = p.tx-p.x, dy = p.ty-p.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 5) {
      const targets = p.team === "player" ? newEnemy : newPlayer;
      const target = targets.find(s => s.id === p.targetId);
      if (target && target.hp > 0 && target.state !== "dead" && target.state !== "dying") {
        const dmg = Math.max(1, p.atk - target.armor);
        target.hp -= dmg;
        if (target.hp <= 0) { target.hp = 0; target.state = "dying"; target.animFrame = 0; }
      }
    } else {
      const ml = Math.min(p.speed*dtSec, len);
      survivingProj.push({ ...p, x: p.x+(dx/len)*ml, y: p.y+(dy/len)*ml });
    }
  }

  const playerAlive = newPlayer.filter(s => s.hp > 0 && s.state !== "dead").length;
  const enemyAlive  = newEnemy.filter(s  => s.hp > 0 && s.state !== "dead").length;
  return { ...state, playerArmy: newPlayer, enemyArmy: newEnemy, projectiles: survivingProj, battleOver: playerAlive === 0 || enemyAlive === 0 };
}

// ─── CANVAS RENDERER ──────────────────────────────────────────────────────────

const CANVAS_W = 800, CANVAS_H = 500;
const RANK_COLORS = [null, "#cd7f32", "#c0c0c0", "#ffd700"];

function strengthRank(atk) {
  if (atk >= 36) return 3;
  if (atk >= 24) return 2;
  if (atk >= 14) return 1;
  return 0;
}

function drawGround(ctx) {
  const grass = ctx.createLinearGradient(0,0,0,CANVAS_H);
  grass.addColorStop(0,"#3a7d44"); grass.addColorStop(.5,"#2d6a35"); grass.addColorStop(1,"#3a7d44");
  ctx.fillStyle = grass; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.strokeStyle="rgba(255,255,255,.03)"; ctx.lineWidth=1;
  for (let y=0; y<CANVAS_H; y+=14) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CANVAS_W,y); ctx.stroke(); }
  ctx.fillStyle="rgba(60,100,200,.06)"; ctx.fillRect(0,0,CANVAS_W/2,CANVAS_H);
  ctx.fillStyle="rgba(180,40,40,.06)";  ctx.fillRect(CANVAS_W/2,0,CANVAS_W/2,CANVAS_H);
  ctx.strokeStyle="rgba(255,255,180,.2)"; ctx.lineWidth=1.5; ctx.setLineDash([10,7]);
  ctx.beginPath(); ctx.moveTo(CANVAS_W/2,0); ctx.lineTo(CANVAS_W/2,CANVAS_H); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font="bold 10px sans-serif";
  ctx.fillStyle="rgba(180,220,255,.45)"; ctx.fillText("YOUR SIDE",6,14);
  ctx.fillStyle="rgba(255,180,180,.45)"; ctx.textAlign="right"; ctx.fillText("ENEMY SIDE",CANVAS_W-6,14);
  ctx.textAlign="left";
}

function drawSoldier(ctx, s) {
  if (s.state === "dead") return;
  const { x, y, state, animFrame, team, hp, maxHp, direction, atk } = s;
  const isPlayer = team === "player";
  const dying = state === "dying";
  const alpha = dying ? Math.max(0, 1 - animFrame/3) : 1;
  ctx.globalAlpha = alpha;
  const bob = state === "marching" ? Math.sin(animFrame*Math.PI*2)*0.5 : 0;
  const px = x + bob*0.2, py = y + bob*0.15;
  const rank = strengthRank(atk);
  const r = 4 + rank*0.6;

  ctx.fillStyle="rgba(0,0,0,.2)"; ctx.beginPath();
  ctx.ellipse(px+1.5, py+2, r, r*.5, 0, 0, Math.PI*2); ctx.fill();

  const ringColor = RANK_COLORS[rank];
  if (ringColor) {
    ctx.strokeStyle = ringColor; ctx.lineWidth = rank===3 ? 1.8 : 1.2; ctx.globalAlpha = alpha*.85;
    ctx.beginPath(); ctx.arc(px, py, r+1.8, 0, Math.PI*2); ctx.stroke();
    if (rank === 3) {
      ctx.strokeStyle="rgba(255,215,0,.3)"; ctx.lineWidth=3.5;
      ctx.beginPath(); ctx.arc(px, py, r+3, 0, Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = alpha;
  }

  const bodyColor = isPlayer ? "#1a1a1a" : "#6b0f0f";
  const bodyHL    = isPlayer ? "#3a3a3a" : "#9b1c1c";
  const grd = ctx.createRadialGradient(px-1.5,py-1.5,.5,px,py,r);
  grd.addColorStop(0,bodyHL); grd.addColorStop(1,bodyColor);
  ctx.fillStyle=grd; ctx.strokeStyle=isPlayer?"#000":"#3b0808"; ctx.lineWidth=.8;
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill(); ctx.stroke();

  const hx=px+direction*1.8, hy=py-1.2, hr=r*.62;
  ctx.fillStyle=isPlayer?"#222":"#7a1010"; ctx.strokeStyle=isPlayer?"#000":"#3b0808"; ctx.lineWidth=.5;
  ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=isPlayer?"#555":"#b52020";
  ctx.beginPath(); ctx.arc(hx-.7,hy-.7,hr*.38,0,Math.PI*2); ctx.fill();

  const spearLen = 8+(state==="attacking"?3:0);
  const sx=px+direction*(r-.5), ex=px+direction*(r+spearLen);
  ctx.strokeStyle="#5a2e06"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx,py); ctx.lineTo(ex,py); ctx.stroke();
  ctx.fillStyle="#aaa"; ctx.strokeStyle="#444"; ctx.lineWidth=.4;
  ctx.beginPath(); ctx.moveTo(ex,py-1.8); ctx.lineTo(ex+direction*3.5,py); ctx.lineTo(ex,py+1.8);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  const shieldX = px-direction*(r+2.2);
  ctx.fillStyle=isPlayer?"#111":"#4a0808"; ctx.strokeStyle=isPlayer?"#000":"#2a0404"; ctx.lineWidth=.5;
  ctx.beginPath(); ctx.ellipse(shieldX,py,2,3.5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=isPlayer?"#444":"#802020"; ctx.beginPath(); ctx.arc(shieldX,py,.8,0,Math.PI*2); ctx.fill();

  if (hp < maxHp) {
    const bw=10, bh=2, bx=px-bw/2, by=py-r-5;
    ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(bx-.5,by-.5,bw+1,bh+1);
    ctx.fillStyle="#333"; ctx.fillRect(bx,by,bw,bh);
    const pct=hp/maxHp;
    ctx.fillStyle=pct>.6?"#2ecc71":pct>.3?"#f39c12":"#e74c3c";
    ctx.fillRect(bx,by,bw*pct,bh);
  }

  if (dying && animFrame < 1) {
    ctx.fillStyle=`rgba(255,80,0,${.5-animFrame*.5})`;
    ctx.beginPath(); ctx.arc(px,py,r+3,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawProjectile(ctx, p) {
  const dx=p.tx-p.x, dy=p.ty-p.y, angle=Math.atan2(dy,dx);
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(angle);
  ctx.strokeStyle="#5a2e06"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-4,0); ctx.lineTo(4,0); ctx.stroke();
  ctx.fillStyle="#bbb"; ctx.strokeStyle="#444"; ctx.lineWidth=.4;
  ctx.beginPath(); ctx.moveTo(4,-1.5); ctx.lineTo(7,0); ctx.lineTo(4,1.5); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.globalAlpha=.28; ctx.strokeStyle=p.team==="player"?"#8090ff":"#ff5050"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-3,0); ctx.stroke();
  ctx.globalAlpha=1; ctx.restore();
}

function drawLegend(ctx) {
  const items=[{label:"Basic",rank:0},{label:"Bronze",rank:1,color:"#cd7f32"},{label:"Silver",rank:2,color:"#c0c0c0"},{label:"Gold",rank:3,color:"#ffd700"}];
  const lx=CANVAS_W/2-80, ly=CANVAS_H-28;
  ctx.font="9px sans-serif";
  items.forEach((item,i) => {
    const cx=lx+i*42, cy=ly+8, r=4+item.rank*.6;
    if (item.rank > 0) { ctx.strokeStyle=item.color; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2); ctx.stroke(); }
    ctx.fillStyle="#1a1a1a"; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.55)"; ctx.textAlign="center"; ctx.fillText(item.label,cx,cy+r+9);
  });
  ctx.textAlign="left";
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────────

function BattleCanvas({ gameState }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d"); if (!ctx) return;
    ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
    drawGround(ctx); drawLegend(ctx);
    const deadE = gameState.enemyArmy.filter(s=>s.state==="dead");
    const deadP = gameState.playerArmy.filter(s=>s.state==="dead");
    const aliveE= gameState.enemyArmy.filter(s=>s.state!=="dead");
    const aliveP= gameState.playerArmy.filter(s=>s.state!=="dead");
    [...deadE,...deadP].forEach(s=>drawSoldier(ctx,s));
    [...aliveE,...aliveP].forEach(s=>drawSoldier(ctx,s));
    gameState.projectiles.forEach(p=>drawProjectile(ctx,p));
    if (gameState.battleOver) {
      const won = gameState.enemyArmy.every(s=>s.hp<=0);
      ctx.fillStyle="rgba(0,0,0,.48)"; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.textAlign="center"; ctx.font="bold 52px sans-serif";
      ctx.fillStyle=won?"#2ecc71":"#e74c3c";
      ctx.fillText(won?"VICTORY!":"DEFEAT!",CANVAS_W/2,CANVAS_H/2-8);
      ctx.textAlign="left";
    }
  });
  return (
    <div className="canvas-wrapper">
      <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H}
        style={{width:"100%",maxWidth:CANVAS_W,borderRadius:8,boxShadow:"0 4px 24px rgba(0,0,0,.5)"}} />
    </div>
  );
}

function HUD({ coins, playerCount, enemyCount, enemyName, level, isBattling, onBattle, onShop, showShop }) {
  return (
    <div className="hud">
      <div className="hud-army player-side">
        <div className="army-label">YOUR ARMY</div>
        <div className="army-count player-count">{playerCount}</div>
        <div className="army-sub">soldiers</div>
      </div>
      <div className="hud-center">
        <div className="level-badge">
          <span className="level-word">LEVEL</span>
          <span className="level-num">{level}</span>
        </div>
        <div className="coins-row">
          <span className="coin-icon">🪙</span>
          <span className="coin-value">{coins}</span>
        </div>
        <div className="hud-actions">
          {isBattling ? (
            <div className="battle-status">⚔️ BATTLE IN PROGRESS</div>
          ) : (
            <>
              <button className="btn btn-battle" onClick={onBattle} disabled={playerCount===0}>⚔️ FIGHT</button>
              <button className={`btn btn-shop${showShop?" active":""}`} onClick={onShop}>🛒 SHOP</button>
            </>
          )}
        </div>
      </div>
      <div className="hud-army enemy-side">
        <div className="army-label">ENEMY</div>
        <div className="army-count enemy-count">{enemyCount}</div>
        <div className="army-sub enemy-name">{enemyName}</div>
      </div>
    </div>
  );
}

function Shop({ coins, upgrades, onBuyUnit, onUpgrade, onClose }) {
  const COSTS = { unit:15, strength:30, health:25, armor:35 };
  return (
    <div className="shop-overlay" onClick={onClose}>
      <div className="shop-panel" onClick={e=>e.stopPropagation()}>
        <div className="shop-header">
          <h2>🛒 ARMORY SHOP</h2>
          <div className="shop-coins">🪙 {coins}</div>
          <button className="shop-close" onClick={onClose}>✕</button>
        </div>
        <div className="shop-items">
          <div className="shop-item">
            <div className="shop-item-icon">🪖</div>
            <div className="shop-item-info">
              <div className="shop-item-name">Recruit Squad <span className="shop-level-badge">×20</span></div>
              <div className="shop-item-desc">Add 20 armored soldiers to your army</div>
            </div>
            <button className="shop-btn buy-btn" onClick={onBuyUnit} disabled={coins<COSTS.unit}>🪙 {COSTS.unit}</button>
          </div>
          <div className="shop-divider">UPGRADES — affect all soldiers</div>
          {[
            {key:"strength", icon:"⚔️", label:"Upgrade Strength", desc:"+4 attack damage per level", cost:COSTS.strength},
            {key:"health",   icon:"❤️", label:"Upgrade Health",   desc:"+20 max HP per level",       cost:COSTS.health},
            {key:"armor",    icon:"🛡️", label:"Upgrade Armour",   desc:"+1 damage reduction per level",cost:COSTS.armor},
          ].map(({key,icon,label,desc,cost}) => (
            <div className="shop-item" key={key}>
              <div className="shop-item-icon">{icon}</div>
              <div className="shop-item-info">
                <div className="shop-item-name">{label} <span className="shop-level-badge">Lv {upgrades[key]}</span></div>
                <div className="shop-item-desc">{desc}</div>
              </div>
              <button className="shop-btn upgrade-btn" onClick={()=>onUpgrade(key)} disabled={coins<cost}>🪙 {cost}</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function BattleResultModal({ result, level, nextLevel, nextEnemyName, onClose }) {
  const advancing = result.playerWon && nextLevel > level;
  return (
    <div className="modal-overlay">
      <div className={`modal-panel ${result.playerWon?"modal-victory":"modal-defeat"}`}>
        <div className="modal-level-tag">LEVEL {level}</div>
        <div className="modal-title">{result.playerWon?"VICTORY!":"DEFEAT!"}</div>
        <div className="modal-subtitle">
          {result.playerWon?"Your army crushed the enemy forces.":"Your army was wiped out. Regroup and try again."}
        </div>
        <div className="modal-coins">+{result.coinsEarned} coins</div>
        {advancing && (
          <div className="modal-next">
            <span className="modal-next-label">NEXT →</span>
            <span>Level {nextLevel}: <em>{nextEnemyName}</em></span>
          </div>
        )}
        <button className="btn btn-modal" onClick={onClose}>
          {advancing ? `Advance to Level ${nextLevel}` : "Try Again"}
        </button>
      </div>
    </div>
  );
}

// ─── MAIN GAME ────────────────────────────────────────────────────────────────

let buyIdCounter = 500000;
function makePlayerSoldier(i, hp, atk, armor) {
  const pos = playerPos(i);
  return { id: buyIdCounter++, x:pos.x, y:pos.y, hp, maxHp:hp, atk, armor, speed:52, range:18, cooldown:0, state:"idle", direction:1, animFrame:0, team:"player" };
}

function Game() {
  const [gameState, setGameState]   = useState(createInitialState);
  const [showShop, setShowShop]     = useState(false);
  const [battleResult, setBattleResult] = useState(null);
  const [isBattling, setIsBattling] = useState(false);
  const animFrameRef     = useRef(0);
  const lastTimeRef      = useRef(0);
  const preBattleArmyRef = useRef([]);

  const startBattle = useCallback(() => {
    if (isBattling) return;
    setBattleResult(null); setShowShop(false); setIsBattling(true);
    setGameState(prev => {
      preBattleArmyRef.current = prev.playerArmy.map(s => ({...s, hp:s.maxHp}));
      return {
        ...prev,
        playerArmy: prev.playerArmy.map((s,i) => ({...s,...playerPos(i),hp:s.maxHp,state:"marching",direction:1,animFrame:0})),
        enemyArmy:  prev.enemyArmy.map((s,i)  => ({...s,...enemyPos(i), hp:s.maxHp,state:"marching",direction:-1,animFrame:0})),
        projectiles:[], battleOver:false,
      };
    });
  }, [isBattling]);

  useEffect(() => {
    if (!isBattling) return;
    const tick = (time) => {
      const dt = lastTimeRef.current ? Math.min(time - lastTimeRef.current, 50) : 16;
      lastTimeRef.current = time;
      setGameState(prev => {
        const next = gameLoop(prev, dt);
        if (next.battleOver && !prev.battleOver) {
          const playerWon = next.enemyArmy.every(s => s.hp <= 0);
          const survivors = next.playerArmy.filter(s => s.hp > 0).length;
          const result = {
            playerWon,
            coinsEarned: playerWon ? Math.max(20, survivors*2 + prev.level*5) : Math.max(5, prev.level*2),
          };
          setTimeout(() => {
            setIsBattling(false); setBattleResult(result);
            setGameState(gs => ({...gs, coins: gs.coins + result.coinsEarned}));
          }, 1500);
        }
        return next;
      });
      animFrameRef.current = requestAnimationFrame(tick);
    };
    lastTimeRef.current = 0;
    animFrameRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(animFrameRef.current);
  }, [isBattling]);

  const handleBuyUnit = useCallback(() => {
    setGameState(prev => {
      if (prev.coins < 15) return prev;
      const hp    = 60 + prev.upgrades.health * 20;
      const atk   = 8  + prev.upgrades.strength * 4;
      const armor = 2  + prev.upgrades.armor;
      const newSoldiers = Array.from({length:20},(_,j) => makePlayerSoldier(prev.playerArmy.length+j,hp,atk,armor));
      return {...prev, coins: prev.coins-15, playerArmy:[...prev.playerArmy,...newSoldiers]};
    });
  }, []);

  const handleUpgrade = useCallback((type) => {
    setGameState(prev => {
      const costs = {strength:30, health:25, armor:35};
      if (prev.coins < costs[type]) return prev;
      const army = prev.playerArmy.map(s => {
        if (type==="health") { const m=s.maxHp+20; return {...s,maxHp:m,hp:Math.min(s.hp+20,m)}; }
        if (type==="strength") return {...s, atk:s.atk+4};
        if (type==="armor")    return {...s, armor:s.armor+1};
        return s;
      });
      return {...prev, coins:prev.coins-costs[type], upgrades:{...prev.upgrades,[type]:prev.upgrades[type]+1}, playerArmy:army};
    });
  }, []);

  const handleCloseResult = useCallback(() => {
    setBattleResult(null);
    setGameState(prev => {
      const won = prev.enemyArmy.every(s => s.hp <= 0);
      const nextLevel = won ? Math.min(prev.level+1, ENEMY_TIERS.length) : prev.level;
      const newEnemy  = buildEnemyArmy(nextLevel);
      const restoredArmy = won
        ? prev.playerArmy.filter(s=>s.hp>0).map((s,i)=>({...s,...playerPos(i),hp:s.maxHp,state:"idle"}))
        : preBattleArmyRef.current.map((s,i)=>({...s,...playerPos(i),state:"idle"}));
      return {
        ...prev, level:nextLevel,
        enemyArmy:  newEnemy.map((s,i)=>({...s,...enemyPos(i),state:"idle"})),
        playerArmy: restoredArmy,
        projectiles:[], battleOver:false,
      };
    });
  }, []);

  const tier = getTier(gameState.level);
  const playerAlive = gameState.playerArmy.filter(s=>s.hp>0&&s.state!=="dead").length;
  const enemyAlive  = gameState.enemyArmy.filter(s=>s.hp>0&&s.state!=="dead").length;
  const nextLv = Math.min(gameState.level + (battleResult?.playerWon?1:0), ENEMY_TIERS.length);

  return (
    <div className="game-root">
      <HUD coins={gameState.coins} playerCount={playerAlive} enemyCount={enemyAlive}
        enemyName={tier.name} level={gameState.level} isBattling={isBattling}
        onBattle={startBattle} onShop={()=>setShowShop(s=>!s)} showShop={showShop} />
      <BattleCanvas gameState={gameState} />
      {showShop && !isBattling && (
        <Shop coins={gameState.coins} upgrades={gameState.upgrades}
          onBuyUnit={handleBuyUnit} onUpgrade={handleUpgrade} onClose={()=>setShowShop(false)} />
      )}
      {battleResult && (
        <BattleResultModal result={battleResult} level={gameState.level}
          nextLevel={nextLv} nextEnemyName={getTier(nextLv).name} onClose={handleCloseResult} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Game />);
</script>
</body>
</html>
