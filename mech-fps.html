            color: var(--text-color);

            overflow: hidden;
            user-select: none;
            cursor: pointer;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #top-ui-panel {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
            align-items: center;
        }

            height: 24px;
            background-color: #334155;

            border: 2px solid var(--text-color);

        .health-bar {
            height: 100%;
            transition: width 0.3s ease-in-out, background-color 0.3s ease-in-out;
        }

        #vultorex-health-bar {
            background-color: var(--secondary-color);
        }

        #player-health-bar {
            background-color: #2dd4bf;
        }
        
        #player-health-bar.low-health {
            background-color: #ef4444; /* red-500 */
        }

        .health-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            width: 90%;
            max-width: 400px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        #player-health-panel {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #player-health-panel .health-info {
            width: 100%;
        }

        #player-health-panel .health-bar-container {
             width: 200px;
        }

        #bottom-center-ui {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #ammo-display {
            font-size: 2rem;
            color: var(--primary-color);
        }

        #reload-message {
            font-size: 1.2rem;
            color: var(--secondary-color);
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        #critical-hit-message {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .weapon-selection {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            pointer-events: none;
            z-index: 10;

            border: 2px solid transparent;

            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        .weapon-card.selected {
            border-color: var(--primary-color);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(252, 165, 165, 0.5);

            box-shadow: 0 6px 20px rgba(252, 165, 165, 0.6);

            transform: translateY(0);

        }

        @keyframes fadeIn {
            from { opacity: 0; }

<style>
/* Global Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Arial', sans-serif;
    background: #000;
    overflow: hidden;
    user-select: none;
}

#gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
}

#gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
}

/* Game UI Styles */
#gameUI {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 200px;
}

.ui-panel {
    background: rgba(0, 0, 0, 0.8);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    backdrop-filter: blur(10px);
    color: white;
    overflow: hidden;
}

.panel-header {
    background: rgba(255, 255, 255, 0.1);
    padding: 6px 10px;
    font-weight: bold;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.panel-content {
    padding: 8px;
}

/* Resource Display */
.resource-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 11px;
}

.resource-item:last-child {
    margin-bottom: 0;
}

.resource-value {
    font-weight: bold;
}

#moneyDisplay {
    color: #ffd700;
}

#mineCount {
    color: #4a90e2;
}

#unitCount {
    color: #FF5722;
}

/* Tool and Unit Buttons */
.tool-btn, .unit-btn {
    width: 100%;
    padding: 7px;
    margin-bottom: 5px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 5px;
    color: white;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.tool-btn:hover, .unit-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-1px);
}

.tool-btn:active, .unit-btn:active {
    transform: translateY(0);
}

.tool-btn.selected, .unit-btn.selected {
    background: rgba(76, 175, 80, 0.3);
    border-color: #4caf50;
    box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
}

.tool-btn:disabled, .unit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: rgba(128, 128, 128, 0.2);
}

.tool-btn:disabled:hover, .unit-btn:disabled:hover {
    transform: none;
}

.tool-btn:last-child, .unit-btn:last-child {
    margin-bottom: 0;
}

/* Controls Panel */
.controls-text {
    font-size: 10px;
    line-height: 1.5;
}

.controls-text div {
    margin-bottom: 2px;
}

/* Target Panel */
#targetPanel {
    background: rgba(139, 0, 0, 0.8) !important;
    border-color: rgba(255, 0, 0, 0.5) !important;
}

.target-info {
    text-align: center;
}

.target-title {
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 4px;
}

.target-coords {
    font-size: 10px;
    opacity: 0.8;
}

/* Missile Warning Styles */
.missile-warning {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.95);
    border: 2px solid #ff0000;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
    color: white;
    min-width: 250px;
    max-width: 280px;
    animation: pulse-warning 0.5s infinite alternate;
}

.warning-title {
    color: #ff0000;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
    text-shadow: 0 0 10px #ff0000;
}

.warning-message {
    color: #ffffff;
    font-size: 14px;
    margin-bottom: 8px;
    font-weight: bold;
}

.warning-countdown {
    color: #ffff00;
    font-size: 12px;
    margin-bottom: 15px;
    font-weight: bold;
}

.warning-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
}

.warning-btn {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: bold;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    flex: 1;
    min-width: 60px;
}

.warning-btn.ignore {
    background: #666;
    color: white;
}

.warning-btn.ignore:hover {
    background: #888;
}

.warning-btn.intercept {
    background: #ff4444;
    color: white;
}

.warning-btn.intercept:hover {
    background: #ff6666;
}

.warning-btn.auto {
    background: #4CAF50;
    color: white;
}

.warning-btn.auto:hover {
    background: #66BB6A;
}

/* Auto Intercept Message */
.auto-intercept-message {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: rgba(76, 175, 80, 0.95);
    border: 2px solid #4CAF50;
    border-radius: 6px;
    padding: 10px 15px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    animation: slideInRight 0.5s ease, fadeOut 2s ease 1s forwards;
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: translateX(100%);
    }
}

@keyframes pulse-warning {
    0% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
    100% { box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
}

/* Minimap Styles */
.minimap-container {
    width: 120px;
    height: 120px;
    background: rgba(0, 0, 0, 0.7);
    border: 2px solid rgba(255, 255, 255, 0.3);
    position: relative;
    margin-bottom: 8px;
}

.minimap-marker {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: all 0.2s ease;
}

.minimap-marker:hover {
    transform: translate(-50%, -50%) scale(1.5);
}

.player-marker {
    background: #4CAF50;
    border: 2px solid #2E7D32;
    box-shadow: 0 0 8px #4CAF50;
}

.ai-marker {
    background: #F44336;
    border: 2px solid #C62828;
    box-shadow: 0 0 8px #F44336;
    animation: pulse-enemy 2s infinite;
}

.target-marker {
    background: #FFD700;
    border: 2px solid #FFA000;
    box-shadow: 0 0 8px #FFD700;
    animation: pulse-target 1s infinite;
}

@keyframes pulse-enemy {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

@keyframes pulse-target {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.3); }
}

.minimap-legend {
    font-size: 9px;
    line-height: 1.3;
}

.minimap-legend div {
    display: flex;
    align-items: center;
    margin-bottom: 2px;
}

.legend-player, .legend-enemy, .legend-target {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    display: inline-block;
}

.legend-player {
    background: #4CAF50;
    border: 1px solid #2E7D32;
}

.legend-enemy {
    background: #F44336;
    border: 1px solid #C62828;
}

.legend-target {
    background: #FFD700;
    border: 1px solid #FFA000;
}

/* Loading Screen */
#loadingScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease;
}

.loading-content {
    text-align: center;
    color: white;
}

.loading-content h1 {
    font-size: 40px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

.loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-left: 3px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
}

.loading-content p {
    font-size: 16px;
    opacity: 0.8;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Animations */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.ui-panel {
    animation: fadeIn 0.5s ease;
}

/* Pulse effect for resource updates */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.resource-update {
    animation: pulse 0.3s ease;
}

/* Deployment Message */
.deployment-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 25px;
    background: rgba(0, 0, 0, 0.85);
    border: 2px solid #FFD700;
    border-radius: 8px;
    color: #FFD700;
    font-size: 18px;
    font-weight: bold;
    z-index: 50;
    text-align: center;
    animation: fadeIn 0.5s ease;
}

/* Responsive Design */
@media (max-width: 768px) {
    #gameUI {
        max-width: 150px;
        top: 8px;
        left: 8px;
        gap: 6px;
    }
    
    .panel-header {
        font-size: 10px;
        padding: 5px 8px;
    }
    
    .panel-content {
        padding: 8px;
    }
    
    .tool-btn, .unit-btn {
        padding: 6px;
        font-size: 10px;
    }
    
    .loading-content h1 {
        font-size: 24px;
    }
    
    .minimap-container {
        width: 80px;
        height: 80px;
    }

    .deployment-message {
        font-size: 14px;
        padding: 10px 15px;
    }
}
</style>
</head>

        function init() {
            
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            muzzleFlash.position.set(0, 0, 1.3);
            muzzleFlash.visible = false;

            muzzleLight = new THREE.PointLight(0xffff00, 2, 5);
            muzzleLight.position.set(0, 0, 1.3);
            muzzleLight.visible = false;
            
        
            const crosshairGeometry = new THREE.PlaneGeometry(0.05, 0.05);
            const crosshairMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            const crosshair = new THREE.Mesh(crosshairGeometry, crosshairMaterial);
            crosshair.position.z = -1;
            camera.add(crosshair);

           
            window.addEventListener('resize', onWindowResize);

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            restartButton.addEventListener('click', () => {
                window.location.reload();
            });

            
            gameContainer.addEventListener('mousedown', () => {

            gameLoop();

                currentGun = createAK47();
                currentGun.position.set(0.7, -0.5, -1);

        function spawnMainVultorex() {
            console.log(`Spawning main Vultorex for Wave ${wave}`);
            mainVultorex = createVultorexMech(false);
            mainVultorex.position.set(0, -5, -30);
            scene.add(mainVultorex);
            enemies.push(mainVultorex);
            updateUI();
        }

        function spawnMiniMechs() {
            console.log(`Spawning mini mechs for Wave ${wave}`);
            const miniMechCount = Math.min(10 + (wave - 1) * 8, 50); // 10, 18, 26, 34, 42, 50 max
            
            for (let i = 0; i < miniMechCount; i++) {
                const miniMech = createVultorexMech(true);
                
                // Position mini mechs in a circle around the main boss
                const angle = (i / miniMechCount) * Math.PI * 2;
                const radius = 40 + Math.random() * 40; // Random radius between 40-80
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius - 30; // Offset behind main boss
                
                miniMech.position.set(x, -8, z);
                miniMech.rotation.y = Math.random() * Math.PI * 2; // Random rotation
                
                scene.add(miniMech);
                enemies.push(miniMech);
                
                console.log(`Mini mech ${i + 1} spawned at position (${x.toFixed(1)}, -8, ${z.toFixed(1)})`);
            }
            
            updateUI();
        }

        function nextWave() {
            console.log(`Starting wave transition from Wave ${wave} to Wave ${wave + 1}`);
            wave++;
            gameState = 'wave_transition';
            
            // Clear remaining projectiles and bullets
            projectiles.forEach(p => scene.remove(p));
            bullets.forEach(b => scene.remove(b));
            projectiles = [];
            bullets = [];
            
            // Spawn new main Vultorex for next wave
            spawnMainVultorex();
            
            // Spawn mini mechs for wave 2 and beyond
            if (wave >= 2) {
                spawnMiniMechs();
            }
            
            gameState = 'playing';
            updateUI();
            
            console.log(`Wave ${wave} started with ${enemies.length} enemies`);
            
            // Show wave message
            if (wave <= 10) {
                setTimeout(() => {
                    const waveName = ['', 'Tutorial', 'Mini Army', 'Reinforcements', 'Heavy Assault', 'Elite Forces', 'Overwhelming Force', 'Nightmare', 'Hell Storm', 'Apocalypse', 'Ultimate Challenge'][wave] || `Wave ${wave}`;
                    console.log(`Wave ${wave}: ${waveName}`);
                }, 100);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            if (document.pointerLockElement === renderer.domElement) {
                const movementX = event.movementX || 0;
                const movementY = event.movementY || 0;
                camera.rotation.y -= movementX * 0.002;
                camera.rotation.x -= movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        }
        
        function onMouseDown(event) {
            if (document.pointerLockElement !== renderer.domElement) return;
            isMouseDown = true;
        }

        function onMouseUp(event) {
            isMouseDown = false;
        }

        function onKeyDown(event) {
            keys[event.key.toLowerCase()] = true;
            if (event.key === '1' && !isReloading) {
                switchWeapon('ak47');
            } else if (event.key === '2' && !isReloading) {
                switchWeapon('machineGun');
            }
        }

        function onKeyUp(event) {
            keys[event.key.toLowerCase()] = false;
        }

        function fireBullet() {
            if (isReloading || gameState !== 'playing') {
                return;
            }
            if (weapons[currentWeapon].currentAmmo <= 0) {
                reload();
                return;
            }

            muzzleFlash.visible = true;
            muzzleLight.visible = true;
            setTimeout(() => {
                muzzleFlash.visible = false;
                muzzleLight.visible = false;
            }, 75);

            weapons[currentWeapon].currentAmmo--;
            updateUI();

            const bulletGeometry = new THREE.SphereGeometry(0.05, 8, 8);
            const bulletMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 });
            const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);

            const barrelTipPosition = new THREE.Vector3();
            muzzleFlash.getWorldPosition(barrelTipPosition);
            
            bullet.position.copy(barrelTipPosition);

            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            
            bullet.userData.direction = direction;
            bullet.userData.id = crypto.randomUUID();
            
            scene.add(bullet);
            bullets.push(bullet);

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            for (const intersect of intersects) {
                if (intersect.object.parent && intersect.object.parent.userData.isHitbox) {
                    const enemy = intersect.object.parent;
                    const partName = intersect.object.userData.partName;

                    let damage = weapons[currentWeapon].damage;
                    let isHeadshot = false;

                    if (partName === 'head') {
                        damage *= 2; 
                        isHeadshot = true;
                        showCriticalHitMessage();
                    }

                    enemy.userData.health -= damage;
                    console.log(`Enemy hit for ${damage} damage. Health: ${enemy.userData.health}/${enemy.userData.maxHealth}`);
                    
                    if (enemy.userData.health <= 0) {
                        console.log(`Enemy defeated! Was main boss: ${enemy === mainVultorex}`);
                        scene.remove(enemy);
                        enemies.splice(enemies.indexOf(enemy), 1);
                        
                        if (enemy === mainVultorex) {
                            mainVultorex = null;
                            
                            // Check if all enemies are defeated
                            if (enemies.length === 0) {
                                if (wave < 10) {
                                    console.log(`Wave ${wave} complete, starting Wave ${wave + 1}`);
                                    nextWave();
                                } else {
                                    console.log('All waves complete - Victory!');
                                    showMessage('Victory!', 'You have conquered all 10 waves! Ultimate Champion!');
                                }
                            }
                        } else {
                            // Mini mech defeated - check if all enemies are defeated
                            if (enemies.length === 0) {
                                if (wave < 10) {
                                    console.log(`Wave ${wave} complete, starting Wave ${wave + 1}`);
                                    nextWave();
                                } else {
                                    console.log('All waves complete - Victory!');
                                    showMessage('Victory!', 'You have conquered all 10 waves! Ultimate Champion!');
                                }
                            }
                        }
                    }
                    updateUI();
                    
                    intersect.object.material.emissive.setHex(isHeadshot ? 0xffff00 : 0xff0000);
                    setTimeout(() => {
                        intersect.object.material.emissive.setHex(0x000000);
                    }, 100);
                    break; 
                }
            }
        }

        function showCriticalHitMessage() {
            criticalHitMessage.textContent = 'HEADSHOT!';
            criticalHitMessage.style.opacity = 1;
            setTimeout(() => {
                criticalHitMessage.style.opacity = 0;
            }, 500);
        }

        function reload() {
            isReloading = true;
            reloadMessage.textContent = 'Auto-reloading...';
            reloadMessage.style.opacity = 1;

            setTimeout(() => {
                weapons[currentWeapon].currentAmmo = weapons[currentWeapon].maxAmmo;
                isReloading = false;
                updateUI();
                reloadMessage.style.opacity = 0;
            }, 2000);
        }

        function fireProjectile(gun, damage) {
            const projectile = createFireball();
            
            const startPosition = new THREE.Vector3();
            gun.getWorldPosition(startPosition);
            projectile.position.copy(startPosition);
            
            const direction = new THREE.Vector3();
            camera.getWorldPosition(direction);
            direction.sub(startPosition).normalize();
            
            projectile.userData.direction = direction;
            projectile.userData.life = 0;
            projectile.userData.damage = damage;
            projectile.userData.id = crypto.randomUUID();
            
            scene.add(projectile);
            projectiles.push(projectile);
        }
        
        function updateProjectiles() {
            const speed = 0.5;
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                
                // Move projectile
                p.position.add(p.userData.direction.clone().multiplyScalar(speed));
                
                // Animate scale for visual effect
                const scalePulse = 1 + Math.sin(p.userData.life * 0.1) * 0.2;
                p.scale.copy(p.userData.originalScale).multiplyScalar(scalePulse);
                
                p.userData.life++;
                
                // Check collision with player
                const playerDistance = p.position.distanceTo(camera.position);
                if (playerDistance < 3) {
                    console.log(`Player hit by projectile for ${p.userData.damage} damage`);
                    player.health -= p.userData.damage;
                    scene.remove(p);
                    projectiles.splice(i, 1);
                    
                    if (player.health <= 0) {
                        console.log('Player defeated - Game Over');
                        showMessage('Game Over', 'You have been defeated by Vultorex!');
                        return;
                    }
                    updateUI();
                    continue;
                }
                
                // Remove projectile if it's too far or old
                if (p.userData.life > 300 || p.position.distanceTo(camera.position) > 200) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }
        }

        function updateBullets() {
            const speed = 3;
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.position.add(bullet.userData.direction.clone().multiplyScalar(speed));
                
                // Check collision with enemies
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (enemy && bullet.position.distanceTo(enemy.position) < 8) {
                        // Hit detected
                        let damage = weapons[currentWeapon].damage;
                        
                        // Check if it's a headshot based on bullet Y position relative to enemy
                        const relativeY = bullet.position.y - enemy.position.y;
                        if (relativeY > 3) {
                            damage *= 2;
                            showCriticalHitMessage();
                        }
                        
                        enemy.userData.health -= damage;
                        console.log(`Bullet hit for ${damage} damage. Health: ${enemy.userData.health}/${enemy.userData.maxHealth}`);
                        
                        // Remove bullet
                        scene.remove(bullet);
                        bullets.splice(i, 1);
                        
                        // Check if enemy is defeated
                        if (enemy.userData.health <= 0) {
                            console.log(`Enemy defeated! Was main boss: ${enemy === mainVultorex}`);
                            scene.remove(enemy);
                            enemies.splice(j, 1);
                            
                            if (enemy === mainVultorex) {
                                mainVultorex = null;
                                
                                // Check if all enemies are defeated
                                if (enemies.length === 0) {
                                    if (wave < 10) {
                                        console.log(`Wave ${wave} complete, starting Wave ${wave + 1}`);
                                        nextWave();
                                    } else {
                                        console.log('All waves complete - Victory!');
                                        showMessage('Victory!', 'You have conquered all 10 waves! Ultimate Champion!');
                                    }
                                }
                            } else {
                                // Mini mech defeated - check if all enemies are defeated
                                if (enemies.length === 0) {
                                    if (wave < 10) {
                                        console.log(`Wave ${wave} complete, starting Wave ${wave + 1}`);
                                        nextWave();
                                    } else {
                                        console.log('All waves complete - Victory!');
                                        showMessage('Victory!', 'You have conquered all 10 waves! Ultimate Champion!');
                                    }
                                }
                            }
                        }
                        updateUI();
                        break;
                    }
                }
                
                // Remove bullet if it's too far
                if (bullet.position.distanceTo(camera.position) > 200) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }
        }

        function updateEnemies() {
            if (gameState !== 'playing') return;
            
            enemies.forEach(enemy => {
                // Update attack timer
                enemy.userData.attackTimer++;
                
                // Handle attack animation
                const anim = enemy.userData.attackAnim;
                if (enemy.userData.isAttacking) {
                    anim.timer++;
                    
                    if (anim.phase === 0 && anim.timer >= anim.duration / 2) {
                        // Fire projectile at mid-animation
                        if (anim.currentGun) {
                            fireProjectile(anim.currentGun, enemy.userData.projectileDamage);
                        }
                        anim.phase = 1;
                    }
                    
                    if (anim.timer >= anim.duration) {
                        // Start lowering arms
                        anim.isLoweringArms = true;
                        
                        // End attack animation
                        enemy.userData.isAttacking = false;
                        enemy.userData.attackTimer = 0;
                        anim.timer = 0;
                        anim.phase = 0;
                        anim.currentGun = null;
                    }
                }
                
                // Start new attack if timer is ready
                if (!enemy.userData.isAttacking && enemy.userData.attackTimer >= enemy.userData.attackDelay) {
                    enemy.userData.isAttacking = true;
                    enemy.userData.attackTimer = 0;
                    
                    // Always alternate between hands for all mechs
                    anim.nextHand = anim.nextHand === 'right' ? 'left' : 'right';
                    anim.currentGun = anim.nextHand === 'right' ? anim.rightGun : anim.leftGun;
                    
                    anim.timer = 0;
                    anim.phase = 0;
                    anim.isLiftingArms = true;
                    anim.armLiftProgress = 0;
                }
                
                // Movement for all mechs
                const moveSpeed = enemy.userData.isMini ? 0.05 : 0.02;
                const playerPos = camera.position;
                const enemyPos = enemy.position;
                
                // Only move if not too close to player
                const distanceToPlayer = enemyPos.distanceTo(playerPos);
                const minDistance = enemy.userData.isMini ? 8 : 15;
                
                if (distanceToPlayer > minDistance) {
                    // Move towards player
                    const direction = new THREE.Vector3()
                        .subVectors(playerPos, enemyPos)
                        .normalize()
                        .multiplyScalar(moveSpeed);
                    
                    enemy.position.add(direction);
                }
                
                // Look at player
                enemy.lookAt(playerPos);
                
                // Handle arm animations
                if (anim && enemy.userData.leftArm && enemy.userData.rightArm) {
                    if (anim.isLiftingArms) {
                        anim.armLiftProgress = Math.min(1, anim.armLiftProgress + 0.05);
                        const liftAngle = anim.armLiftProgress * Math.PI * 0.25;
                        
                        // Reset both arms first
                        enemy.userData.rightArm.rotation.x = 0;
                        enemy.userData.leftArm.rotation.x = 0;
                        
                        // Only lift the active arm
                        if (anim.nextHand === 'right') {
                            enemy.userData.rightArm.rotation.x = -liftAngle;
                        } else if (anim.nextHand === 'left') {
                            enemy.userData.leftArm.rotation.x = -liftAngle;
                        }
                        
                        if (anim.armLiftProgress >= 1) {
                            anim.isLiftingArms = false;
                        }
                    }
                    
                    if (anim.isLoweringArms) {
                        anim.armLiftProgress = Math.max(0, anim.armLiftProgress - 0.05);
                        const liftAngle = anim.armLiftProgress * Math.PI * 0.25;
                        
                        enemy.userData.rightArm.rotation.x = -liftAngle;
                        enemy.userData.leftArm.rotation.x = -liftAngle;
                        
                        if (anim.armLiftProgress <= 0) {
                            anim.isLoweringArms = false;
                        }
                    }
                }
            });
        }

        function handleMovement() {

            const moveVector = new THREE.Vector3();
            
            if (keys['w']) {
                moveVector.z -= movementSpeed;
            }
            if (keys['s']) {
                moveVector.z += movementSpeed;
            }
            if (keys['a']) {
                moveVector.x -= movementSpeed;
            }
            if (keys['d']) {
                moveVector.x += movementSpeed;
            }
            
            // Apply camera rotation to movement
            moveVector.applyQuaternion(camera.quaternion);
            camera.position.add(moveVector);
        }

        function handleShooting() {

            fireRateTimer++;
            
            if (isMouseDown && fireRateTimer >= weapons[currentWeapon].fireRate) {
                fireBullet();
                fireRateTimer = 0;
            }
        }

        function updateUI() {
            // Update wave display
            waveDisplay.textContent = `Wave ${wave}`;
            
            // Update main Vultorex health
            if (mainVultorex) {
                const healthPercent = (mainVultorex.userData.health / mainVultorex.userData.maxHealth) * 100;
                vultorexHealthBar.style.width = healthPercent + '%';
                vultorexHealthText.textContent = `${Math.max(0, mainVultorex.userData.health)} / ${mainVultorex.userData.maxHealth}`;
            } else {
                vultorexHealthBar.style.width = '0%';
                vultorexHealthText.textContent = '0 / 0';
            }
            
            // Update player health
            const playerHealthPercent = (player.health / player.maxHealth) * 100;
            playerHealthBar.style.width = playerHealthPercent + '%';
            playerHealthText.textContent = `${Math.max(0, player.health)} / ${player.maxHealth}`;
            
            if (playerHealthPercent <= 25) {
                playerHealthBar.classList.add('low-health');
            } else {
                playerHealthBar.classList.remove('low-health');
            }
            
            // Update ammo display
            ammoDisplay.textContent = `${weapons[currentWeapon].currentAmmo} / ${weapons[currentWeapon].maxAmmo}`;
        }

        function showMessage(title, text) {
            messageTitle.textContent = title;
            messageText.textContent = text;
            messageBox.style.display = 'block';
            gameState = 'game_over';
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            handleMovement();
            handleShooting();
            updateEnemies();
            updateProjectiles();
            updateBullets();
            
            // Update cube camera for reflections
            cubeCamera.position.copy(camera.position);
            cubeCamera.update(renderer, scene);
