<script>
// Game State
class GameState {
    constructor() {
        this.mapBounds = 100;
        this.resources = 200;
        this.mines = [];
        this.nukes = [];
        this.nukesInFlight = [];
        this.interceptors = []; // New array for interceptor missiles
        this.selectedTool = null;
        this.selectedUnit = null;
        this.targetPosition = null;
        this.missileWarning = {
            isActive: false,
            targetMissile: null,
            timeRemaining: 0
        };
        this.autoInterceptor = {
            isActive: false,
            purchased: false
        };
        this.player = {
            id: 'player',
            name: 'Player',
            position: new THREE.Vector3(-90, 0.5, -90),
            basePosition: new THREE.Vector3(-90, 0, -90),
            resources: 200,
            mines: [],
            units: [],
            baseMesh: null,
            mesh: null,
            isDestroyed: false,
            color: 0x000000
        };
        this.keys = {};
        this.aiTycoons = [];
        this.allTycoons = [this.player];
    }

    addResources(amount) {
        this.resources = Math.max(0, this.resources + amount);
        this.player.resources = this.resources;
        this.updateUI();
    }

    addMine(position) {
        const mine = {
            id: Date.now().toString(),
            position: position.clone(),
            level: 1,
            mesh: null
        };
        this.mines.push(mine);
        this.player.mines.push(mine);
        this.updateUI();
        return mine;
    }

    addUnit(type, tycoon, position) {
        const unit = {
            id: Date.now().toString(),
            type: type,
            position: position.clone(),
            mesh: null,
            owner: tycoon
        };
        tycoon.units.push(unit);
        this.updateUI();
        return unit;
    }

    updateUI() {
        document.getElementById('moneyDisplay').textContent = `${Math.floor(this.resources)}`;
        document.getElementById('mineCount').textContent = this.mines.length;
        document.getElementById('unitCount').textContent = this.player.units.length;
        
        const mineBtn = document.getElementById('mineBtn');
        const nukeBtn = document.getElementById('nukeBtn');
        const missileBtn = document.getElementById('missileBtn');
        
        mineBtn.disabled = this.resources < 50;
        nukeBtn.disabled = this.resources < 100;
        missileBtn.disabled = this.resources < 25;

        document.getElementById('soldierBtn').disabled = this.resources < 10;
        document.getElementById('tankBtn').disabled = this.resources < 50;
        document.getElementById('jetBtn').disabled = this.resources < 100;
        
        this.updateMinimap();
    }

    updateMinimap() {
        const minimap = document.getElementById('minimap');
        if (!minimap) return;

        minimap.innerHTML = '';
        const minimapSize = minimap.offsetWidth;

        if (!this.player.isDestroyed) {
            const playerMarker = document.createElement('div');
            playerMarker.className = 'minimap-marker player-marker';
            playerMarker.style.left = ((this.player.position.x + this.mapBounds) / (this.mapBounds * 2) * minimapSize) + 'px';
            playerMarker.style.top = ((this.player.position.z + this.mapBounds) / (this.mapBounds * 2) * minimapSize) + 'px';
            playerMarker.title = 'You';
            minimap.appendChild(playerMarker);
        }

        this.aiTycoons.forEach((tycoon, index) => {
            if (tycoon.isDestroyed) return;
            const marker = document.createElement('div');
            marker.className = 'minimap-marker ai-marker';
            marker.style.left = ((tycoon.position.x + this.mapBounds) / (this.mapBounds * 2) * minimapSize) + 'px';
            marker.style.top = ((tycoon.position.z + this.mapBounds) / (this.mapBounds * 2) * minimapSize) + 'px';
            marker.title = `${tycoon.name} - ${Math.floor(tycoon.resources)}`;
            marker.onclick = () => this.targetTycoon(tycoon);
            minimap.appendChild(marker);
        });

        if (this.targetPosition) {
            const targetMarker = document.createElement('div');
            targetMarker.className = 'minimap-marker target-marker';
            targetMarker.style.left = ((this.targetPosition.x + this.mapBounds) / (this.mapBounds * 2) * minimapSize) + 'px';
            targetMarker.style.top = ((this.targetPosition.z + this.mapBounds) / (this.mapBounds * 2) * minimapSize) + 'px';
            targetMarker.title = 'Target';
            minimap.appendChild(targetMarker);
        }
    }

    targetTycoon(tycoon) {
        this.targetPosition = tycoon.position.clone();
        this.updateTargetIndicator();
    }

    // New missile warning methods
    showMissileWarning(missile) {
        // If auto interceptor is active, intercept automatically
        if (this.autoInterceptor.purchased) {
            this.launchInterceptors(missile);
            this.showAutoInterceptMessage();
            return;
        }
        
        this.missileWarning.isActive = true;
        this.missileWarning.targetMissile = missile;
        this.missileWarning.timeRemaining = 2.5;
        
        const warningDiv = document.getElementById('missileWarning');
        warningDiv.style.display = 'block';
        
        this.updateWarningCountdown();
    }

    hideMissileWarning() {
        this.missileWarning.isActive = false;
        this.missileWarning.targetMissile = null;
        this.missileWarning.timeRemaining = 0;
        
        const warningDiv = document.getElementById('missileWarning');
        warningDiv.style.display = 'none';
    }

    updateWarningCountdown() {
        if (!this.missileWarning.isActive) return;
        
        const countdownDiv = document.getElementById('warningCountdown');
        countdownDiv.textContent = `Impact in ${Math.ceil(this.missileWarning.timeRemaining)} seconds`;
    }

    showAutoInterceptMessage() {
        const messageDiv = document.getElementById('autoInterceptMessage');
        messageDiv.style.display = 'block';
        
        // Hide the message after 3 seconds
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 3000);
    }

    purchaseAutoInterceptor() {
        if (this.resources >= 3000 && !this.autoInterceptor.purchased) {
            this.autoInterceptor.purchased = true;
            this.addResources(-3000);
            console.log('Auto Interceptor purchased for $3,000');
            this.hideMissileWarning();
            return true;
        }
        return false;
    }

    launchInterceptors(targetMissile) {
        console.log('Launching 4 interceptor missiles');
        
        for (let i = 0; i < 4; i++) {
            const startPos = this.player.basePosition.clone();
            startPos.y = 2;
            
            const angle = (i * Math.PI * 2) / 4;
            startPos.x += Math.cos(angle) * 2;
            startPos.z += Math.sin(angle) * 2;
            
            const direction = targetMissile.position.clone().sub(startPos).normalize();
            const velocity = direction.multiplyScalar(30);
            
            const interceptor = {
                id: `interceptor_${Date.now()}_${i}`,
                position: startPos.clone(),
                target: targetMissile.position.clone(),
                velocity: velocity,
                mesh: null,
                type: 'interceptor',
                owner: this.player,
                targetMissileId: targetMissile.id
            };
            
            this.createInterceptorMesh(interceptor);
            this.interceptors.push(interceptor);
        }
    }

    createInterceptorMesh(interceptor) {
        const interceptorGroup = new THREE.Group();
        
        const bodyGeometry = new THREE.CylinderGeometry(0.2, 0.2, 1.5, 8);
        const bodyMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xFFD700,
            emissive: 0xFFD700,
            emissiveIntensity: 0.3,
            metalness: 0.8,
            roughness: 0.2
        });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        interceptorGroup.add(body);

        const tipGeometry = new THREE.ConeGeometry(0.2, 0.5, 8);
        const tipMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xFF4444,
            emissive: 0xFF4444,
            emissiveIntensity: 0.5
        });
        const tip = new THREE.Mesh(tipGeometry, tipMaterial);
        tip.position.y = 1;
        interceptorGroup.add(tip);

        const glowGeometry = new THREE.SphereGeometry(0.5, 8, 6);
        const glowMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xFFD700,
            transparent: true,
            opacity: 0.3
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        interceptorGroup.add(glow);

        const exhaustGeometry = new THREE.ConeGeometry(0.15, 0.8, 6);
        const exhaustMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xFF8800,
            transparent: true,
            opacity: 0.8
        });
        const exhaust = new THREE.Mesh(exhaustGeometry, exhaustMaterial);
        exhaust.position.y = -1.2;
        interceptorGroup.add(exhaust);

        interceptorGroup.position.copy(interceptor.position);
        interceptor.mesh = interceptorGroup;
        game.scene.add(interceptorGroup);
    }
}

// Game Engine
class Game {
    constructor() {
        this.state = new GameState();
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.clock = new THREE.Clock();
        
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();

        this.init();
    }

    init() {
        console.log('Initializing game...');
        try {
            this.setupScene();
            this.setupLights();
            this.setupTerrain();
            this.setupPlayer();
            this.setupControls();
            this.setupUI();
            this.setupAITycoons();
            this.state.allTycoons = [this.state.player, ...this.state.aiTycoons];
        
            setTimeout(() => {
                document.getElementById('loadingScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.display = 'none';
                }, 500);
            }, 1000);
        
            console.log('Game initialized successfully, starting animation loop...');
            this.animate();
        } catch (error) {
            console.error('Error during game initialization:', error);
            throw error;
        }
    }

    setupScene() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x87CEEB);

        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.set(0, 15, 20);

        const canvas = document.getElementById('gameCanvas');
        this.renderer = new THREE.WebGLRenderer({ 
            canvas: canvas,
            antialias: false,
            powerPreference: "low-power"
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        window.addEventListener('resize', () => this.onWindowResize());
    }

    setupLights() {
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        this.scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 10, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.setScalar(2048);
        directionalLight.shadow.camera.far = 100;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        this.scene.add(directionalLight);

        const fillLight = new THREE.DirectionalLight(0x4A90E2, 0.3);
        fillLight.position.set(-5, 5, -5);
        this.scene.add(fillLight);
    }

    setupTerrain() {
        const terrainGeometry = new THREE.PlaneGeometry(this.state.mapBounds * 2, this.state.mapBounds * 2);
        const terrainMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x90EE90,
            roughness: 0.8,
            metalness: 0.1
        });
        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.rotation.x = -Math.PI / 2;
        terrain.receiveShadow = true;
        terrain.name = 'terrain';
        this.scene.add(terrain);

        const boundaryMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const mapBounds = this.state.mapBounds;
        const boundaries = [
            { pos: [0, 5, -mapBounds], size: [mapBounds * 2, 10, 2] },
            { pos: [0, 5, mapBounds], size: [mapBounds * 2, 10, 2] },
            { pos: [-mapBounds, 5, 0], size: [2, 10, mapBounds * 2] },
            { pos: [mapBounds, 5, 0], size: [2, 10, mapBounds * 2] }
        ];

        boundaries.forEach(boundary => {
            const geometry = new THREE.BoxGeometry(...boundary.size);
            const mesh = new THREE.Mesh(geometry, boundaryMaterial);
            mesh.position.set(...boundary.pos);
            mesh.castShadow = true;
            this.scene.add(mesh);
        });
    }

    setupPlayer() {
        const baseGeometry = new THREE.BoxGeometry(4, 3, 4);
        const baseMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
        this.state.player.baseMesh = new THREE.Mesh(baseGeometry, baseMaterial);
        this.state.player.baseMesh.position.set(this.state.player.basePosition.x, 1.5, this.state.player.basePosition.z);
        this.state.player.baseMesh.castShadow = true;
        this.scene.add(this.state.player.baseMesh);

        const flagPoleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 2, 6);
        const flagPoleMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const flagPole = new THREE.Mesh(flagPoleGeometry, flagPoleMaterial);
        flagPole.position.set(this.state.player.basePosition.x, 4, this.state.player.basePosition.z);
        this.scene.add(flagPole);

        const flagBannerGeometry = new THREE.BoxGeometry(1.5, 0.8, 0.1);
        const flagBannerMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x000000,
            emissive: 0x000000,
            emissiveIntensity: 0.2
        });
        const flagBanner = new THREE.Mesh(flagBannerGeometry, flagBannerMaterial);
        flagBanner.position.set(this.state.player.basePosition.x + 0.8, 4.5, this.state.player.basePosition.z);
        this.scene.add(flagBanner);

        const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
        this.state.player.mesh = new THREE.Mesh(playerGeometry, playerMaterial);
        this.state.player.mesh.position.copy(this.state.player.position);
        this.state.player.mesh.castShadow = true;
        this.scene.add(this.state.player.mesh);
    }

    setupControls() {
        document.addEventListener('keydown', (event) => {
            this.state.keys[event.code] = true;
            this.handleKeyPress(event.code);
        });

        document.addEventListener('keyup', (event) => {
            this.state.keys[event.code] = false;
        });

        document.addEventListener('keydown', (e) => {
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.getElementById('gameCanvas').addEventListener('click', (event) => this.handleCanvasClick(event));
    }

    setupUI() {
        document.getElementById('mineBtn').addEventListener('click', () => {
            this.state.selectedTool = this.state.selectedTool === 'mine' ? null : 'mine';
            this.updateToolButtons();
        });

        document.getElementById('nukeBtn').addEventListener('click', () => {
            this.state.selectedTool = this.state.selectedTool === 'nuke' ? null : 'nuke';
            this.updateToolButtons();
        });

        document.getElementById('missileBtn').addEventListener('click', () => {
            this.state.selectedTool = this.state.selectedTool === 'missile' ? null : 'missile';
            this.updateToolButtons();
        });

        document.getElementById('soldierBtn').addEventListener('click', () => this.handleUnitDeployment('soldier'));
        document.getElementById('tankBtn').addEventListener('click', () => this.handleUnitDeployment('tank'));
        document.getElementById('jetBtn').addEventListener('click', () => this.handleUnitDeployment('jet'));

        // Missile warning buttons
        document.getElementById('ignoreBtn').addEventListener('click', () => {
            console.log('Player chose to ignore missile');
            this.state.hideMissileWarning();
        });

        document.getElementById('interceptBtn').addEventListener('click', () => {
            console.log('Player chose to intercept missile');
            if (this.state.missileWarning.targetMissile) {
                this.state.launchInterceptors(this.state.missileWarning.targetMissile);
            }
            this.state.hideMissileWarning();
        });

        document.getElementById('autoBtn').addEventListener('click', () => {
            console.log('Player chose auto interceptor');
            if (this.state.purchaseAutoInterceptor()) {
                console.log('Auto interceptor purchased successfully');
            } else {
                console.log('Not enough money for auto interceptor');
            }
        });

        this.state.updateUI();
    }

    setupAITycoons() {
        const mapBounds = this.state.mapBounds - 20;
        const tycoonPositions = [
            new THREE.Vector3(mapBounds, 0.5, -mapBounds),
            new THREE.Vector3(-mapBounds, 0.5, mapBounds),
            new THREE.Vector3(mapBounds, 0.5, mapBounds)
        ];

        const tycoonColors = [0xFF6B6B, 0x4ECDC4, 0x45B7D1];
        const tycoonNames = ['RedBot', 'CyanBot', 'BlueBot'];

        tycoonPositions.forEach((position, index) => {
            const tycoon = {
                id: `ai_${index}`,
                name: tycoonNames[index],
                position: position.clone(),
                basePosition: position.clone(),
                resources: 150 + Math.random() * 100,
                mines: [],
                units: [],
                nukesInFlight: [],
                baseMesh: null,
                mesh: null,
                color: tycoonColors[index],
                lastAction: 0,
                buildCooldown: 0,
                attackCooldown: 0,
                isDestroyed: false
            };

            this.createAITycoonMesh(tycoon);
            this.state.aiTycoons.push(tycoon);
        });

        console.log(`Created ${this.state.aiTycoons.length} AI tycoons`);
    }

    createAITycoonMesh(tycoon) {
        const tycoonGeometry = new THREE.BoxGeometry(4, 3, 4);
        const tycoonMaterial = new THREE.MeshStandardMaterial({ 
            color: tycoon.color,
            roughness: 0.6,
            metalness: 0.3
        });
        tycoon.baseMesh = new THREE.Mesh(tycoonGeometry, tycoonMaterial);
        tycoon.baseMesh.position.set(tycoon.basePosition.x, 1.5, tycoon.basePosition.z);
        tycoon.baseMesh.castShadow = true;
        this.scene.add(tycoon.baseMesh);

        const flagPoleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 2, 6);
        const flagPoleMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const flagPole = new THREE.Mesh(flagPoleGeometry, flagPoleMaterial);
        flagPole.position.set(tycoon.basePosition.x, 4, tycoon.basePosition.z);
        this.scene.add(flagPole);

        const flagBannerGeometry = new THREE.BoxGeometry(1.5, 0.8, 0.1);
        const flagBannerMaterial = new THREE.MeshStandardMaterial({ 
            color: tycoon.color,
            emissive: tycoon.color,
            emissiveIntensity: 0.2
        });
        const flagBanner = new THREE.Mesh(flagBannerGeometry, flagBannerMaterial);
        flagBanner.position.set(tycoon.basePosition.x + 0.8, 4.5, tycoon.basePosition.z);
        this.scene.add(flagBanner);
    }

    updateToolButtons() {
        const mineBtn = document.getElementById('mineBtn');
        const nukeBtn = document.getElementById('nukeBtn');
        const missileBtn = document.getElementById('missileBtn');
        
        mineBtn.classList.toggle('selected', this.state.selectedTool === 'mine');
        nukeBtn.classList.toggle('selected', this.state.selectedTool === 'nuke');
        missileBtn.classList.toggle('selected', this.state.selectedTool === 'missile');
    }

    handleKeyPress(keyCode) {
        if (this.state.player.isDestroyed) return;

        switch(keyCode) {
            case 'KeyE':
                if (this.state.selectedTool === 'mine') {
                    this.handlePlacement();
                }
                break;
            case 'KeyT':
                this.handleTargeting();
                break;
            case 'Space':
                if (this.state.selectedTool === 'nuke') {
                    this.handleNukeLaunch();
                }
                break;
            case 'KeyM':
                if (this.state.selectedTool === 'missile') {
                    this.handleMissileLaunch();
                }
                break;
            case 'Key1':
                this.handleUnitDeployment('soldier');
                break;
            case 'Key2':
                this.handleUnitDeployment('tank');
                break;
            case 'Key3':
                this.handleUnitDeployment('jet');
                break;
            case 'KeyR':
                this.handleRapidFire();
                break;
        }
    }

    handleCanvasClick(event) {
        if (this.state.selectedUnit) {
            this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
            this.raycaster.setFromCamera(this.mouse, this.camera);
            
            const terrain = this.scene.getObjectByName('terrain');
            if (terrain) {
                const intersects = this.raycaster.intersectObject(terrain);
                if (intersects.length > 0) {
                    const deployPosition = intersects[0].point;
                    this.spawnUnitAtLocation(this.state.selectedUnit, deployPosition);
                    this.state.selectedUnit = null;
                    document.getElementById('deploymentMessage').style.display = 'none';
                }
            }
        }
    }

    handleUnitDeployment(type) {
        let cost = 0;
        if (type === 'soldier' && this.state.resources >= 10) {
            cost = 10;
        } else if (type === 'tank' && this.state.resources >= 50) {
            cost = 50;
        } else if (type === 'jet' && this.state.resources >= 100) {
            cost = 100;
        } else {
            return;
        }
        
        this.state.selectedUnit = type;
        document.getElementById('deploymentMessage').style.display = 'block';
    }

    spawnUnitAtLocation(type, position) {
        let cost = 0;
        let unitMesh = null;
        
        if (type === 'soldier') {
            cost = 10;
            const unit = this.state.addUnit('soldier', this.state.player, position);
            unitMesh = this.createUnitMesh(unit, 0x000000);
            unit.mesh = unitMesh;
            this.state.addResources(-cost);
        } else if (type === 'tank') {
            cost = 50;
            const unit = this.state.addUnit('tank', this.state.player, position);
            unitMesh = this.createUnitMesh(unit, 0x000000);
            unit.mesh = unitMesh;
            this.state.addResources(-cost);
        } else if (type === 'jet') {
            cost = 100;
            const unit = this.state.addUnit('jet', this.state.player, position);
            unitMesh = this.createUnitMesh(unit, 0x000000);
            unit.mesh = unitMesh;
            this.state.addResources(-cost);
        }
    }

    handlePlacement() {
        if (this.state.resources >= 50) {
            const position = this.state.player.position.clone();
            position.y = 0;
            
            if (this.isValidPlacement(position)) {
                const mine = this.state.addMine(position);
                this.createMineMesh(mine);
                this.state.addResources(-50);
            }
        }
    }

    createUnitMesh(unit, color) {
        const meshGroup = new THREE.Group();
        meshGroup.position.copy(unit.position);
        meshGroup.position.y = 0;
        
        if (unit.type === 'soldier') {
            const soldierGeometry = new THREE.BoxGeometry(0.5, 1, 0.5);
            const soldierMaterial = new THREE.MeshStandardMaterial({ color: color });
            const soldierMesh = new THREE.Mesh(soldierGeometry, soldierMaterial);
            soldierMesh.position.y = 0.5;
            meshGroup.add(soldierMesh);
        } else if (unit.type === 'tank') {
            const tankGeometry = new THREE.BoxGeometry(1.5, 0.8, 2.5);
            const tankMaterial = new THREE.MeshStandardMaterial({ color: color });
            const tankMesh = new THREE.Mesh(tankGeometry, tankMaterial);
            tankMesh.position.y = 0.4;
            meshGroup.add(tankMesh);
        } else if (unit.type === 'jet') {
            const jetGeometry = new THREE.ConeGeometry(0.5, 2, 4);
            const jetMaterial = new THREE.MeshStandardMaterial({ color: color });
            const jetMesh = new THREE.Mesh(jetGeometry, jetMaterial);
            jetMesh.rotation.x = Math.PI / 2;
            jetMesh.position.y = 5;
            meshGroup.add(jetMesh);
        }

        this.scene.add(meshGroup);
        return meshGroup;
    }

    handleTargeting() {
        this.state.targetPosition = this.state.player.position.clone();
        this.updateTargetIndicator();
    }

    handleNukeLaunch() {
        if (this.state.targetPosition && this.state.resources >= 100) {
            this.launchNuke();
            this.state.addResources(-100);
        }
    }

    handleMissileLaunch() {
        if (this.state.targetPosition && this.state.resources >= 25) {
            this.launchMissile();
            this.state.addResources(-25);
        }
    }

    handleRapidFire() {
        if (this.state.targetPosition && this.state.resources >= 50) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    if (this.state.resources >= 15) {
                        this.launchMissile(true);
                        this.state.addResources(-15);
                    }
                }, i * 200);
            }
        }
    }

    isValidPlacement(position) {
        if (position.x < -(this.state.mapBounds-5) || position.x > (this.state.mapBounds-5) || position.z < -(this.state.mapBounds-5) || position.z > (this.state.mapBounds-5)) {
            return false;
        }
        
        const allMines = [...this.state.mines];
        this.state.aiTycoons.forEach(tycoon => allMines.push(...tycoon.mines));

        for (const mine of allMines) {
            if (position.distanceTo(mine.position) < 3) {
                return false;
            }
        }
        
        return true;
    }

    createMineMesh(mine, color = 0x8B4513) {
        const mineGroup = new THREE.Group();
        mineGroup.position.set(mine.position.x, 0, mine.position.z);
    
        const baseGeometry = new THREE.CylinderGeometry(1.2, 1.5, 0.5, 8);
        const baseMaterial = new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.7
        });
        const base = new THREE.Mesh(baseGeometry, baseMaterial);
        base.position.y = 0.25;
        base.castShadow = true;
        mineGroup.add(base);
    
        const topGeometry = new THREE.TorusGeometry(0.8, 0.2, 8, 20);
        const topMaterial = new THREE.MeshStandardMaterial({
            color: 0x666666,
            metalness: 0.8
        });
        const top = new THREE.Mesh(topGeometry, topMaterial);
        top.rotation.x = Math.PI / 2;
        top.position.y = 0.5;
        mineGroup.add(top);
    
        mine.mesh = mineGroup;
        this.scene.add(mineGroup);
    }

    updateTargetIndicator() {
        const existing = this.scene.getObjectByName('targetIndicator');
        if (existing) {
            this.scene.remove(existing);
        }

        if (this.state.targetPosition) {
            const ringGeometry = new THREE.RingGeometry(2, 3, 16);
            const ringMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xFF0000,
                transparent: true,
                opacity: 0.6
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(this.state.targetPosition.x, 0.1, this.state.targetPosition.z);
            ring.name = 'targetIndicator';
            this.scene.add(ring);

            document.getElementById('targetPanel').style.display = 'block';
            document.getElementById('targetCoords').textContent = 
                `X: ${Math.floor(this.state.targetPosition.x)}, Z: ${Math.floor(this.state.targetPosition.z)}`;
        } else {
            document.getElementById('targetPanel').style.display = 'none';
        }
    }

    launchNuke() {
        if (!this.state.targetPosition) return;

        const startPos = this.state.player.position.clone();
        startPos.y = 2;

        const direction = this.state.targetPosition.clone().sub(startPos).normalize();
        const velocity = direction.multiplyScalar(15);

        const nuke = {
            id: Date.now().toString(),
            position: startPos.clone(),
            target: this.state.targetPosition.clone(),
            velocity: velocity,
            mesh: null,
            type: 'nuke',
            owner: this.state.player
        };

        const nukeGroup = new THREE.Group();
        
        const bodyGeometry = new THREE.CylinderGeometry(0.3, 0.3, 2, 8);
        const bodyMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x666666,
            metalness: 0.8,
            roughness: 0.2
        });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        nukeGroup.add(body);

        const tipGeometry = new THREE.ConeGeometry(0.3, 0.6, 8);
        const tipMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xFF0000,
            emissive: 0xFF0000,
            emissiveIntensity: 0.3
        });
        const tip = new THREE.Mesh(tipGeometry, tipMaterial);
        tip.position.y = 1.2;
        nukeGroup.add(tip);

        const trailGeometry = new THREE.ConeGeometry(0.2, 1, 6);
        const trailMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xFF4500,
            emissive: 0xFF4500,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.7
        });
        const trail = new THREE.Mesh(trailGeometry, trailMaterial);
        trail.position.y = -1.5;
        nukeGroup.add(trail);

        nukeGroup.position.copy(nuke.position);
        nuke.mesh = nukeGroup;
        this.scene.add(nukeGroup);

        this.state.nukesInFlight.push(nuke);
    }

    launchMissile(isFast = false) {
        if (!this.state.targetPosition) return;

        const startPos = this.state.player.position.clone();
        startPos.y = 1.5;

        const direction = this.state.targetPosition.clone().sub(startPos).normalize();
        const speed = isFast ? 25 : 20;
        const velocity = direction.multiplyScalar(speed);

        const missile = {
            id: Date.now().toString() + Math.random(),
            position: startPos.clone(),
            target: this.state.targetPosition.clone(),
            velocity: velocity,
            mesh: null,
            type: 'missile',
            owner: this.state.player
        };

        const missileGroup = new THREE.Group();
        
        const bodyGeometry = new THREE.CylinderGeometry(0.15, 0.15, 1, 6);
        const bodyMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x444444,
            metalness: 0.9,
            roughness: 0.1
        });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        missileGroup.add(body);

        const tipGeometry = new THREE.ConeGeometry(0.15, 0.4, 6);
        const tipMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x00FF00,
            emissive: 0x00FF00,
            emissiveIntensity: 0.4
        });
        const tip = new THREE.Mesh(tipGeometry, tipMaterial);
        tip.position.y = 0.7;
        missileGroup.add(tip);

        const trailGeometry = new THREE.ConeGeometry(0.1, 0.6, 4);
        const trailMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x00FFFF,
            emissive: 0x00FFFF,
            emissiveIntensity: 0.6,
            transparent: true,
            opacity: 0.8
        });
        const trail = new THREE.Mesh(trailGeometry, trailMaterial);
        trail.position.y = -0.8;
        missileGroup.add(trail);

        missileGroup.position.copy(missile.position);
        missile.mesh = missileGroup;
        this.scene.add(missileGroup);

        this.state.nukesInFlight.push(missile);
    }

    updateMovement(delta) {
        const moveSpeed = 20 * delta;
        let moved = false;

        const newPosition = this.state.player.position.clone();
        const mapBounds = this.state.mapBounds - 5;

        if (this.state.keys['KeyW'] || this.state.keys['ArrowUp']) {
            newPosition.z -= moveSpeed;
            moved = true;
        }
        if (this.state.keys['KeyS'] || this.state.keys['ArrowDown']) {
            newPosition.z += moveSpeed;
            moved = true;
        }
        if (this.state.keys['KeyA'] || this.state.keys['ArrowLeft']) {
            newPosition.x -= moveSpeed;
            moved = true;
        }
        if (this.state.keys['KeyD'] || this.state.keys['ArrowRight']) {
            newPosition.x += moveSpeed;
            moved = true;
        }

        newPosition.x = Math.max(-mapBounds, Math.min(mapBounds, newPosition.x));
        newPosition.z = Math.max(-mapBounds, Math.min(mapBounds, newPosition.z));

        if (moved) {
            this.state.player.position.copy(newPosition);
            this.state.player.mesh.position.copy(newPosition);
            this.updateCamera();
        }
    }

    updateCamera() {
        const cameraOffset = new THREE.Vector3(0, 30, 40);
        const desiredCameraPosition = this.state.player.position.clone().add(cameraOffset);
        
        this.camera.position.lerp(desiredCameraPosition, 0.1);
        this.camera.lookAt(this.state.player.position);
    }

    updateResources(delta) {
        if (this.state.mines.length > 0) {
            const resourceRate = this.state.mines.length * 5;
            this.state.addResources(resourceRate * delta);
        }
    }

    updateNukes(delta) {
        this.state.nukesInFlight = this.state.nukesInFlight.filter(nuke => {
            const newPos = nuke.position.clone().add(nuke.velocity.clone().multiplyScalar(delta));
            nuke.position.copy(newPos);
            nuke.mesh.position.copy(newPos);

            // Check if missile is targeting player base and show warning
            if (nuke.type === 'missile' && nuke.owner.id !== 'player' && !this.state.missileWarning.isActive) {
                const distanceToPlayer = newPos.distanceTo(this.state.player.basePosition);
                const speed = nuke.velocity.length();
                const timeToImpact = distanceToPlayer / speed;
                
                if (timeToImpact <= 2.5) {
                    console.log('Missile detected! Time to impact:', timeToImpact);
                    this.state.showMissileWarning(nuke);
                }
            }

            const hitRadius = nuke.type === 'missile' ? 1 : 2;
            if (newPos.distanceTo(nuke.target) < hitRadius) {
                this.scene.remove(nuke.mesh);
                
                const explosionSize = nuke.type === 'missile' ? 2 : 3;
                this.createExplosion(nuke.target, explosionSize, nuke.owner);
                
                return false;
            }
            
            return true;
        });
    }

    updateInterceptors(delta) {
        this.state.interceptors = this.state.interceptors.filter(interceptor => {
            const newPos = interceptor.position.clone().add(interceptor.velocity.clone().multiplyScalar(delta));
            interceptor.position.copy(newPos);
            interceptor.mesh.position.copy(newPos);

            // Check collision with enemy missiles
            for (let i = 0; i < this.state.nukesInFlight.length; i++) {
                const missile = this.state.nukesInFlight[i];
                if (missile.owner.id !== 'player') {
                    const distance = newPos.distanceTo(missile.position);
                    if (distance < 1.5) {
                        console.log(`Interceptor ${interceptor.id} destroyed missile ${missile.id}`);
                        
                        this.scene.remove(interceptor.mesh);
                        this.scene.remove(missile.mesh);
                        this.state.nukesInFlight.splice(i, 1);
                        
                        this.createExplosion(newPos, 1, interceptor.owner);
                        
                        return false;
                    }
                }
            }

            if (newPos.length() > 200) {
                this.scene.remove(interceptor.mesh);
                return false;
            }
            
            return true;
        });
    }

    updateMissileWarning(delta) {
        if (this.state.missileWarning.isActive) {
            this.state.missileWarning.timeRemaining -= delta;
            this.state.updateWarningCountdown();
            
            if (this.state.missileWarning.timeRemaining <= 0) {
                this.state.hideMissileWarning();
            }
        }
    }

    updateAITycoons(delta) {
        this.state.aiTycoons.forEach(tycoon => {
            if (tycoon.isDestroyed) return;

            const baseRate = (1 + tycoon.mines.length) * 3;
            tycoon.resources = Math.max(0, tycoon.resources + baseRate * delta);

            tycoon.buildCooldown = Math.max(0, tycoon.buildCooldown - delta);
            tycoon.attackCooldown = Math.max(0, tycoon.attackCooldown - delta);

            if (tycoon.resources >= 50 && tycoon.buildCooldown <= 0) {
                if (Math.random() > 0.5) {
                    const minePosition = tycoon.basePosition.clone();
                    const offset = new THREE.Vector3(
                        (Math.random() - 0.5) * 40,
                        0,
                        (Math.random() - 0.5) * 40
                    );
                    minePosition.add(offset);
                    minePosition.y = 0;

                    if (this.isValidPlacement(minePosition)) {
                        this.createAIMine(tycoon, minePosition);
                        tycoon.resources -= 50;
                        tycoon.buildCooldown = 15;
                    }
                } else {
                    if (tycoon.resources >= 10) {
                        const unitPosition = tycoon.basePosition.clone();
                        unitPosition.x += (Math.random() - 0.5) * 5;
                        unitPosition.z += (Math.random() - 0.5) * 5;
                        const unit = this.state.addUnit('soldier', tycoon, unitPosition);
                        const unitMesh = this.createUnitMesh(unit, tycoon.color);
                        unit.mesh = unitMesh;
                        tycoon.resources -= 10;
                        tycoon.buildCooldown = 5;
                    }
                }
            }

            // AI Logic: Attack player base with missiles
            if (tycoon.resources >= 25 && tycoon.attackCooldown <= 0) {
                if (!this.state.player.isDestroyed) {
                    console.log(`${tycoon.name} launching missile at player base`);
                    this.launchAIMissile(tycoon, this.state.player.basePosition);
                    tycoon.resources -= 25;
                    tycoon.attackCooldown = 8 + Math.random() * 4; // Launch every 8-12 seconds
                }
            }
        });
    }

    createAIMine(tycoon, position) {
        const mine = {
            id: Date.now().toString(),
            position: position.clone(),
            level: 1,
            mesh: null
        };
        tycoon.mines.push(mine);
        this.createMineMesh(mine, tycoon.color);
    }

    launchAIMissile(tycoon, targetPosition) {
        if (!targetPosition) return;
    
        const startPos = tycoon.basePosition.clone();
        startPos.y = 2;
    
        const direction = targetPosition.clone().sub(startPos).normalize();
        const velocity = direction.multiplyScalar(15);
    
        const missile = {
            id: Date.now().toString(),
            position: startPos.clone(),
            target: targetPosition.clone(),
            velocity: velocity,
            mesh: null,
            type: 'missile',
            owner: tycoon
        };
    
        const missileGroup = new THREE.Group();
        
        const bodyGeometry = new THREE.CylinderGeometry(0.3, 0.3, 2, 8);
        const bodyMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x666666,
            metalness: 0.8,
            roughness: 0.2
        });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        missileGroup.add(body);

        const tipGeometry = new THREE.ConeGeometry(0.3, 0.6, 8);
        const tipMaterial = new THREE.MeshStandardMaterial({ 
            color: tycoon.color,
            emissive: tycoon.color,
            emissiveIntensity: 0.5
        });
        const tip = new THREE.Mesh(tipGeometry, tipMaterial);
        tip.position.y = 1.2;
        missileGroup.add(tip);

        const trailGeometry = new THREE.ConeGeometry(0.2, 1, 6);
        const trailMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xFF4500,
            emissive: 0xFF4500,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.7
        });
        const trail = new THREE.Mesh(trailGeometry, trailMaterial);
        trail.position.y = -1.5;
        missileGroup.add(trail);

        missileGroup.position.copy(missile.position);
        missile.mesh = missileGroup;
        this.scene.add(missileGroup);
    
        this.state.nukesInFlight.push(missile);
    }

    createExplosion(position, size, owner) {
        const explosionMaterial = new THREE.MeshBasicMaterial({
            color: 0xFF4500,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending
        });
        const explosionGeometry = new THREE.SphereGeometry(size, 16, 16);
        const explosion = new THREE.Mesh(explosionGeometry, explosionMaterial);
        explosion.position.copy(position);
        this.scene.add(explosion);

        let scale = 0.1;
        const maxScale = size * 2;
        const duration = 1;

        const updateExplosion = () => {
            scale += duration * 0.05;
            explosion.scale.set(scale, scale, scale);
            explosion.material.opacity = 1 - (scale / maxScale);
            if (scale < maxScale) {
                requestAnimationFrame(updateExplosion);
            } else {
                this.scene.remove(explosion);
            }
        };

        this.checkCollisions(position, size, owner);
        updateExplosion();
    }

    checkCollisions(explosionPosition, explosionSize, owner) {
        const damage = explosionSize === 3 ? 50 : 25;

        this.state.allTycoons.forEach(tycoon => {
            if (tycoon.isDestroyed || tycoon.id === owner.id) return;
            const distance = tycoon.basePosition.distanceTo(explosionPosition);
            if (distance < explosionSize) {
                this.takeDamage(tycoon, damage);
            }
        });

        this.state.allTycoons.forEach(tycoon => {
            if (tycoon.id === owner.id) return;
            tycoon.mines = tycoon.mines.filter(mine => {
                const distance = mine.position.distanceTo(explosionPosition);
                if (distance < explosionSize) {
                    this.destroyMine(mine, tycoon);
                    return false;
                }
                return true;
            });
        });
    }

    takeDamage(tycoon, damage) {
        tycoon.resources = Math.max(0, tycoon.resources - damage);
        if (tycoon.id === 'player') {
            this.state.resources = tycoon.resources;
        }
        
        if (tycoon.resources <= 0 && !tycoon.isDestroyed) {
            tycoon.isDestroyed = true;
            this.scene.remove(tycoon.baseMesh);
            if (tycoon.mesh) this.scene.remove(tycoon.mesh);
            tycoon.mines.forEach(mine => {
                if (mine.mesh) this.scene.remove(mine.mesh);
            });
            tycoon.mines = [];
            console.log(`${tycoon.name} has been destroyed!`);
            this.state.updateUI();
        }
    }

    destroyMine(mine, owner) {
        this.scene.remove(mine.mesh);
        owner.mines = owner.mines.filter(m => m.id !== mine.id);
        this.state.updateUI();
    }

    animate() {
        const delta = this.clock.getDelta();
        
        this.updateMovement(delta);
        this.updateResources(delta);
        this.updateNukes(delta);
        this.updateInterceptors(delta);
        this.updateMissileWarning(delta);
        this.updateAITycoons(delta);

        this.state.allTycoons = [this.state.player, ...this.state.aiTycoons];

        this.renderer.render(this.scene, this.camera);
        requestAnimationFrame(() => this.animate());
    }

    onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }
}

let game;

document.addEventListener('DOMContentLoaded', () => {
    game = new Game();
});
</script>
